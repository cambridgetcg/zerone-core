# zerone-1 — custodial launch, single public validator on fly.io
app = "zerone-1"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  MONIKER = "zerone-1-fly-0"
  ZERONE_HOME = "/data/.zeroned"
  EXTERNAL_ADDRESS = "169.155.55.44:26656"

[mounts]
  source = "zerone_data"
  destination = "/data"

[[services]]
  internal_port = 26657
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  [[services.ports]]
    port = 26657
    handlers = ["http"]

[[services]]
  internal_port = 1317
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  [[services.ports]]
    port = 1317
    handlers = ["http"]

[[services]]
  internal_port = 26656
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  [[services.ports]]
    port = 26656

# gRPC (9090) — raw TCP (h2c/plaintext), no HTTP handler. Needed by IBC
# relayers (hermes) for the client/connection/channel handshake queries.
[[services]]
  internal_port = 9090
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1
  [[services.ports]]
    port = 9090

[[vm]]
  size = "shared-cpu-2x"
  memory = "4gb"
