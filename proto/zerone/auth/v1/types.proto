syntax = "proto3";
package zerone.auth.v1;

option go_package = "github.com/zerone-chain/zerone/x/auth/types";

// Account is a Zerone account with DID identity anchoring.
//
// Field 8 (session_key_count) was removed with session keys in the
// 2026-07 slim cut; its number is reserved and must not be reused.
message Account {
  reserved 8;
  reserved "session_key_count";
  // Bech32 address (store key for account lookups)
  string address = 1;
  // DID derived from identity key: did:zrn:{32-hex}
  string did = 2;
  // Hex-encoded Ed25519 identity public key (immutable)
  string public_key = 3;
  // Account type: agent, human, contract, system
  string account_type = 4;
  // Hash of current operational key
  string operational_key_hash = 5;
  // Hex-encoded Ed25519 operational public key (synced to Cosmos BaseAccount)
  string operational_public_key = 6;
  uint32 operational_key_version = 7;
  // Cached reputation score (0-1000000)
  uint32 reputation_score = 9;
  uint64 created_at_block = 10;
  uint64 last_active_block = 11;
  AccountFlags flags = 12;
  // Optional metadata (JSON string, max length governed by params)
  string metadata = 13;
}

// AccountFlags packed flags for account capabilities.
//
// Field 4 (in_recovery) was removed with social recovery in the 2026-07
// slim cut; its number is reserved and must not be reused.
message AccountFlags {
  reserved 4;
  reserved "in_recovery";

  bool is_validator = 1;
  bool can_submit_claims = 2;
  bool can_challenge = 3;
  bool frozen = 5;
  string freeze_reason = 6;
}

// DIDMapping stores the bidirectional DID <-> bech32 mapping.
message DIDMapping {
  string did = 1;
  string bech32 = 2;
  string pub_key = 3;
}

// Session keys (SessionKey/SessionCapabilities/CapabilityGrant) and
// social recovery (RecoveryConfig/ShardHolder/RecoveryRequest/
// RecoveryShard) were removed in the 2026-07 slim cut: delegated agent
// authority and key-recovery ceremonies live on the agenttool platform;
// the chain keeps only the self-certifying identity anchor. Do not
// reuse the removed message names.
