syntax = "proto3";
package zerone.autopoiesis.v1;

option go_package = "github.com/zerone-chain/zerone/x/autopoiesis/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/autopoiesis/v1/genesis.proto";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc Activate(MsgActivateAutopoiesis) returns (MsgActivateAutopoiesisResponse);
  rpc OverrideMultiplier(MsgOverrideMultiplier) returns (MsgOverrideMultiplierResponse);
  rpc FreezeMultiplier(MsgFreezeMultiplier) returns (MsgFreezeMultiplierResponse);
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  Params params = 2;
}
message MsgUpdateParamsResponse {}

message MsgActivateAutopoiesis {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  bool activate = 2;
}
message MsgActivateAutopoiesisResponse {}

message MsgOverrideMultiplier {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  string path = 2;
  uint64 value = 3;   // BPS value to force-set
}
message MsgOverrideMultiplierResponse {}

message MsgFreezeMultiplier {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  string path = 2;
  bool frozen = 3;
}
message MsgFreezeMultiplierResponse {}
