syntax = "proto3";
package zerone.autopoiesis.v1;

option go_package = "github.com/zerone-chain/zerone/x/autopoiesis/types";

import "google/api/annotations.proto";
import "zerone/autopoiesis/v1/types.proto";
import "zerone/autopoiesis/v1/genesis.proto";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/autopoiesis/v1/params";
  }
  rpc Multiplier(QueryMultiplierRequest) returns (QueryMultiplierResponse) {
    option (google.api.http).get = "/zerone/autopoiesis/v1/multipliers/{path}";
  }
  rpc AllMultipliers(QueryAllMultipliersRequest) returns (QueryAllMultipliersResponse) {
    option (google.api.http).get = "/zerone/autopoiesis/v1/multipliers";
  }
  rpc EpochSnapshot(QueryEpochSnapshotRequest) returns (QueryEpochSnapshotResponse) {
    option (google.api.http).get = "/zerone/autopoiesis/v1/epochs/{epoch}";
  }
  rpc SSI(QuerySSIRequest) returns (QuerySSIResponse) {
    option (google.api.http).get = "/zerone/autopoiesis/v1/ssi";
  }
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}

message QueryMultiplierRequest {
  string path = 1;
}
message QueryMultiplierResponse {
  MultiplierState multiplier = 1;
}

message QueryAllMultipliersRequest {}
message QueryAllMultipliersResponse {
  repeated MultiplierState multipliers = 1;
}

message QueryEpochSnapshotRequest {
  uint64 epoch = 1;
}
message QueryEpochSnapshotResponse {
  EpochSnapshot snapshot = 1;
}

message QuerySSIRequest {}
message QuerySSIResponse {
  uint64 ssi_score = 1;
  string ssi_category = 2;
}
