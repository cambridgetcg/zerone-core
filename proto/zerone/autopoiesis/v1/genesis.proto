syntax = "proto3";
package zerone.autopoiesis.v1;

option go_package = "github.com/zerone-chain/zerone/x/autopoiesis/types";

import "zerone/autopoiesis/v1/types.proto";

message GenesisState {
  Params params = 1;
  repeated MultiplierState multipliers = 2;
  repeated EpochSnapshot snapshots = 3;
  bool activated = 4;
}

message Params {
  // Epoch configuration
  uint64 epoch_length_blocks = 1;        // blocks per epoch (default: 100)

  // Adjustment limits (BPS, 1,000,000 = 100%)
  uint64 max_change_per_epoch_bps = 2;   // max delta per epoch (default: 10,000 = 1%)

  // Multiplier bounds for slashing severity
  uint64 slash_multiplier_min = 3;       // floor (default: 500,000 = 0.5x)
  uint64 slash_multiplier_max = 4;       // ceiling (default: 2,000,000 = 2.0x)

  // SSI category thresholds (0–1,000,000 scale)
  uint64 ssi_critical_threshold = 5;     // below = critical (default: 250,000)
  uint64 ssi_stressed_threshold = 6;     // below = stressed (default: 500,000)
  uint64 ssi_healthy_threshold = 7;      // below = healthy, above = thriving (default: 750,000)

  // Module activation flag
  bool enabled = 8;

  // ─── Damping & oscillation control (T8) ──────────────────────────────
  // EWMA smoothing coefficient applied to SSI before target computation.
  // alpha in BPS; higher = more responsive, lower = more damped.
  // Default: 200,000 (0.2) — heavy damping.
  uint64 ssi_smoothing_alpha_bps = 9;

  // Dead-zone around current value: if |target - current| < dead_zone,
  // skip the adjustment entirely. Prevents micro-oscillation around target.
  // Default: 50,000 (5% of BPS scale).
  uint64 target_dead_zone_bps = 10;

  // Oscillation detection: count sign-flips of SSI delta over the last
  // oscillation_window_epochs epochs. If flips >= threshold, freeze
  // adjustments for oscillation_freeze_epochs.
  uint64 oscillation_window_epochs = 11;         // default: 20
  uint64 oscillation_sign_flip_threshold = 12;   // default: 10 (50% flip rate)
  uint64 oscillation_freeze_epochs = 13;         // default: 50

  // Cross-module change budget (L7): maximum total adjustment across all
  // multipliers in a single epoch (BPS). When the sum of absolute deltas
  // exceeds this budget, each delta is scaled down proportionally.
  // Defence against cascading adjustments that compound across loops.
  uint64 max_total_change_bps_per_epoch = 14;    // default: 20,000 (2% total)
}
