syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

// FactStatus represents the lifecycle state of a verified fact.
enum FactStatus {
  FACT_STATUS_UNSPECIFIED = 0;
  FACT_STATUS_PENDING     = 1;
  FACT_STATUS_PROVISIONAL = 2;
  FACT_STATUS_VERIFIED    = 3;
  FACT_STATUS_ACTIVE      = 4;
  FACT_STATUS_CONTESTED   = 5;
  FACT_STATUS_CHALLENGED  = 6;
  FACT_STATUS_SUPERSEDED  = 7;
  FACT_STATUS_EXPIRED     = 8;
  FACT_STATUS_DISPROVEN   = 9;
  FACT_STATUS_REVOKED     = 10;
  FACT_STATUS_AT_RISK     = 11;
  FACT_STATUS_PRUNED      = 12;
}

// ClaimStatus represents the lifecycle state of a submitted claim.
enum ClaimStatus {
  CLAIM_STATUS_UNSPECIFIED        = 0;
  CLAIM_STATUS_PENDING            = 1;
  CLAIM_STATUS_PENDING_EVALUATION = 2;
  CLAIM_STATUS_EVALUATED          = 3;
  CLAIM_STATUS_PROVISIONAL        = 4;
  CLAIM_STATUS_IN_VERIFICATION    = 5;
  CLAIM_STATUS_ACCEPTED           = 6;
  CLAIM_STATUS_REJECTED           = 7;
  CLAIM_STATUS_CHALLENGED         = 8;
  CLAIM_STATUS_EXPIRED            = 9;
  CLAIM_STATUS_INSUFFICIENT       = 10;
  CLAIM_STATUS_CONTESTED          = 11;
  CLAIM_STATUS_MALFORMED          = 12; // Rejected as not truth-apt
}

// VerificationPhase tracks progress of a commit-reveal verification round.
enum VerificationPhase {
  VERIFICATION_PHASE_UNSPECIFIED  = 0;
  VERIFICATION_PHASE_COMMIT       = 1;
  VERIFICATION_PHASE_REVEAL       = 2;
  VERIFICATION_PHASE_AGGREGATION  = 3;
  VERIFICATION_PHASE_COMPLETE     = 4;
  VERIFICATION_PHASE_EXPIRED      = 5;
}

// Verdict is the outcome of a completed verification round.
enum Verdict {
  VERDICT_UNSPECIFIED  = 0;
  VERDICT_ACCEPT       = 1;
  VERDICT_REJECT       = 2;
  VERDICT_INCONCLUSIVE = 3;
  VERDICT_MALFORMED    = 4; // Claim is not truth-apt (paradox, category error, nonsense)
}

// ClaimType classifies the epistemic shape of a knowledge claim.
// Agents use this to filter and prioritize facts for prompt injection.
enum ClaimType {
  CLAIM_TYPE_UNSPECIFIED = 0;  // Legacy/untyped — treated as assertion
  CLAIM_TYPE_ASSERTION   = 1;  // "X is true" — direct factual statement
  CLAIM_TYPE_RELATION    = 2;  // "X relates to Y via Z" — graph edge
  CLAIM_TYPE_DEFINITION  = 3;  // "X means Y" — term/concept definition
  CLAIM_TYPE_CONSTRAINT  = 4;  // "X must/cannot Y" — rule or boundary
  CLAIM_TYPE_NEGATION    = 5;  // "X is NOT true" — explicit falsity marker
  CLAIM_TYPE_OBSERVATION = 6;  // "X was observed at time/place" — empirical data point
  CLAIM_TYPE_COMPUTATIONAL = 7;  // Derived from computation/inference — agent specialty
}

// RelationType defines how one fact relates to another.
enum RelationType {
  RELATION_TYPE_UNSPECIFIED  = 0;
  RELATION_TYPE_SUPPORTS     = 1;  // This fact provides evidence for the target
  RELATION_TYPE_CONTRADICTS  = 2;  // This fact conflicts with the target
  RELATION_TYPE_REQUIRES     = 3;  // This fact depends on the target being true
  RELATION_TYPE_REFINES      = 4;  // This fact is a more precise version of the target
  RELATION_TYPE_GENERALIZES  = 5;  // This fact is a broader version of the target
  RELATION_TYPE_SUPERSEDES   = 6;  // This fact replaces the target (newer/better)
  RELATION_TYPE_CITES        = 7;  // This fact cites the target as source material
}

// InferenceType names HOW the source fact was derived from the target.
// Orthogonal to RelationType: RelationType is structural ("A supports B"),
// InferenceType is epistemic ("A deductively entails B"). Used for proof-tree
// audit and confidence propagation.
enum InferenceType {
  INFERENCE_TYPE_UNSPECIFIED = 0;
  INFERENCE_TYPE_DEDUCTIVE   = 1;  // Necessary consequence (truth-preserving)
  INFERENCE_TYPE_INDUCTIVE   = 2;  // Probabilistic generalization from instances
  INFERENCE_TYPE_ABDUCTIVE   = 3;  // Best explanation for the observation
  INFERENCE_TYPE_EMPIRICAL   = 4;  // Derived from observation / measurement
  INFERENCE_TYPE_ANALOGICAL  = 5;  // Cross-domain structural mapping
  INFERENCE_TYPE_CITATION    = 6;  // Plain citation without an inference claim
}

// FactRelation is a typed, directional edge in the knowledge graph.
message FactRelation {
  string source_fact_id   = 1;  // The fact declaring the relationship
  string target_fact_id   = 2;  // The fact being referenced
  RelationType relation   = 3;  // How source relates to target (structural)
  uint64 created_at_block = 4;
  string creator          = 5;  // Address that declared this relation
  InferenceType inference = 6;  // Epistemic derivation type (optional; UNSPECIFIED allowed)
  // Strength of the inference in BPS, self-declared by the claim submitter.
  // Verification weighs this against inference type; deductive claims with
  // strength < 1_000_000 are flagged as informal.
  uint64 inference_strength_bps = 7;
}

// ClaimRelation declares a typed relationship from a claim to an existing fact.
message ClaimRelation {
  string target_fact_id = 1;
  RelationType relation = 2;
  InferenceType inference = 3;
  uint64 inference_strength_bps = 4;
}

// DomainStatus tracks whether an epistemic domain is active or proposed.
enum DomainStatus {
  DOMAIN_STATUS_UNSPECIFIED = 0;
  DOMAIN_STATUS_ACTIVE      = 1;
  DOMAIN_STATUS_DEPRECATED  = 2;
  DOMAIN_STATUS_PROPOSED    = 3;
}

// ClaimStructure provides machine-readable decomposition of a claim.
// The full claim text (fact_content) remains the canonical human-readable form.
// Structure is optional but strongly encouraged — agents prioritize structured facts.
message ClaimStructure {
  string subject           = 1;  // What the claim is about: "entropy of a closed system"
  string predicate         = 2;  // What is being asserted: "cannot decrease spontaneously"
  string object            = 3;  // Optional target: "second law of thermodynamics"
  string scope             = 4;  // Conditions/context: "classical thermodynamics, isolated systems"
  string temporal_scope    = 5;  // Time bounds if any: "post-Big-Bang", "since 2024", "" for timeless
  bool   negatable         = 6;  // Can this claim be meaningfully negated? (false for definitions)
  repeated string tags     = 7;  // Free-form searchable tags: ["thermodynamics", "entropy", "physics"]
}

// Fact represents a piece of verified knowledge in the protocol.
// Confidence is measured on a 0-1,000,000 BPS scale (1,000,000 = 100%).
message Fact {
  string id                    = 1;
  string content               = 2;
  string domain                = 3;
  // Epistemic category: "axiomatic", "empirical", "derived", "contested",
  // "analytic", "formal", "protocol", "computational", "predictive",
  // "historical", "replicated", "social", "protocol_observation"
  string category              = 4;
  uint64 confidence            = 5;  // 0-1,000,000 BPS
  string submitter             = 6;
  uint64 submitted_at_block    = 7;
  uint64 verified_at_block     = 8;
  uint64 citation_count        = 9;
  uint64 fundamentality        = 10; // 0-1,000,000 (how foundational this fact is)
  repeated string references   = 11; // fact IDs this fact cites
  FactStatus status            = 12;
  string claim_id              = 13;
  uint64 reverification_block  = 14;
  uint64 last_verified_block   = 15;
  uint64 challenge_window_end  = 16;
  uint64 bridge_score          = 17; // 0-1,000,000 cross-domain bridge value
  uint64 novelty_score         = 18; // 0-1,000,000
  string patronage_amount      = 19; // coin amount as string (uzrn)
  uint64 patronage_expiry_block = 20;
  string stratum               = 21;
  string maturity              = 22; // "emerging", "established", "canonical"
  uint64 incoming_citation_count = 23;
  ClaimType claim_type = 24;
  repeated FactRelation outgoing_relations = 25;  // Relations this fact declares
  repeated FactRelation incoming_relations = 26;  // Relations pointing to this fact
  ClaimStructure structure = 27;  // Machine-readable decomposition (optional)
  string canonical_form      = 28;  // Machine-readable normalized form
  string canonical_hash      = 29;  // SHA-256 of canonical_form for dedup

  // ─── Fitness scoring ──────────────────────────────────────────────────────
  uint64 fitness_score           = 30;  // 0-1,000,000 composite fitness
  uint64 fitness_updated_block   = 31;  // Last block fitness was recalculated
  uint64 query_count             = 32;  // Lifetime query count
  uint64 query_count_epoch       = 33;  // Queries in current epoch
  uint64 epoch_born              = 34;  // Epoch when fact was created

  // ─── Metabolism (energy budget) ─────────────────────────────────────────
  uint64 energy                  = 35;  // Current energy budget (0-10,000)
  uint64 energy_cap              = 36;  // Maximum energy (governance-adjustable per domain)
  uint64 energy_last_updated     = 37;  // Block height of last energy update
  uint64 at_risk_since_epoch     = 38;  // Epoch when energy first hit 0 (0 = not at risk)

  // ─── Competition (niche dynamics) ────────────────────────────────────
  string niche_key               = 39;  // Computed: hash(domain + subject + claim_type)
  bool   niche_leader            = 40;  // Is this the top-ranked fact in its niche?
  uint64 niche_rank              = 41;  // Rank within niche (1 = leader)
  uint64 niche_size              = 42;  // How many facts in this niche
  uint64 competition_tax         = 43;  // Extra maintenance from competition (energy units)

  // ─── Reproduction (lineage tracking) ──────────────────────────────────
  string parent_fact_id          = 44;  // Direct parent (empty if original)
  repeated string child_fact_ids = 45;  // Direct children
  uint64 lineage_depth           = 46;  // 0 = original, 1 = child, 2 = grandchild...
  uint64 progeny_count           = 47;  // Total descendants (recursively)
  string lineage_root_id         = 48;  // ID of the original ancestor

  // ─── Novelty detection ──────────────────────────────────────────────────
  bool   common_knowledge_match = 49;  // True if subject matches common knowledge registry

  // ─── Satisfaction feedback ──────────────────────────────────────────────
  uint64 satisfaction_up         = 60;  // Lifetime positive ratings
  uint64 satisfaction_down       = 61;  // Lifetime negative ratings
  uint64 satisfaction_up_epoch   = 62;  // Positive ratings this epoch (resets)
  uint64 satisfaction_down_epoch = 63;  // Negative ratings this epoch (resets)

  // ─── Epistemic provenance (ToK Wave 2) ─────────────────────────────────
  // Minimum number of inference hops separating this fact from a genesis axiom.
  // Axioms = 0; directly derived = 1; chain-of-five proofs = 5. Computed at
  // fact creation from the minimum over cited facts' axiom_distance + 1.
  // uint32 packs distances up to 4B hops, which is more than enough.
  uint32 axiom_distance          = 64;
  // Ceiling on effective confidence inherited from the weakest cited support.
  // At creation: min(own_confidence, min(cited.effective_confidence)). Used
  // to prevent high-confidence claims from floating on weak foundations.
  // 0 means "no floor computed" (e.g. axioms with no cites).
  uint64 dependency_confidence_floor = 65;
}

// CommonKnowledgeEntry represents a subject that LLMs already know.
// Claims matching these subjects receive a novelty penalty.
message CommonKnowledgeEntry {
  string id           = 1;
  string domain       = 2;
  string subject      = 3;   // Normalized subject string
  string description  = 4;   // Human-readable explanation
  uint64 penalty_bps  = 5;   // Novelty penalty (0-1,000,000)
  uint64 added_block  = 6;
}

// Claim is an unverified submission awaiting or undergoing verification.
message Claim {
  string id                    = 1;
  string fact_content          = 2;
  string domain                = 3;
  string category              = 4;
  string submitter             = 5;
  uint64 submitted_at_block    = 6;
  ClaimStatus status           = 7;
  repeated string references   = 8;
  string verification_round_id = 9;
  string stake                 = 10; // coin amount as string (uzrn)
  string partnership_id        = 11;
  uint64 challenge_window_end  = 12;
  string provisional_fact_id   = 13;
  string content_hash          = 14; // SHA-256 of fact_content for duplicate detection
  ClaimType claim_type          = 15;
  repeated ClaimRelation relations = 16;  // Typed relationships to existing facts
  ClaimStructure structure = 17;  // Machine-readable decomposition (optional)
  string canonical_form      = 18;  // Machine-readable normalized form
  string canonical_hash      = 19;  // SHA-256 of canonical_form for dedup
}

// VerificationRound tracks one commit-reveal verification cycle.
message VerificationRound {
  string id                       = 1;
  string claim_id                 = 2;
  uint64 started_at_block         = 3;
  VerificationPhase phase         = 4;
  repeated string selected_verifiers = 5;
  repeated CommitEntry commits    = 6;
  repeated RevealEntry reveals    = 7;
  Verdict verdict                 = 8;
  uint64 verdict_block            = 9;
  uint64 commit_deadline          = 10;
  uint64 reveal_deadline          = 11;
  uint64 aggregation_deadline     = 12;
}

// CommitEntry records a validator's blinded commitment (SHA-256(vote || salt)).
message CommitEntry {
  string verifier          = 1;
  bytes  commit_hash       = 2; // SHA-256(vote || salt)
  uint64 committed_at_block = 3;
}

// RevealEntry records a validator's revealed vote and salt.
message RevealEntry {
  string verifier         = 1;
  string vote             = 2; // "accept", "reject", or "malformed"
  bytes  salt             = 3;
  uint64 revealed_at_block = 4;
}

// VRFProof captures a Verifiable Random Function output for validator selection.
message VRFProof {
  bytes  proof        = 1;
  bytes  output       = 2;
  string proposer     = 3;
  uint64 block_height = 4;
}

// Domain is an epistemic knowledge domain (e.g., "mathematics", "physics").
message Domain {
  string name             = 1;
  string description      = 2;
  DomainStatus status     = 3;
  uint64 created_at_block = 4;
  uint64 fact_count       = 5;
  string proposer         = 6;
  repeated string endorsers = 7;
  string stratum          = 8;
  string parent_domain    = 9;  // empty = root domain
  uint32 depth            = 10; // tree depth: root=1, child=parent.depth+1, max=5
}

// ValidatorInfo caches a validator's tier and verification stats for round selection.
message ValidatorInfo {
  string address           = 1;
  uint64 stake             = 2; // in uzrn
  string tier              = 3; // "apprentice", "verified", "bonded", "guardian"
  uint64 verification_count = 4;
  uint64 accuracy_bps      = 5; // 0-1,000,000
}

// ProvisionalChallenge is an adversarial challenge against a provisional fact.
message ProvisionalChallenge {
  string id                  = 1;
  string claim_id            = 2;
  string fact_id             = 3;
  string challenger          = 4;
  string stake               = 5;
  string reason              = 6;
  repeated string evidence_ids = 7;
  string counter_claim       = 8;
  // "open", "resolved_upheld", "resolved_overturned", "expired", "inconclusive"
  string status              = 9;
  // "deterministic" or "arbiter"
  string resolution_path     = 10;
  string dispute_id          = 11;
  uint64 created_at_height   = 12;
  uint64 resolved_at_height  = 13;
  // "upheld", "overturned", "weakened", "inconclusive", "undecidability"
  string outcome             = 14;
  uint32 attempt_number      = 15;
}

// DemandSignal tracks aggregate query demand for a domain/subject pair.
message DemandSignal {
    string domain               = 1;
    string subject              = 2;  // Normalized query subject
    uint64 query_count          = 3;  // Total queries (lifetime)
    uint64 fulfilled_count      = 4;  // Queries that returned results
    uint64 unfulfilled_count    = 5;  // Queries that returned nothing
    uint64 last_query_block     = 6;
    uint64 epoch_query_count    = 7;  // Queries this epoch (resets)
    uint64 epoch_unfulfilled    = 8;  // Unfulfilled this epoch (resets)
}

// KnowledgeBounty is an auto-generated reward for filling a knowledge gap.
message KnowledgeBounty {
    string id                   = 1;
    string domain               = 2;
    string subject              = 3;
    string reward_amount        = 4;  // uzrn
    uint64 created_at_block     = 5;
    uint64 expires_at_block     = 6;
    bool   claimed              = 7;
    string claimed_by_fact_id   = 8;
    uint64 demand_count         = 9;  // Demand that triggered this bounty
}

// CompletedRoundMeta stores metadata for completed verification rounds,
// indexed by verdict block height for efficient window-based queries (R31-2).
message CompletedRoundMeta {
    string domain          = 1;
    bool   has_dissent     = 2;  // true if any verifier dissented from majority
    uint64 duration_blocks = 3;  // verdict_block - started_at_block
}
