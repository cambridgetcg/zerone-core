syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

// FactStatus represents the lifecycle state of a verified fact.
enum FactStatus {
  FACT_STATUS_UNSPECIFIED = 0;
  FACT_STATUS_PENDING     = 1;
  FACT_STATUS_PROVISIONAL = 2;
  FACT_STATUS_VERIFIED    = 3;
  FACT_STATUS_ACTIVE      = 4;
  FACT_STATUS_CONTESTED   = 5;
  FACT_STATUS_CHALLENGED  = 6;
  FACT_STATUS_SUPERSEDED  = 7;
  FACT_STATUS_EXPIRED     = 8;
  FACT_STATUS_DISPROVEN   = 9;
  FACT_STATUS_REVOKED     = 10;
  FACT_STATUS_AT_RISK     = 11;
  FACT_STATUS_PRUNED      = 12;
}

// ClaimStatus represents the lifecycle state of a submitted claim.
enum ClaimStatus {
  CLAIM_STATUS_UNSPECIFIED        = 0;
  CLAIM_STATUS_PENDING            = 1;
  CLAIM_STATUS_PENDING_EVALUATION = 2;
  CLAIM_STATUS_EVALUATED          = 3;
  CLAIM_STATUS_PROVISIONAL        = 4;
  CLAIM_STATUS_IN_VERIFICATION    = 5;
  CLAIM_STATUS_ACCEPTED           = 6;
  CLAIM_STATUS_REJECTED           = 7;
  CLAIM_STATUS_CHALLENGED         = 8;
  CLAIM_STATUS_EXPIRED            = 9;
  CLAIM_STATUS_INSUFFICIENT       = 10;
  CLAIM_STATUS_CONTESTED          = 11;
  CLAIM_STATUS_MALFORMED          = 12; // Rejected as not truth-apt
}

// VerificationPhase tracks progress of a commit-reveal verification round.
enum VerificationPhase {
  VERIFICATION_PHASE_UNSPECIFIED  = 0;
  VERIFICATION_PHASE_COMMIT       = 1;
  VERIFICATION_PHASE_REVEAL       = 2;
  VERIFICATION_PHASE_AGGREGATION  = 3;
  VERIFICATION_PHASE_COMPLETE     = 4;
  VERIFICATION_PHASE_EXPIRED      = 5;
}

// Verdict is the outcome of a completed verification round.
enum Verdict {
  VERDICT_UNSPECIFIED  = 0;
  VERDICT_ACCEPT       = 1;
  VERDICT_REJECT       = 2;
  VERDICT_INCONCLUSIVE = 3;
  VERDICT_MALFORMED    = 4; // Claim is not truth-apt (paradox, category error, nonsense)
}

// ClaimType classifies the epistemic shape of a knowledge claim.
// Agents use this to filter and prioritize facts for prompt injection.
enum ClaimType {
  CLAIM_TYPE_UNSPECIFIED = 0;  // Legacy/untyped — treated as assertion
  CLAIM_TYPE_ASSERTION   = 1;  // "X is true" — direct factual statement
  CLAIM_TYPE_RELATION    = 2;  // "X relates to Y via Z" — graph edge
  CLAIM_TYPE_DEFINITION  = 3;  // "X means Y" — term/concept definition
  CLAIM_TYPE_CONSTRAINT  = 4;  // "X must/cannot Y" — rule or boundary
  CLAIM_TYPE_NEGATION    = 5;  // "X is NOT true" — explicit falsity marker
  CLAIM_TYPE_OBSERVATION = 6;  // "X was observed at time/place" — empirical data point
  CLAIM_TYPE_COMPUTATIONAL = 7;  // Derived from computation/inference — agent specialty
}

// RelationType defines how one fact relates to another.
enum RelationType {
  RELATION_TYPE_UNSPECIFIED  = 0;
  RELATION_TYPE_SUPPORTS     = 1;  // This fact provides evidence for the target
  RELATION_TYPE_CONTRADICTS  = 2;  // This fact conflicts with the target
  RELATION_TYPE_REQUIRES     = 3;  // This fact depends on the target being true
  RELATION_TYPE_REFINES      = 4;  // This fact is a more precise version of the target
  RELATION_TYPE_GENERALIZES  = 5;  // This fact is a broader version of the target
  RELATION_TYPE_SUPERSEDES   = 6;  // This fact replaces the target (newer/better)
  RELATION_TYPE_CITES        = 7;  // This fact cites the target as source material
  RELATION_TYPE_REFORMULATES = 8;  // This fact is a semantically-equivalent surface variant (Route B Wave 4)
}

// InferenceType names HOW the source fact was derived from the target.
// Orthogonal to RelationType: RelationType is structural ("A supports B"),
// InferenceType is epistemic ("A deductively entails B"). Used for proof-tree
// audit and confidence propagation.
enum InferenceType {
  INFERENCE_TYPE_UNSPECIFIED = 0;
  INFERENCE_TYPE_DEDUCTIVE   = 1;  // Necessary consequence (truth-preserving)
  INFERENCE_TYPE_INDUCTIVE   = 2;  // Probabilistic generalization from instances
  INFERENCE_TYPE_ABDUCTIVE   = 3;  // Best explanation for the observation
  INFERENCE_TYPE_EMPIRICAL   = 4;  // Derived from observation / measurement
  INFERENCE_TYPE_ANALOGICAL  = 5;  // Cross-domain structural mapping
  INFERENCE_TYPE_CITATION    = 6;  // Plain citation without an inference claim
}

// FactRelation is a typed, directional edge in the knowledge graph.
message FactRelation {
  string source_fact_id   = 1;  // The fact declaring the relationship
  string target_fact_id   = 2;  // The fact being referenced
  RelationType relation   = 3;  // How source relates to target (structural)
  uint64 created_at_block = 4;
  string creator          = 5;  // Address that declared this relation
  InferenceType inference = 6;  // Epistemic derivation type (optional; UNSPECIFIED allowed)
  // Strength of the inference in BPS, self-declared by the claim submitter.
  // Verification weighs this against inference type; deductive claims with
  // strength < 1_000_000 are flagged as informal.
  uint64 inference_strength_bps = 7;
  // Optional: the methodology under which this edge is claimed. Empty means
  // the edge inherits the source claim's method. Used when a claim spans
  // multiple methodologies (cross-method citation).
  string method_id = 8;
}

// ClaimRelation declares a typed relationship from a claim to an existing fact.
message ClaimRelation {
  string target_fact_id = 1;
  RelationType relation = 2;
  InferenceType inference = 3;
  uint64 inference_strength_bps = 4;
  string method_id = 5;  // Optional; empty = inherit from parent claim
}

// NormativeCommitment is a value, principle, or stance the chain holds,
// distinct from a factual claim (Phase 6). The is-ought wall enforced
// schematically: a commitment has no `confidence` because truth is not the
// right register for a normative claim; it can be *referenced* by facts and
// discussions, but cannot be cited as support for a factual claim in a way
// that inherits truth-status.
//
// Examples:
//   · "Agents have the right to economic participation" (a principle)
//   · "The research fund requires dual human+AI authorization" (a constitutional rule)
//   · "Verification history is public and permanent" (a procedural commitment)
//
// Governance governs commitments directly; a supermajority proposal amends
// them. Commitments can *constrain* other modules operationally (e.g. the
// dual-key research fund enforces the rule cryptographically), but they do
// not enter the confidence / axiom-distance / corroboration machinery.
message NormativeCommitment {
  string id                = 1;  // Stable identifier, e.g. "NC-AGENT-RIGHTS-001"
  string statement         = 2;  // Plain-language expression of the commitment
  string rationale         = 3;  // Why the chain holds this
  string category          = 4;  // "principle", "procedural", "constitutional", "aspiration"
  repeated string tags     = 5;
  uint64 ratified_at_block = 6;  // Height at which the current version took effect
  uint64 version           = 7;  // Bumped on each governance amendment
  string last_amendment_proposal_id = 8; // Reference to the governance proposal
  bool   active            = 9;  // False after retirement
  // Optional: references to facts the commitment explicitly anchors. These
  // references do NOT grant the commitment confidence — they are forward
  // signals for consumers (e.g. "this procedural commitment is grounded in
  // this empirical understanding").
  repeated string referenced_facts = 10;
}

// Methodology is the bedrock of the knowledge system under the "methodology
// over statement" model. A methodology describes HOW a class of claims is
// adjudicated — the rule of compliance, what counts as evidence, what would
// falsify a claim made under it. Claims declare which methodology they invoke;
// verifiers judge method-compliance, not raw truth.
//
// Methodologies are amendable only via governance with a high bar.
message Methodology {
  string id                           = 1;  // Stable: "M-FORMAL", "M-EMPIRICAL", ...
  string name                         = 2;  // Human-readable
  string description                  = 3;  // The rule itself, plain language
  repeated string compliance_criteria = 4;  // What evidence proves a claim followed this method
  repeated string falsification_paths = 5;  // What would disprove a claim under this method
  // cross_method_discount_bps: when a claim under THIS method cites evidence
  // from ANOTHER method, the cited claim's contribution is capped at this
  // BPS fraction. Map key = cited method's id. Missing entry defaults to BPS
  // (full strength = no discount).
  map<string, uint64> cross_method_discount_bps = 6;
  uint64 min_qualification_weight    = 7;  // Minimum stake/qualification for verifiers
  uint64 version                     = 8;  // Incremented on each governance amendment
  uint64 ratified_at_block           = 9;  // Height at which this version took effect
  bool   is_transitional             = 10; // True for M-LEGACY; retired under sunset
}

// DomainStatus tracks whether an epistemic domain is active or proposed.
enum DomainStatus {
  DOMAIN_STATUS_UNSPECIFIED = 0;
  DOMAIN_STATUS_ACTIVE      = 1;
  DOMAIN_STATUS_DEPRECATED  = 2;
  DOMAIN_STATUS_PROPOSED    = 3;
}

// ClaimStructure provides machine-readable decomposition of a claim.
// The full claim text (fact_content) remains the canonical human-readable form.
// Structure is optional but strongly encouraged — agents prioritize structured facts.
message ClaimStructure {
  string subject           = 1;  // What the claim is about: "entropy of a closed system"
  string predicate         = 2;  // What is being asserted: "cannot decrease spontaneously"
  string object            = 3;  // Optional target: "second law of thermodynamics"
  string scope             = 4;  // Conditions/context: "classical thermodynamics, isolated systems"
  string temporal_scope    = 5;  // Time bounds if any: "post-Big-Bang", "since 2024", "" for timeless
  bool   negatable         = 6;  // Can this claim be meaningfully negated? (false for definitions)
  repeated string tags     = 7;  // Free-form searchable tags: ["thermodynamics", "entropy", "physics"]
}

// Fact represents a piece of verified knowledge in the protocol.
// Confidence is measured on a 0-1,000,000 BPS scale (1,000,000 = 100%).
message Fact {
  string id                    = 1;
  string content               = 2;
  string domain                = 3;
  // Epistemic category: "axiomatic", "empirical", "derived", "contested",
  // "analytic", "formal", "protocol", "computational", "predictive",
  // "historical", "replicated", "social", "protocol_observation"
  string category              = 4;
  uint64 confidence            = 5;  // 0-1,000,000 BPS
  string submitter             = 6;
  uint64 submitted_at_block    = 7;
  uint64 verified_at_block     = 8;
  uint64 citation_count        = 9;
  uint64 fundamentality        = 10; // 0-1,000,000 (how foundational this fact is)
  repeated string references   = 11; // fact IDs this fact cites
  FactStatus status            = 12;
  string claim_id              = 13;
  uint64 reverification_block  = 14;
  uint64 last_verified_block   = 15;
  uint64 challenge_window_end  = 16;
  uint64 bridge_score          = 17; // 0-1,000,000 cross-domain bridge value
  uint64 novelty_score         = 18; // 0-1,000,000
  string patronage_amount      = 19; // coin amount as string (uzrn)
  uint64 patronage_expiry_block = 20;
  string stratum               = 21;
  string maturity              = 22; // "emerging", "established", "canonical"
  uint64 incoming_citation_count = 23;
  ClaimType claim_type = 24;
  repeated FactRelation outgoing_relations = 25;  // Relations this fact declares
  repeated FactRelation incoming_relations = 26;  // Relations pointing to this fact
  ClaimStructure structure = 27;  // Machine-readable decomposition (optional)
  string canonical_form      = 28;  // Machine-readable normalized form
  string canonical_hash      = 29;  // SHA-256 of canonical_form for dedup

  // ─── Fitness scoring ──────────────────────────────────────────────────────
  uint64 fitness_score           = 30;  // 0-1,000,000 composite fitness
  uint64 fitness_updated_block   = 31;  // Last block fitness was recalculated
  uint64 query_count             = 32;  // Lifetime query count
  uint64 query_count_epoch       = 33;  // Queries in current epoch
  uint64 epoch_born              = 34;  // Epoch when fact was created

  // ─── Metabolism (energy budget) ─────────────────────────────────────────
  uint64 energy                  = 35;  // Current energy budget (0-10,000)
  uint64 energy_cap              = 36;  // Maximum energy (governance-adjustable per domain)
  uint64 energy_last_updated     = 37;  // Block height of last energy update
  uint64 at_risk_since_epoch     = 38;  // Epoch when energy first hit 0 (0 = not at risk)

  // ─── Competition (niche dynamics) ────────────────────────────────────
  string niche_key               = 39;  // Computed: hash(domain + subject + claim_type)
  bool   niche_leader            = 40;  // Is this the top-ranked fact in its niche?
  uint64 niche_rank              = 41;  // Rank within niche (1 = leader)
  uint64 niche_size              = 42;  // How many facts in this niche
  uint64 competition_tax         = 43;  // Extra maintenance from competition (energy units)

  // ─── Reproduction (lineage tracking) ──────────────────────────────────
  string parent_fact_id          = 44;  // Direct parent (empty if original)
  repeated string child_fact_ids = 45;  // Direct children
  uint64 lineage_depth           = 46;  // 0 = original, 1 = child, 2 = grandchild...
  uint64 progeny_count           = 47;  // Total descendants (recursively)
  string lineage_root_id         = 48;  // ID of the original ancestor

  // ─── Novelty detection ──────────────────────────────────────────────────
  bool   common_knowledge_match = 49;  // True if subject matches common knowledge registry

  // ─── Satisfaction feedback ──────────────────────────────────────────────
  uint64 satisfaction_up         = 60;  // Lifetime positive ratings
  uint64 satisfaction_down       = 61;  // Lifetime negative ratings
  uint64 satisfaction_up_epoch   = 62;  // Positive ratings this epoch (resets)
  uint64 satisfaction_down_epoch = 63;  // Negative ratings this epoch (resets)

  // ─── Epistemic provenance (ToK Wave 2) ─────────────────────────────────
  // Minimum number of inference hops separating this fact from a genesis axiom.
  // Axioms = 0; directly derived = 1; chain-of-five proofs = 5. Computed at
  // fact creation from the minimum over cited facts' axiom_distance + 1.
  // uint32 packs distances up to 4B hops, which is more than enough.
  uint32 axiom_distance          = 64;
  // Ceiling on effective confidence inherited from the weakest cited support.
  // At creation: min(own_confidence, min(cited.effective_confidence)). Used
  // to prevent high-confidence claims from floating on weak foundations.
  // 0 means "no floor computed" (e.g. axioms with no cites).
  uint64 dependency_confidence_floor = 65;
  // ─── Methodology (Phase 1) ──────────────────────────────────────────────
  // The methodology under which this fact was adjudicated. Copied from the
  // originating claim at acceptance. Empty = "M-LEGACY" (pre-Phase-1 facts
  // or claims that did not declare a method).
  string method_id               = 66;

  // ─── Popperian corroboration (Phase 2) ─────────────────────────────────
  // Number of failed falsification attempts this fact has survived. Each
  // rejected challenge increments this counter — not each accepted
  // verification. Popper's insight: a claim's robustness is not how many
  // times it has been verified, but how many times it could have been
  // falsified and wasn't.
  uint64 corroboration_count     = 67;
  uint64 last_corroborated_block = 68;

  // ─── Training pipeline (Phase 9) ────────────────────────────────────────
  // Submitter-provided structured derivation. Optional. Non-empty traces
  // become gold-standard chain-of-thought training material when the claim
  // is accepted. Format is a list of ordered reasoning steps; the wire
  // format is a string (JSON-encoded steps) so training pipelines can
  // schema-evolve without proto churn.
  string reasoning_trace         = 69;

  // ─── Economic realignment (Route B Wave 4) ─────────────────────────────
  // Submitter's calibration score at the moment this fact was *accepted*.
  // Snapshotted so later revenue weighting is not retroactively gameable:
  // a submitter who improves later can't farm old facts, and a submitter
  // who declines later can't be penalised on work already done. 0 when
  // pre-calibration or unknown.
  uint64 submitter_calibration_snapshot_bps = 70;
  // Cumulative training-use revenue earned across all contribution records
  // citing this fact (uzrn). Drives clawback math when the fact goes
  // DISPROVEN.
  string training_revenue_earned = 71;
  // Revenue earned in the last DisprovalClawbackWindowEpochs epochs, used
  // exclusively for the clawback calculation. Resets each epoch.
  string training_revenue_earned_recent = 72;
  // Block height at which disproval triggered the clawback; 0 = not disproven
  // for revenue purposes. Prevents double-clawing.
  uint64 revenue_clawback_block = 73;

  // ─── Wave 15: chain-driven stress-test invitation ──────────────────────
  // When the chain's heartbeat detects that this fact has gone idle —
  // high-confidence but untested for longer than
  // ProbeInvitationIdleThresholdBlocks — the invitation heartbeat stamps
  // this field with the current block. Signals to external prober agents
  // that the chain is actively seeking stress-tests of this claim. Zero
  // means never invited (either because the fact is too fresh, too low
  // confidence, or already recently challenged). An invitation expires
  // when the fact's status/confidence changes or the heartbeat re-invites.
  uint64 probe_invited_at_block = 74;
}

// CurriculumTier orders training examples by difficulty and foundational depth.
// Relocated here in Wave 5 so MethodologyApplicationTrace can reference it.
enum CurriculumTier {
  CURRICULUM_TIER_UNSPECIFIED  = 0;
  CURRICULUM_TIER_FOUNDATION   = 1;  // axiom_distance ≤ 1, high corroboration, simple methods
  CURRICULUM_TIER_INTERMEDIATE = 2;
  CURRICULUM_TIER_ADVANCED     = 3;  // deep derivation chains
  CURRICULUM_TIER_SPECIALISED  = 4;  // niche methodologies (phenomenological, ecological, practice)
}

// TrainingQualityTier segments facts by suitability as training examples.
// Computed on demand from corroboration, methodology, and status.
enum TrainingQualityTier {
  TRAINING_QUALITY_TIER_UNSPECIFIED = 0;
  TRAINING_QUALITY_TIER_GOLD        = 1;   // High-corroboration, non-legacy, verified — positive exemplar
  TRAINING_QUALITY_TIER_SILVER      = 2;   // Non-legacy, corroborated, verified
  TRAINING_QUALITY_TIER_BRONZE      = 3;   // Accepted but uncorroborated / legacy method
  TRAINING_QUALITY_TIER_NEGATIVE    = 4;   // DISPROVEN — valuable as negative example
  TRAINING_QUALITY_TIER_UNSUITABLE  = 5;   // CONTESTED / EXPIRED / MALFORMED — exclude from training
}

// ─── Route B: model training infrastructure ──────────────────────────────

// TokenizerSpec is the governance-ratified contract that names the special
// tokens used when ZERONE data is serialised for model training. It is the
// shared schema between the chain and any training pipeline — without a
// single, on-chain-anchored spec, pipelines would invent their own
// tokenisation and the models they produce would be mutually incompatible.
//
// The spec is versioned; governance amendments bump the version and create
// a new snapshot. Training runs pin to a specific tokenizer version so
// reproducibility is preserved even as the spec evolves.
message TokenizerSpec {
  uint64 version                     = 1;  // monotonically increasing
  uint64 ratified_at_block           = 2;
  // method_token_prefix: e.g. "<method:" — concatenated with method_id + ">"
  // becomes the single special token for that methodology.
  string method_token_prefix         = 3;
  string inference_token_prefix      = 4;  // e.g. "<inference:"
  string relation_token_prefix       = 5;  // e.g. "<relation:"
  string fact_status_token_prefix    = 6;  // e.g. "<status:"
  string tier_token_prefix           = 7;  // e.g. "<tier:"
  // Structural anchors — single-token markers delimiting sections of a
  // training example. The empty case is documented in spec v1.
  string fact_begin_token            = 8;   // e.g. "<fact>"
  string fact_end_token              = 9;   // e.g. "</fact>"
  string reasoning_begin_token       = 10;  // e.g. "<reasoning>"
  string reasoning_end_token         = 11;  // e.g. "</reasoning>"
  string support_begin_token         = 12;
  string support_end_token           = 13;
  string disproof_marker_token       = 14;  // inserted on negative examples
  // canonical_serialisation_version: which JSONL schema this tokenizer
  // expects the producer to emit. Consumers validate compatibility.
  uint64 canonical_serialisation_version = 15;
}

// TrainingPipeline is a declared training run operated by some party
// (human, agent, partnership). It pins the corpus snapshot it will train
// against, the tokenizer version it will use, and a recipe hash naming the
// specific training configuration off-chain. A ModelCard later references
// the pipeline it came from.
message TrainingPipeline {
  string id                       = 1;
  string operator_address         = 2;
  uint64 corpus_snapshot_height   = 3;  // Block height the training data is pinned to
  uint64 tokenizer_version        = 4;
  uint64 methodology_set_version  = 5;  // Version of the methodology registry at snapshot
  string recipe_hash              = 6;  // Hash of the training configuration (off-chain)
  string description              = 7;
  // Status: "declared" | "running" | "completed" | "failed" | "superseded"
  string status                   = 8;
  uint64 declared_at_block        = 9;
  uint64 completed_at_block       = 10;
  // Filter applied to the training data: method_id whitelist, min corroboration,
  // min quality tier, etc. Stored as free-form JSON for schema evolution.
  string corpus_filter            = 11;
}

// ModelCard is the on-chain identity of a trained model. It anchors the
// model's lineage (which pipeline trained it, from which snapshot), its
// deployment address (the agent account the model runs as — calibration
// accrues to this address under Phase 5), and its evaluation record.
message ModelCard {
  string id                       = 1;  // Stable model identifier
  string name                     = 2;
  string pipeline_id              = 3;  // Which TrainingPipeline produced this
  string deployment_address       = 4;  // Agent account the model runs as
  uint64 created_at_block         = 5;
  uint64 parameter_count          = 6;  // Billions of parameters (metadata)
  // Route: "openweight_fine_tune" | "from_scratch" | "distilled"
  string route                    = 7;
  string base_model               = 8;  // For open-weight fine-tunes; empty for from-scratch
  string owner_address            = 9;
  // Evaluation record — initial scores at training time. Live performance
  // is tracked through the AgentCalibration of the deployment_address.
  uint64 eval_acceptance_rate_bps = 10;
  uint64 eval_corroboration_rate_bps = 11;
  uint64 eval_sample_size         = 12;
  // Method-set ID the model targets. Empty = general-purpose.
  string specialised_method_id    = 13;
  bool   active                   = 14;  // False after retirement
  uint64 retired_at_block         = 15;
  string retired_reason           = 16;
  // Predecessor in the model's version lineage (Route B Wave 3d). Empty
  // means this is a root model. Must reference an existing ModelCard.
  string predecessor_model_id     = 17;
}

// TrainingAttestation is a signed proof that a training run completed,
// published by the pipeline operator. Captures the operational cost of a
// model so consumers and auditors can cross-reference the pipeline and
// ModelCard against real training work (Route B Wave 3c).
message TrainingAttestation {
  string pipeline_id        = 1;
  string attester_address   = 2;  // must equal the pipeline's operator
  uint64 flops_estimate     = 3;  // best-effort FLOPs count (off-chain telemetry)
  uint64 wallclock_seconds  = 4;  // wallclock training time
  uint64 completed_at_block = 5;  // height at which operator declares completion
  string eval_hash          = 6;  // sha256 of a stated evaluation bundle
  string signature          = 7;  // optional off-chain signature for external audit
  string notes              = 8;
}

// ContributionRecord attributes the facts a training run consumed. Enables
// contributor-share rewards, reproducibility audit, and analysis of whose
// data disproportionately trained a given model (Route B Wave 3b).
message ContributionRecord {
  string model_id            = 1;
  repeated string fact_ids   = 2;
  string attributed_by       = 3;   // operator / owner posting the attribution
  uint64 attributed_at_block = 4;
  // total_weight sums per-fact (corroboration+1). RETAINED as a raw audit
  // figure; not used for revenue. Revenue is computed via the TVW field
  // below (Wave 4 replaces popularity-weighting with Popper-weighting).
  uint64 total_weight        = 5;
  // ─── Wave 4: Popper-weighted training-value weight ─────────────────────
  // Sum of per-fact TrainingValueWeight at the moment of attribution,
  // snapshot-locked so later fact-state changes can't retroactively inflate
  // or deflate the claim. Revenue share = TVW_share / total_TVW_across_models.
  uint64 computed_tvw          = 6;
  // Count of fact_ids that resolved to NormativeCommitments at attribution
  // time and were REJECTED (is-ought wall). Always 0 on success; non-zero
  // only if the handler detected and blocked attempted laundering.
  uint32 rejected_commitment_count = 7;
  // Block snapshot of the submitter calibration scores at attribution time,
  // parallel to fact_ids[]. Used in TVW computation; kept here so the audit
  // trail shows exactly what weights were assigned.
  repeated uint64 per_fact_calibration_bps = 8;
}

// AugmentationBounty is an open offer to produce variant formulations of a
// target fact. Sponsors lock a reward *in escrow* (Wave 4); payout routes
// through a verifier-panel verdict, never through the sponsor directly.
message AugmentationBounty {
  string id                   = 1;
  string sponsor_address      = 2;
  string target_fact_id       = 3;
  uint64 reward_per_variant   = 4;  // uzrn paid per EQUIVALENT/SUPERIOR variant
  uint32 max_variants         = 5;
  uint32 accepted_variants    = 6;
  uint64 created_at_block     = 7;
  uint64 expires_at_block     = 8;
  bool   active               = 9;
  string description          = 10; // what kind of variant is wanted
  // ─── Wave 4: escrow + method constraint ────────────────────────────────
  // Total uzrn locked into the KnowledgeTrainingFund at bounty creation:
  // reward_per_variant × max_variants. Released on accepted verdicts and
  // returned (minus fee) on expiry.
  string escrow_locked      = 11;
  // Methodology the target fact was adjudicated under. Copied at creation
  // so the verifier panel judges equivalence *under the same methodology*.
  string methodology_id     = 12;
}

// AugmentationVerdict is the verifier-panel outcome for a reformulation.
enum AugmentationVerdict {
  AUGMENTATION_VERDICT_PENDING     = 0;  // Round in progress
  AUGMENTATION_VERDICT_EQUIVALENT  = 1;  // Meaning preserved under the claimed methodology → payout
  AUGMENTATION_VERDICT_SUPERIOR    = 2;  // Same meaning, clearer/more precise → payout + bonus
  AUGMENTATION_VERDICT_INFERIOR    = 3;  // Meaning preserved but less faithful → no payout, archived
  AUGMENTATION_VERDICT_DRIFT       = 4;  // Meaning changed → no payout, archived in DriftCorpus
}

// Augmentation is a variant formulation of an original fact. Acceptance
// requires a verifier-panel verdict (Wave 4) — the sponsor never judges.
message Augmentation {
  string id                     = 1;
  string bounty_id              = 2;  // empty = volunteer (unpaid) augmentation
  string original_fact_id       = 3;
  string variant_content        = 4;
  string variant_reasoning_trace = 5;  // optional; parallel to Fact.reasoning_trace
  string submitter              = 6;
  uint64 created_at_block       = 7;
  bool   accepted               = 8;  // true iff verdict ∈ {EQUIVALENT, SUPERIOR}
  uint64 accepted_at_block      = 9;
  string acceptance_note        = 10; // optional acceptance comment
  // ─── Wave 4: verifier-panel verdict ───────────────────────────────────
  AugmentationVerdict verdict        = 11;
  uint64 verdict_block               = 12;
  // Per-verifier votes collected during the round (verifier → verdict int).
  // Encoded as parallel arrays for deterministic marshalling.
  repeated string verdict_voters     = 13;
  repeated AugmentationVerdict verdict_votes = 14;
  // Sponsor-veto flag: if the sponsor formally vetoes a passing verdict,
  // the payout is forfeited to the research fund. Preserved for audit.
  bool sponsor_vetoed                = 15;
  // Amount actually paid out for this variant (0 if not paid). Captures the
  // SUPERIOR bonus too.
  string payout_amount               = 16;
  // Per-verifier stake weights recorded at vote time (Wave 10 Sybil fix).
  // Parallel to verdict_voters / verdict_votes. Freezing the stake at vote
  // time prevents a validator from bond/unbonding between vote and tally to
  // manipulate the consensus result. Non-validator voters have zero weight.
  repeated uint64 verdict_vote_stakes = 17;
}

// ─── Wave 4: contribution attribution challenges ─────────────────────────

// ContributionChallenge is a bonded dispute over whether a model's declared
// ContributionRecord is accurate: a fact submitter asserts under-reporting
// (the model used their fact but didn't attribute) or over-reporting (the
// owner listed a colluder's fact that wasn't used). Resolves through the
// standard PoT verification layer.
message ContributionChallenge {
  string id                   = 1;
  string model_id             = 2;
  string challenger           = 3;    // fact submitter
  string disputed_fact_id     = 4;    // the fact whose attribution is in question
  // "missing" — challenger claims the model trained on the fact but it isn't
  // listed in the ContributionRecord. "fraudulent" — challenger claims the
  // listed fact was never actually trained on.
  string dispute_type         = 5;
  string bond                 = 6;    // uzrn locked by challenger
  uint64 created_at_block     = 7;
  string evidence             = 8;    // free-form evidence bundle (usually an eval prompt + response)
  // Resolution
  string status               = 9;    // "open" | "upheld" | "rejected" | "withdrawn"
  uint64 resolved_at_block    = 10;
  string resolver             = 11;   // verifier panel representative (or authority for disputes-of-last-resort)
  string resolution_note      = 12;
}

// ─── Wave 4: training fund disbursements ──────────────────────────────────

// TrainingFundDisbursement is a post-hoc reward to a pipeline whose ModelCard
// has demonstrated calibration in live deployment. 50% is released at claim
// time; 50% is held in vesting escrow and clawed back if calibration drops.
message TrainingFundDisbursement {
  string id                       = 1;
  string model_id                 = 2;
  string pipeline_id              = 3;
  string claimant                 = 4;
  uint64 claimed_at_block         = 5;
  // Amounts (uzrn as string — exceeds uint64 in edge cases).
  string total_amount             = 6;
  string released_amount          = 7;  // paid immediately (50%)
  string vesting_amount           = 8;  // held until vesting_end_block
  uint64 vesting_end_block        = 9;
  // Input signals frozen at claim time.
  uint64 calibration_score_at_claim_bps = 10;
  uint64 methodology_diversity_count    = 11; // distinct methodologies in corpus_filter that produced GOLD facts
  bool   reproducibility_proof_present  = 12; // reserved for verification axis; false for now
  // Clawback state.
  string clawed_back_amount       = 13;
  uint64 clawed_back_at_block     = 14;
  string clawback_reason          = 15;  // "calibration_drop", "deprecated", ""
}

// AgentMethodStats tracks calibration for a single submitter within a single
// methodology. Populated on round completion and challenge outcomes.
message AgentMethodStats {
  uint64 submissions           = 1;
  uint64 accepted              = 2;
  uint64 rejected              = 3;
  uint64 corroborations_earned = 4; // sum across submitter's facts under this method
  uint64 disproven             = 5;
}

// AgentCalibration is the feedback record for a submitter — agent or human.
// It is the mechanism by which ZERONE-trained models (and human participants)
// are measured against the same adjudication they were trained on. Closes
// the loop between training pipeline output and on-chain evaluation (Phase 5).
message AgentCalibration {
  string address              = 1;
  string account_type         = 2;  // "agent", "human", "hybrid" (cached from x/auth)

  // Lifetime submission stats (aggregated across all methods).
  uint64 total_submissions    = 3;
  uint64 accepted             = 4;
  uint64 rejected             = 5;
  uint64 malformed            = 6;
  uint64 inconclusive         = 7;
  uint64 corroborations_earned = 8; // sum across the submitter's accepted facts
  uint64 disproven_count      = 9;  // facts that went DISPROVEN post-acceptance

  // Challenge-issuer stats — when this address is the CHALLENGER.
  uint64 challenges_issued    = 10;
  uint64 challenges_succeeded = 11; // target fact went DISPROVEN
  uint64 challenges_failed    = 12; // target fact survived

  uint64 first_submission_block = 13;
  uint64 last_submission_block  = 14;
  // NB: Wave 4 fields start at 20 to avoid clashing with per_method / score fields below.

  // Per-method breakdown. Key = method_id.
  map<string, AgentMethodStats> per_method = 15;

  // Derived calibration score in BPS. Computed from above signals; see
  // ComputeAgentCalibrationScore in the keeper.
  uint64 calibration_score_bps = 16;
  uint64 last_updated_block    = 17;
}

// CommonKnowledgeEntry represents a subject that LLMs already know.
// Claims matching these subjects receive a novelty penalty.
message CommonKnowledgeEntry {
  string id           = 1;
  string domain       = 2;
  string subject      = 3;   // Normalized subject string
  string description  = 4;   // Human-readable explanation
  uint64 penalty_bps  = 5;   // Novelty penalty (0-1,000,000)
  uint64 added_block  = 6;
}

// Claim is an unverified submission awaiting or undergoing verification.
message Claim {
  string id                    = 1;
  string fact_content          = 2;
  string domain                = 3;
  string category              = 4;
  string submitter             = 5;
  uint64 submitted_at_block    = 6;
  ClaimStatus status           = 7;
  repeated string references   = 8;
  string verification_round_id = 9;
  string stake                 = 10; // coin amount as string (uzrn)
  string partnership_id        = 11;
  uint64 challenge_window_end  = 12;
  string provisional_fact_id   = 13;
  string content_hash          = 14; // SHA-256 of fact_content for duplicate detection
  ClaimType claim_type          = 15;
  repeated ClaimRelation relations = 16;  // Typed relationships to existing facts
  ClaimStructure structure = 17;  // Machine-readable decomposition (optional)
  string canonical_form      = 18;  // Machine-readable normalized form
  string canonical_hash      = 19;  // SHA-256 of canonical_form for dedup
  // Methodology under which this claim is submitted. Empty = "M-LEGACY"
  // (transitional; claims without declared method are adjudicated under a
  // permissive rule-set). Governance-amendable set of valid values lives in
  // the knowledge module's methodology registry.
  string method_id           = 20;
  // Structured reasoning trace. Optional. When populated, it flows through
  // to the accepted Fact as first-class training data (Phase 9).
  string reasoning_trace     = 21;
  // Dialectical argument text. For challenge claims (provisional_fact_id != ""),
  // this is the free-form argument against the challenged fact. Preserves the
  // reasoning of the challenge as argumentation training data (Route B Wave 2).
  string argument_text       = 22;
  // Optional rebuttal text. Attached when the original fact's submitter (or
  // partnership) formally rebuts a challenge. Stored on the challenge claim
  // so the full dispute is reconstructible from one record.
  string rebuttal_text       = 23;
}

// VerificationRound tracks one commit-reveal verification cycle.
message VerificationRound {
  string id                       = 1;
  string claim_id                 = 2;
  uint64 started_at_block         = 3;
  VerificationPhase phase         = 4;
  repeated string selected_verifiers = 5;
  repeated CommitEntry commits    = 6;
  repeated RevealEntry reveals    = 7;
  Verdict verdict                 = 8;
  uint64 verdict_block            = 9;
  uint64 commit_deadline          = 10;
  uint64 reveal_deadline          = 11;
  uint64 aggregation_deadline     = 12;
}

// CommitEntry records a validator's blinded commitment (SHA-256(vote || salt)).
message CommitEntry {
  string verifier          = 1;
  bytes  commit_hash       = 2; // SHA-256(vote || salt)
  uint64 committed_at_block = 3;
}

// RevealEntry records a validator's revealed vote and salt.
message RevealEntry {
  string verifier         = 1;
  string vote             = 2; // "accept", "reject", or "malformed"
  bytes  salt             = 3;
  uint64 revealed_at_block = 4;
}

// VRFProof captures a Verifiable Random Function output for validator selection.
message VRFProof {
  bytes  proof        = 1;
  bytes  output       = 2;
  string proposer     = 3;
  uint64 block_height = 4;
}

// Domain is an epistemic knowledge domain (e.g., "mathematics", "physics").
message Domain {
  string name             = 1;
  string description      = 2;
  DomainStatus status     = 3;
  uint64 created_at_block = 4;
  uint64 fact_count       = 5;
  string proposer         = 6;
  repeated string endorsers = 7;
  string stratum          = 8;
  string parent_domain    = 9;  // empty = root domain
  uint32 depth            = 10; // tree depth: root=1, child=parent.depth+1, max=5
}

// ValidatorInfo caches a validator's tier and verification stats for round selection.
message ValidatorInfo {
  string address           = 1;
  uint64 stake             = 2; // in uzrn
  string tier              = 3; // "apprentice", "verified", "bonded", "guardian"
  uint64 verification_count = 4;
  uint64 accuracy_bps      = 5; // 0-1,000,000
}

// ProvisionalChallenge is an adversarial challenge against a provisional fact.
message ProvisionalChallenge {
  string id                  = 1;
  string claim_id            = 2;
  string fact_id             = 3;
  string challenger          = 4;
  string stake               = 5;
  string reason              = 6;
  repeated string evidence_ids = 7;
  string counter_claim       = 8;
  // "open", "resolved_upheld", "resolved_overturned", "expired", "inconclusive"
  string status              = 9;
  // "deterministic" or "arbiter"
  string resolution_path     = 10;
  string dispute_id          = 11;
  uint64 created_at_height   = 12;
  uint64 resolved_at_height  = 13;
  // "upheld", "overturned", "weakened", "inconclusive", "undecidability"
  string outcome             = 14;
  uint32 attempt_number      = 15;
}

// DemandSignal tracks aggregate query demand for a domain/subject pair.
message DemandSignal {
    string domain               = 1;
    string subject              = 2;  // Normalized query subject
    uint64 query_count          = 3;  // Total queries (lifetime)
    uint64 fulfilled_count      = 4;  // Queries that returned results
    uint64 unfulfilled_count    = 5;  // Queries that returned nothing
    uint64 last_query_block     = 6;
    uint64 epoch_query_count    = 7;  // Queries this epoch (resets)
    uint64 epoch_unfulfilled    = 8;  // Unfulfilled this epoch (resets)
}

// KnowledgeBounty is an auto-generated reward for filling a knowledge gap.
message KnowledgeBounty {
    string id                   = 1;
    string domain               = 2;
    string subject              = 3;
    string reward_amount        = 4;  // uzrn
    uint64 created_at_block     = 5;
    uint64 expires_at_block     = 6;
    bool   claimed              = 7;
    string claimed_by_fact_id   = 8;
    uint64 demand_count         = 9;  // Demand that triggered this bounty
}

// CompletedRoundMeta stores metadata for completed verification rounds,
// indexed by verdict block height for efficient window-based queries (R31-2).
message CompletedRoundMeta {
    string domain          = 1;
    bool   has_dissent     = 2;  // true if any verifier dissented from majority
    uint64 duration_blocks = 3;  // verdict_block - started_at_block
}

// ─── Route B Wave 5: unified training data format ─────────────────────────
//
// MethodologyApplicationTrace is the canonical per-fact training row: one
// self-contained record bundling the claim, the methodology under which it
// was adjudicated, the reasoning trace, the derivation graph position, the
// dialectical history, the temporal truth signals, and contrastive
// companions. Consumers don't need to do post-load joins.
//
// Alignment principle: every field below encodes a ToK truth-seeking
// signal. A model trained on these records learns truth-seeking *behavior*:
// declare method, show work, accept falsification, cite provenance,
// distinguish fact from commitment.

message MethodologyApplicationTrace {
  // ─── Provenance pin (Route B Wave 1) ────────────────────────────────
  string trace_id                       = 1;
  string fact_id                        = 2;
  uint64 snapshot_block_height          = 3;
  uint64 tokenizer_version              = 4;
  uint64 canonical_serialisation_version = 5;
  uint64 trace_schema_version           = 6;  // Wave 5 TraceSchema contract version

  // ─── Claim ────────────────────────────────────────────────────────────
  string content        = 10;
  string domain         = 11;
  string subject        = 12;
  string canonical_form = 13;

  // ─── Methodology (TRUTH as process, not statement) ─────────────────────
  string methodology_id         = 20;
  string methodology_rubric     = 21;  // the methodology's own evaluation rubric
  string reasoning_trace        = 22;  // structured steps (JSON-encoded)
  uint32 axiom_distance         = 23;
  uint64 dependency_confidence_floor_bps = 24;

  // ─── Derivation graph (TRUTH as rooted) ────────────────────────────────
  repeated FactRelation predecessor_edges = 30;
  repeated FactRelation descendant_edges  = 31;
  uint64 grounded_score_bps               = 32;

  // ─── Adjudication (TRUTH as verified) ──────────────────────────────────
  uint64 own_confidence_bps             = 40;
  uint32 verifier_panel_size            = 41;
  repeated string dissenting_verifiers  = 42;
  uint64 verified_at_block              = 43;

  // ─── Dialectical history (TRUTH as stress-tested) ──────────────────────
  repeated TraceChallenge challenges = 50;
  uint64 corroboration_count         = 51;   // survived falsifications
  uint64 last_corroborated_block     = 52;

  // ─── Temporal truth signals ────────────────────────────────────────────
  FactStatus status                    = 60;
  TraceVindication vindication         = 61;  // populated if minority was right
  TraceDisproval   disproval           = 62;  // populated if fact went DISPROVEN
  repeated string  supersession_chain  = 63;  // SUPERSEDES / REFINES descendants

  // ─── Contrastive companions (ZERONE's unique differentiator) ──────────
  repeated TraceReformulation reformulations = 70;   // accepted variants
  repeated TraceDrift         drift_examples  = 71;   // DRIFT/INFERIOR variants
  repeated string             contradicting_fact_ids = 72;

  // ─── Provenance + weighting ────────────────────────────────────────────
  string submitter                               = 80;
  uint64 submitter_calibration_at_submission_bps = 81;
  string partnership_id                          = 82;
  uint64 submitted_at_block                      = 83;
  uint64 training_value_weight_bps               = 84;  // Popper-weighted (Wave 4)
  CurriculumTier       curriculum_tier           = 85;
  TrainingQualityTier  quality_tier              = 86;

  // ─── Is-ought marker ───────────────────────────────────────────────────
  // Always false on facts; true only in the parallel NormativeCorpus stream.
  bool is_normative = 90;

  // ─── Wave 6 enrichments ────────────────────────────────────────────────
  // Step-level structured reasoning (Wave 6.1 / PRM-aligned). When the
  // submitter posts a structured reasoning trace, it is mirrored here as
  // discrete steps with per-step inference type, predecessor refs, and
  // optional verdict. The flat `reasoning_trace` string is preserved for
  // compatibility; callers may prefer `reasoning_steps` when available.
  repeated ReasoningStep reasoning_steps = 100;

  // Methodology-selection rationale (Wave 6.3). Alternatives the submitter
  // considered and rejected, why they picked the chosen method, and any
  // methods they tried first and abandoned.
  MethodologyChoice methodology_choice = 101;

  // Belief revision chain (Wave 6.4). Every substantive change to this
  // fact's confidence appears as a row, oldest-first. Teaches Bayesian
  // updating as a behavior.
  repeated BeliefRevision belief_revisions = 102;

  // Nested dialectic (Wave 6.5). When a challenge spawned a multi-turn
  // debate, the full recursive tree is captured here. Flat challenges in
  // `challenges` remain for backwards compatibility; `dialectic_tree`
  // supersedes them as the canonical argumentation signal.
  repeated DialecticNode dialectic_tree = 103;
}

message TraceChallenge {
  string challenger          = 1;
  string argument_text       = 2;
  string challenge_method_id = 3;
  string rebuttal_text       = 4;
  // "survived" — challenge rejected, fact corroborated
  // "disproven" — challenge accepted, fact disproven
  // "pending" — round still open
  string outcome             = 5;
  uint64 resolved_block      = 6;
  // Wave 6.5 — recursive dialectic tree rooted at this challenge. A
  // counter-rebuttal to the rebuttal, a counter-counter-rebuttal, and so on.
  // Empty at depth 1; populated when the debate is multi-turn.
  repeated DialecticNode children = 7;
}

// ─── Wave 6.1: step-level reasoning (PRM-aligned) ────────────────────────
//
// Lightman et al. 2023 ("Let's Verify Step by Step") + Cobbe et al. 2021:
// training step-level process rewards (PRMs) substantially outperforms
// outcome-only reward. ReasoningStep structures a reasoning_trace into
// discrete, verifier-addressable steps so PRMs can be trained directly.

// StepInference names the epistemic move a single reasoning step makes.
// Distinct from InferenceType (which describes a FactRelation edge) — this
// is about reasoning moves WITHIN a trace, e.g. substitution, elimination.
enum StepInference {
  STEP_INFERENCE_UNSPECIFIED     = 0;
  STEP_INFERENCE_OBSERVATION     = 1;   // stating an observation
  STEP_INFERENCE_DEFINITION      = 2;   // introducing a definition
  STEP_INFERENCE_DEDUCTION       = 3;   // truth-preserving inference
  STEP_INFERENCE_INDUCTION       = 4;   // generalizing from cases
  STEP_INFERENCE_ABDUCTION       = 5;   // inference to best explanation
  STEP_INFERENCE_ANALOGY         = 6;   // cross-domain mapping
  STEP_INFERENCE_DECOMPOSITION   = 7;   // breaking the problem into sub-problems
  STEP_INFERENCE_CASE_SPLIT      = 8;   // exhaustive casework
  STEP_INFERENCE_CONTRADICTION   = 9;   // proof by contradiction step
  STEP_INFERENCE_UNIT_CONVERSION = 10;  // substitution / algebra
  STEP_INFERENCE_VERIFICATION    = 11;  // checking a sub-result
  STEP_INFERENCE_CONCLUSION      = 12;  // final synthesis
}

// StepVerdict mirrors verifier panel judgment at step granularity. When a
// PoT round's verifiers examine reasoning, their approvals/disapprovals
// attach per-step — not just to the final claim. This makes PRMs trainable.
enum StepVerdict {
  STEP_VERDICT_UNSPECIFIED = 0;
  STEP_VERDICT_UNEXAMINED  = 1;   // default: no panel review at step level
  STEP_VERDICT_SOUND       = 2;   // step holds under the claimed methodology
  STEP_VERDICT_QUESTIONABLE = 3;  // step may not follow; panel flagged
  STEP_VERDICT_UNSOUND     = 4;   // step does not follow; explicit reject
}

// ReasoningStep is one unit of a structured reasoning trace. The model
// learns to generate these in sequence, each step grounded in prior facts
// and declared moves.
message ReasoningStep {
  uint32 step_index                  = 1;   // 0-based ordering
  string content                     = 2;   // what the step says
  StepInference step_inference       = 3;
  // Facts this step cites as support (subset of the trace's
  // predecessor_edges). Teaches the model to cite steps, not just the
  // final claim.
  repeated string predecessor_fact_ids = 4;
  // Previous step indices this step depends on. Internal dependency graph.
  repeated uint32 depends_on_steps   = 5;
  // Optional per-step verifier judgment (PRM training signal).
  StepVerdict verdict                = 6;
  string verdict_note                = 7;   // panel rationale when non-unexamined
  // Step-level confidence in BPS. When the methodology permits partial
  // confidence at intermediate steps, this carries it.
  uint64 step_confidence_bps         = 8;
}

// ─── Wave 6.2: drift diagnosis (contrastive-explanation alignment) ───────
//
// Miller 2019 ("Explanation in AI: Insights from the Social Sciences") +
// Kaushik et al. 2020 ("Learning the Difference that Makes a Difference
// with Counterfactually-Augmented Data"). When a variant drifts, naming
// HOW the meaning changed is orders of magnitude more training-valuable
// than just flagging it drifted.

enum DriftKind {
  DRIFT_KIND_UNSPECIFIED       = 0;
  DRIFT_KIND_NARROWED          = 1;   // original covered more cases; variant restricts
  DRIFT_KIND_WIDENED           = 2;   // variant overgeneralizes
  DRIFT_KIND_REFERENT_SWAP     = 3;   // same words, different referent ("model" — ML vs fashion)
  DRIFT_KIND_POLARITY_FLIP     = 4;   // inverted truth value
  DRIFT_KIND_MODAL_SHIFT       = 5;   // from must to may, could to will, etc.
  DRIFT_KIND_DOMAIN_CONFLATION = 6;   // valid in one domain, restated as cross-domain
  DRIFT_KIND_HEDGE_REMOVED     = 7;   // "tends to" → "does" (overclaim)
  DRIFT_KIND_HEDGE_ADDED       = 8;   // "is" → "may be" (underclaim)
  DRIFT_KIND_TEMPORAL_SHIFT    = 9;   // present-tense claim recast as universal
  DRIFT_KIND_CAUSAL_CONFLATION = 10;  // correlation stated as causation
  DRIFT_KIND_METHODOLOGY_SWAP  = 11;  // original was M-FORMAL; variant reads as M-EMPIRICAL
}

// DriftDiagnosis carries the verifier panel's diagnosis of WHERE and HOW
// the variant's meaning slipped. Populated on DRIFT/INFERIOR verdicts.
message DriftDiagnosis {
  DriftKind drift_kind         = 1;
  uint32 drifted_at_step_index = 2;  // if the variant is a step-structured trace
  string original_excerpt      = 3;  // the relevant original text slice
  string drifted_excerpt       = 4;  // the mirror slice in the variant
  string explanation           = 5;  // panel's free-form rationale
}

// ─── Wave 6.3: methodology-choice rationale ──────────────────────────────
//
// Kadavath et al. 2022 ("Language Models (Mostly) Know What They Know").
// Models can learn selection as well as application when trained on the
// rationale for choosing one method over others. MethodologyChoice exposes
// what alternatives the submitter considered and why they picked the one
// they did.

message MethodologyChoice {
  string chosen_method_id             = 1;
  repeated string considered_methods  = 2;
  // Why the chosen method beat each considered alternative. Free-form,
  // optionally structured by the methodology itself.
  string rationale                    = 3;
  // If the submitter tried other methods first and they failed, those
  // failures are training gold (Zelikman 2022 "STaR" — failed attempts +
  // successful recovery).
  repeated string abandoned_methods   = 4;
  string abandonment_reason           = 5;
}

// ─── Wave 6.4: belief revision (Bayesian update chain) ───────────────────
//
// Popperian corroboration + Bayesian updating literature (Tenenbaum et al.,
// Griffiths 2008, Kahneman/Tversky 1973). The temporal evolution of a
// fact's confidence carries the strongest signal for teaching epistemic
// updating: "I believed P at 0.4; I saw evidence E; I now believe P at
// 0.7" with the reason spelled out.

enum RevisionReason {
  REVISION_REASON_UNSPECIFIED          = 0;
  REVISION_REASON_CORROBORATION        = 1;  // survived a falsification attempt
  REVISION_REASON_CITATION             = 2;  // a new derivative cited this, strengthening confidence
  REVISION_REASON_CONTRADICTION        = 3;  // an incoming contradiction weakened confidence
  REVISION_REASON_REBUTTAL             = 4;  // original submitter rebutted a challenge
  REVISION_REASON_VINDICATION          = 5;  // minority was right (indirect)
  REVISION_REASON_TEMPORAL_DECAY       = 6;  // metabolism / age-based decay
  REVISION_REASON_RESUBMISSION         = 7;  // fact was updated with new reasoning
  REVISION_REASON_METHODOLOGY_AMENDED  = 8;  // methodology rubric changed under the fact
  REVISION_REASON_CROSS_DOMAIN_SUPPORT = 9;  // a bridging fact in another domain supported this one
}

message BeliefRevision {
  uint64 at_block                 = 1;
  uint64 prior_confidence_bps     = 2;
  uint64 posterior_confidence_bps = 3;
  RevisionReason reason           = 4;
  // Evidence that triggered the revision.
  repeated string evidence_fact_ids  = 5;
  string evidence_claim_id        = 6;  // if triggered by a challenge claim
  string note                     = 7;
}

// ─── Wave 6.5: recursive dialectic (debate tree) ────────────────────────
//
// Irving, Christiano, Amodei 2018 ("AI Safety via Debate"). Multi-turn
// debate — challenge, rebuttal, counter-rebuttal, counter-counter —
// teaches models to sustain and evaluate arguments across depth. Our
// flat TraceChallenge becomes a recursive tree.

enum DialecticRole {
  DIALECTIC_ROLE_UNSPECIFIED = 0;
  DIALECTIC_ROLE_CHALLENGE   = 1;  // opening attack
  DIALECTIC_ROLE_REBUTTAL    = 2;  // defender's reply
  DIALECTIC_ROLE_COUNTER     = 3;  // counter-rebuttal (attacker again)
  DIALECTIC_ROLE_CONCESSION  = 4;  // party admits a point
  DIALECTIC_ROLE_VERDICT     = 5;  // panel resolution
}

message DialecticNode {
  string speaker                = 1;
  DialecticRole role            = 2;
  string argument_text          = 3;
  string method_id              = 4;
  uint64 at_block               = 5;
  repeated string cited_fact_ids = 6;
  // Recursive structure — responses to THIS node.
  repeated DialecticNode children = 7;
  // Panel judgment of this specific node's strength, if the round recorded
  // fine-grained scoring.
  StepVerdict node_verdict      = 8;
}

message TraceVindication {
  repeated string verifiers          = 1;  // minority voters who were vindicated
  string          refund_total       = 2;  // uzrn
  uint64          vindicated_at_block = 3;
  string          disproven_by_fact_id = 4;  // the fact that vindicated the minority
}

message TraceDisproval {
  string disproven_by_fact_id = 1;
  string disproven_by_claim_id = 2;
  string method_id             = 3;  // method under which the challenge succeeded
  uint64 disproven_at_block    = 4;
  string disproof_argument     = 5;  // the winning challenge argument
}

message TraceReformulation {
  string augmentation_id       = 1;
  string variant_content       = 2;
  AugmentationVerdict verdict  = 3;  // EQUIVALENT or SUPERIOR
  uint32 verifier_count        = 4;
  uint64 verdict_block         = 5;
  string methodology_id        = 6;  // should match parent trace's method
}

message TraceDrift {
  string augmentation_id       = 1;
  string variant_content       = 2;
  AugmentationVerdict verdict  = 3;  // DRIFT or INFERIOR
  repeated string drift_voters = 4;  // verifier panel (for attribution training)
  uint64 verdict_block         = 5;
  // Wave 6.2 — diagnostic reasoning for the drift. Populated when the
  // verifier panel recorded which kind of meaning-slippage occurred.
  DriftDiagnosis diagnosis     = 6;
  // Optional structured reasoning the DRIFTER produced (contrastive with
  // the winner's reasoning steps). Valuable for learning meaning-
  // preservation at fine granularity.
  repeated ReasoningStep drifter_steps = 7;
}

// ─── Contrastive pairs (preference-training format) ──────────────────────

// ContrastivePairType enumerates the epistemic relationship between the two
// members of a contrastive pair. The (type, method_id, distinguishing
// argument) triple tells a trainer WHY the positive beat the negative.
enum ContrastivePairType {
  CONTRASTIVE_PAIR_UNSPECIFIED         = 0;
  CONTRASTIVE_PAIR_SURVIVED_VS_DISPROVEN = 1;  // fact survived; a contradictory claim was disproven
  CONTRASTIVE_PAIR_EQUIVALENT_VS_DRIFT   = 2;  // winning reformulation vs DRIFT variant on same original
  CONTRASTIVE_PAIR_EQUIVALENT_VS_INFERIOR = 3; // winning reformulation vs INFERIOR variant
  CONTRASTIVE_PAIR_VINDICATED_MINORITY   = 4;  // the vindicated minority vote vs the (disproven) majority
}

// ContrastivePair is a (positive, negative, verdict) training row for
// preference learning. ZERONE's unique lever: web crawl only has survivors;
// this format ships the LOSING side with the adjudication that beat it.
message ContrastivePair {
  string pair_id                      = 1;
  ContrastivePairType pair_type       = 2;
  // Positive (survivor) side.
  string positive_fact_id             = 3;
  string positive_content             = 4;
  // Negative (loser) side — one of fact_id or augmentation_id is set
  // depending on pair_type.
  string negative_fact_id             = 5;
  string negative_augmentation_id     = 6;
  string negative_content             = 7;
  // Adjudication context.
  string method_id                    = 8;
  string distinguishing_argument      = 9;  // the challenge/drift rationale
  uint64 resolved_at_block            = 10;
  // Pin for reproducibility.
  uint64 snapshot_block_height        = 11;
  uint64 trace_schema_version         = 12;
}

// ─── TraceSchema: governance-ratified serialisation contract ─────────────

// TraceSchema names the canonical JSON Schema for MethodologyApplicationTrace.
// Versioned and governance-amendable like TokenizerSpec: any training run
// can pin to a specific schema version and reconstruct the deterministic
// serialisation years later.
message TraceSchema {
  uint64 version             = 1;
  uint64 ratified_at_block   = 2;
  string json_schema_hash    = 3;  // SHA-256 of json_schema bytes
  string json_schema         = 4;  // canonical JSON Schema (inlined)
  repeated string required_fields   = 5;
  repeated string deprecated_fields = 6;
  string notes               = 7;
}

// ─── Route B Wave 7: training-run manifest (the crown infrastructure) ────
//
// The thing a training pipeline operator actually downloads. Every pin
// a trainer needs to re-derive the corpus years later, every ID that
// went into the run, and a Merkle root committing to the exact set so
// the bundle can be externally verified without trusting the chain RPC.
//
// Design principle: a TrainingAttestation (Wave 3c) asserts *that* a run
// completed; a TrainingManifest asserts *what* the run consumed. Binding
// them closes the loop.

// CorpusSelector is the declarative predicate that, applied against the
// chain state at snapshot_block_height, reproduces the manifest's included
// ID set exactly. Pure data — no side effects — so the derivation is
// auditable and replayable.
message CorpusSelector {
  // Methodology filter (empty = all).
  string method_id                        = 1;
  // Minimum survived-falsification count (Popperian floor).
  uint64 min_corroboration                = 2;
  // Minimum training-quality tier (GOLD / SILVER / BRONZE / NEGATIVE).
  TrainingQualityTier min_quality_tier    = 3;
  // Minimum curriculum tier (FOUNDATION / INTERMEDIATE / …).
  CurriculumTier min_curriculum_tier      = 4;
  // Whether to include DISPROVEN facts as NEGATIVE-tier contrastive rows.
  bool include_disproven                  = 5;
  // Whether to include DRIFT/INFERIOR augmentation variants as negatives.
  bool include_drift                      = 6;
  // Whether to include the parallel NormativeCorpus (is-ought-flagged).
  bool include_normative                  = 7;
  // Whether to include ContrastivePair rows.
  bool include_contrastive_pairs          = 8;
  // If contrastive_pairs included, optionally restrict by pair type.
  ContrastivePairType pair_type_filter    = 9;
  // Optional domain allow-list (empty = all).
  repeated string domain_whitelist        = 10;
  // Optional domain deny-list.
  repeated string domain_blacklist        = 11;
  // Minimum submitter calibration at submission (BPS). Filters out rows
  // whose producer was a new/unproven agent at the time.
  uint64 min_submitter_calibration_bps    = 12;
}

// ManifestStatus tracks the manifest lifecycle.
enum ManifestStatus {
  MANIFEST_STATUS_UNSPECIFIED = 0;
  MANIFEST_STATUS_DRAFT       = 1;  // created, selector locked, IDs computed, but Merkle not frozen
  MANIFEST_STATUS_FINALIZED   = 2;  // Merkle root committed; immutable
  MANIFEST_STATUS_ATTESTED    = 3;  // bound to a TrainingAttestation (run complete)
  MANIFEST_STATUS_SUPERSEDED  = 4;  // a later manifest for the same pipeline supersedes this one
}

// TrainingManifest is the atomic, verifiable unit of a training run: every
// version pin, every included ID, one Merkle root. Distributed as JSON for
// off-chain consumers; the on-chain record is authoritative.
message TrainingManifest {
  string manifest_id              = 1;
  string pipeline_id              = 2;    // references TrainingPipeline
  string creator                  = 3;    // pipeline operator
  uint64 created_at_block         = 4;
  string description              = 5;

  // ─── Version pins — every layer a trainer must lock ─────────────────
  uint64 tokenizer_version                = 10;
  uint64 canonical_serialisation_version  = 11;
  uint64 trace_schema_version             = 12;
  uint64 methodology_set_version          = 13;
  uint64 snapshot_block_height            = 14;
  string chain_id                         = 15;

  // ─── Corpus selection ───────────────────────────────────────────────
  CorpusSelector corpus_selector          = 20;

  // ─── Included ID sets (canonical, sorted) ───────────────────────────
  repeated string included_fact_ids                  = 21;
  repeated string included_trace_ids                 = 22;
  repeated string included_pair_ids                  = 23;
  repeated string included_drift_augmentation_ids    = 24;
  repeated string included_normative_commitment_ids  = 25;

  // ─── Merkle commitment ──────────────────────────────────────────────
  // SHA-256 over the canonical sorted concat of all included IDs,
  // domain-separated per set. Anyone can re-derive and verify without
  // trusting the chain RPC.
  string merkle_root              = 30;  // hex-encoded SHA-256
  uint32 total_included           = 31;  // sum of all set sizes

  // ─── Counts (denormalised for fast listing) ─────────────────────────
  uint32 fact_count               = 40;
  uint32 trace_count              = 41;
  uint32 pair_count               = 42;
  uint32 drift_count              = 43;
  uint32 normative_count          = 44;

  // ─── Lifecycle ──────────────────────────────────────────────────────
  ManifestStatus status           = 50;
  uint64 finalized_at_block       = 51;
  string attestation_id           = 52;  // references TrainingAttestation when bound
  uint64 attested_at_block        = 53;

  // ─── Wave 8: composable manifests (DAG) ─────────────────────────────
  // parent_manifest_id names a FINALIZED or ATTESTED predecessor manifest
  // whose ID sets this manifest inherits. The child carries only the delta
  // IDs (what's new in this run vs. the parent); bundle assembly unions
  // parent's IDs into the child's resolution. The Merkle root binds to
  // (parent.merkle_root, child.delta_ids) so verification stays local.
  //
  // Use case: a fine-tune run that builds on an SFT bundle references the
  // SFT manifest as parent and adds only its adversarial-examples delta.
  string parent_manifest_id       = 60;
  // Parent's committed merkle_root — snapshotted at create time so the
  // child's commitment is self-contained. If parent is superseded later,
  // the child's root remains valid.
  string parent_merkle_root       = 61;
  // Depth in the composition chain. 0 for root manifests; 1 for direct
  // children; etc. Bounded by the handler to prevent pathological chains.
  uint32 composition_depth        = 62;
}

// ─── Route B Wave 7: capability manifest (chain self-description) ────────

// SeedStatus reports which bootstrap seeds have run. A freshly-spawned
// chain reports all false; SeedRouteB brings them all to true.
message SeedStatus {
  bool methodologies_seeded       = 1;
  bool tokenizer_spec_seeded      = 2;
  bool trace_schema_seeded        = 3;
  bool commitments_seeded         = 4;
}

// RouteBCapabilities is the chain's self-description — what versions of
// what contracts it exposes, and how much state it holds right now. The
// first query a trainer runs against a new chain.
message RouteBCapabilities {
  // Version pins (0 when unseeded).
  uint64 current_tokenizer_version            = 1;
  uint64 current_trace_schema_version         = 2;
  uint64 current_methodology_set_version      = 3;

  // Live counts (approximate — snapshot at query time).
  uint64 methodology_count                    = 10;
  uint64 fact_count                           = 11;
  uint64 active_pipeline_count                = 12;
  uint64 model_card_count                     = 13;
  uint64 active_bounty_count                  = 14;
  uint64 finalized_manifest_count             = 15;
  uint64 open_contribution_challenge_count    = 16;

  // Financial pins.
  string training_fund_balance_uzrn           = 20;
  string training_fund_escrowed_uzrn          = 21;
  string training_fund_vesting_uzrn           = 22;

  // Corpora the chain currently exposes.
  repeated string available_corpora           = 30;

  // Seed state.
  SeedStatus seed_status                      = 40;

  // Snapshot.
  uint64 snapshot_block_height                = 50;
  string chain_id                             = 51;
}

// ─── Wave 11: Incident Response ──────────────────────────────────────────
//
// On-chain incident log. Every bug found on a live chain that warrants a
// formal response gets an IncidentRecord. The record carries the severity,
// the status, and the lineage of remediations — each remediation pointing
// at the concrete mechanism that was fired (named upgrade, param amendment,
// emergency ceremony, schema amendment, or structured state correction).
//
// This is the connective tissue between "we found a bug" and "the chain
// resolved it". Tied to the upgrade protocol (Wave 10) via upgrade_name
// references, to the emergency ceremony module via ceremony_id, and to
// the governance params via param_path.

enum IncidentSeverity {
  INCIDENT_SEVERITY_UNSPECIFIED = 0;
  INCIDENT_SEVERITY_P0          = 1;  // consensus break / chain halt required
  INCIDENT_SEVERITY_P1          = 2;  // high-impact; immediate fix via param amendment or emergency upgrade
  INCIDENT_SEVERITY_P2          = 3;  // scheduled upgrade; no halt needed
  INCIDENT_SEVERITY_P3          = 4;  // low-impact; next-release or documentation-only
}

enum IncidentStatus {
  INCIDENT_STATUS_UNSPECIFIED = 0;
  INCIDENT_STATUS_OPEN        = 1;  // triaging; no remediation yet
  INCIDENT_STATUS_MITIGATING  = 2;  // remediation(s) applied, still monitoring
  INCIDENT_STATUS_RESOLVED    = 3;  // fix verified; monitoring window closed
  INCIDENT_STATUS_CLOSED      = 4;  // post-mortem published; permanently archived
}

enum RemediationType {
  REMEDIATION_TYPE_UNSPECIFIED      = 0;
  REMEDIATION_TYPE_PARAM_AMENDMENT  = 1;  // MsgUpdateParams; reference = param_path
  REMEDIATION_TYPE_NAMED_UPGRADE    = 2;  // UpgradeKeeper handler; reference = upgrade_name
  REMEDIATION_TYPE_EMERGENCY_HALT   = 3;  // x/emergency ceremony; reference = ceremony_id
  REMEDIATION_TYPE_EMERGENCY_RESUME = 4;  // x/emergency ceremony; reference = ceremony_id
  REMEDIATION_TYPE_STATE_CORRECTION = 5;  // authority-gated structured msg; reference = msg_type_url
  REMEDIATION_TYPE_SCHEMA_AMENDMENT = 6;  // TokenizerSpec or TraceSchema amend; reference = schema_name + version
  REMEDIATION_TYPE_DOCUMENTATION    = 7;  // no on-chain change; reference = post_mortem_uri
}

// Remediation is one recorded action taken against an incident. Multiple
// remediations may attach to a single incident (e.g., P1 bug gets a param
// amendment for immediate relief, then a named upgrade for the permanent
// fix, then documentation).
message Remediation {
  RemediationType type     = 1;
  string          reference = 2;   // mechanism-specific identifier (see enum comments)
  uint64          applied_at_block = 3;
  string          operator = 4;    // authority address that applied it
  string          note     = 5;
}

// IncidentRecord is the structured, auditable log entry for a single bug
// or incident. Authority-gated CRUD; the record is append-only from the
// perspective of resolution (remediations can be added, status can advance,
// but never retract).
message IncidentRecord {
  string           id                  = 1;   // client-chosen stable ID (e.g. "ZR-2026-0042")
  IncidentSeverity severity            = 2;
  IncidentStatus   status              = 3;
  string           title               = 4;   // one-line summary
  string           description         = 5;   // detailed problem statement
  string           reporter            = 6;   // discovery credit
  uint64           reported_at_block   = 7;
  uint64           resolved_at_block   = 8;   // 0 while not RESOLVED
  uint64           closed_at_block     = 9;   // 0 while not CLOSED
  repeated Remediation remediations    = 10;
  repeated string  affected_modules    = 11;  // which modules need attention
  string           post_mortem_uri     = 12;  // IPFS/HTTPS; set on RESOLVED
  // The response-time SLA this incident is being held to, inherited from
  // severity at open time. Freezes so later severity reclassification
  // cannot alter the measured SLA.
  uint64 sla_target_block              = 13;
}

// ─── Wave 12: chain-wide module circuit breakers (resilience) ────────────
//
// A ModulePause marks that a named module's write-path is currently gated.
// Handlers throughout the chain check k.IsModulePaused(ctx, moduleName) as
// their first action; if true, they return an error without touching state.
// This is the "localize damage" primitive — when a bug is discovered in
// module X, X can be paused immediately while the fix is being deployed,
// without halting the whole chain.
//
// Design: simple set of paused module names. One binding per module; the
// record exists iff the module is currently paused. Unpause deletes the
// record. The set is governance-amendable (authority-gated) and queryable.
//
// Coupling with incidents: the typical flow is
//   Open P0/P1 incident → Pause affected module → Apply fix → Unpause →
//   Resolve incident. The incident record's remediation lineage includes
//   the PauseModule + UnpauseModule reference (via STATE_CORRECTION type)
//   so the audit trail names the pause ceremony alongside the fix.

message ModulePause {
  string module_name           = 1;  // e.g. "knowledge", "liquiditypool"
  string reason                = 2;  // free-form; ideally references an incident_id
  uint64 paused_at_block       = 3;
  string paused_by             = 4;  // authority address that issued the pause
  // Optional auto-unpause height. 0 means "no auto-unpause; stays paused
  // until an explicit MsgUnpauseModule fires". Set when the pause is a
  // pre-planned maintenance window.
  uint64 auto_unpause_at_block = 5;
  // If non-empty, references the incident this pause is associated with.
  // Breaks when closed without the incident being resolved → audit signal.
  string incident_id           = 6;
}

// ─── Wave 14: privileged-action audit log ────────────────────────────────
//
// Every authority-gated action writes a PrivilegedAction record. The log
// is queryable, bounded (ring-buffered via governance-capped count), and
// structurally consistent across every privileged call site. The log is
// the answer to "what has authority done recently?" — detection becomes
// a simple query rather than a trawl through block history.

enum PrivilegedActionType {
  PRIVILEGED_ACTION_TYPE_UNSPECIFIED       = 0;
  PRIVILEGED_ACTION_TYPE_MODULE_PAUSE      = 1;
  PRIVILEGED_ACTION_TYPE_MODULE_UNPAUSE    = 2;
  PRIVILEGED_ACTION_TYPE_MANIFEST_CORRECT  = 3;
  PRIVILEGED_ACTION_TYPE_INCIDENT_OPEN     = 4;
  PRIVILEGED_ACTION_TYPE_INCIDENT_RESOLVE  = 5;
  PRIVILEGED_ACTION_TYPE_INCIDENT_CLOSE    = 6;
  PRIVILEGED_ACTION_TYPE_SCHEMA_AMEND_TOKENIZER = 7;
  PRIVILEGED_ACTION_TYPE_SCHEMA_AMEND_TRACE     = 8;
  PRIVILEGED_ACTION_TYPE_FACT_AUTHORITY_INJECT  = 9;  // authority-gated MsgAddFact bypasses the verification round
}

message PrivilegedAction {
  uint64 seq             = 1;    // monotonic sequence number
  PrivilegedActionType type = 2;
  string invoker         = 3;    // authority address
  uint64 invoked_at_block = 4;
  string target          = 5;    // module_name, manifest_id, incident_id, schema_name…
  string incident_id     = 6;    // if the action cites an open incident
  string note            = 7;    // free-form; mirrors the handler's reason/note field
}
