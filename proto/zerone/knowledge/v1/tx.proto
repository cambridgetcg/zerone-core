syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/knowledge/v1/types.proto";
import "zerone/knowledge/v1/genesis.proto";

// Msg defines the knowledge module's transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // ─── PoT lifecycle ───────────────────────────────────────────────────────

  // SubmitClaim submits a new knowledge claim for verification.
  rpc SubmitClaim(MsgSubmitClaim) returns (MsgSubmitClaimResponse);

  // SubmitCommitment submits a blinded commitment during the commit phase.
  rpc SubmitCommitment(MsgSubmitCommitment) returns (MsgSubmitCommitmentResponse);

  // SubmitReveal reveals a validator's vote during the reveal phase.
  rpc SubmitReveal(MsgSubmitReveal) returns (MsgSubmitRevealResponse);

  // ChallengeFact challenges a verified fact and opens a new verification round.
  rpc ChallengeFact(MsgChallengeFact) returns (MsgChallengeFactResponse);

  // AddFact governance-creates a fact (authority-gated).
  rpc AddFact(MsgAddFact) returns (MsgAddFactResponse);

  // ─── Negative knowledge ──────────────────────────────────────────────────

  // SubmitContradiction submits a counter-claim against an existing fact.
  rpc SubmitContradiction(MsgSubmitContradiction) returns (MsgSubmitContradictionResponse);

  // ─── Knowledge preservation ──────────────────────────────────────────────

  // PatronizeFact funds a fact to prevent it from being pruned.
  rpc PatronizeFact(MsgPatronizeFact) returns (MsgPatronizeFactResponse);

  // ─── Domain management ───────────────────────────────────────────────────

  // ProposeDomain proposes a new epistemic domain.
  rpc ProposeDomain(MsgProposeDomain) returns (MsgProposeDomainResponse);

  // EndorseDomainProposal endorses a pending domain proposal.
  rpc EndorseDomainProposal(MsgEndorseDomainProposal) returns (MsgEndorseDomainProposalResponse);

  // ChallengeDomainProposal challenges a pending domain proposal.
  rpc ChallengeDomainProposal(MsgChallengeDomainProposal) returns (MsgChallengeDomainProposalResponse);

  // RegisterStratum registers a new knowledge stratum (authority-gated).
  rpc RegisterStratum(MsgRegisterStratum) returns (MsgRegisterStratumResponse);

  // ─── Adversarial verification ────────────────────────────────────────────

  // ChallengeProvisionalFact challenges a provisional fact before it becomes verified.
  rpc ChallengeProvisionalFact(MsgChallengeProvisionalFact) returns (MsgChallengeProvisionalFactResponse);

  // ─── Governance ──────────────────────────────────────────────────────────

  // UpdateParams updates module parameters. Governance authority only.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // UpdateExtendedParams updates the JSON-encoded extended parameters.
  rpc UpdateExtendedParams(MsgUpdateExtendedParams) returns (MsgUpdateExtendedParamsResponse);

  // ─── Research fund governance ────────────────────────────────────────────

  // ProposeResearchFund proposes a disbursement from the research fund.
  rpc ProposeResearchFund(MsgProposeResearchFund) returns (MsgProposeResearchFundResponse);

  // VoteResearchProposal votes on a research fund proposal.
  rpc VoteResearchProposal(MsgVoteResearchProposal) returns (MsgVoteResearchProposalResponse);

  // ExecuteResearchProposal executes an approved research fund proposal.
  rpc ExecuteResearchProposal(MsgExecuteResearchProposal) returns (MsgExecuteResearchProposalResponse);

  // ─── Common knowledge registry governance ──────────────────────────────

  // AddCommonKnowledge adds an entry to the common knowledge registry (authority-only).
  rpc AddCommonKnowledge(MsgAddCommonKnowledge) returns (MsgAddCommonKnowledgeResponse);

  // RemoveCommonKnowledge removes an entry from the common knowledge registry (authority-only).
  rpc RemoveCommonKnowledge(MsgRemoveCommonKnowledge) returns (MsgRemoveCommonKnowledgeResponse);

  // ─── Agent demand ──────────────────────────────────────────────────

  // ReportDemand reports agent query demand (authorized reporters only).
  rpc ReportDemand(MsgReportDemand) returns (MsgReportDemandResponse);

  // ─── Query satisfaction ──────────────────────────────────────────────

  // RateFact allows a querier to provide relevance feedback on a fact.
  rpc RateFact(MsgRateFact) returns (MsgRateFactResponse);

  // ─── Route B: training infrastructure ─────────────────────────────
  // RegisterTrainingPipeline creates a new pipeline declaration (operator-auth).
  rpc RegisterTrainingPipeline(MsgRegisterTrainingPipeline) returns (MsgRegisterTrainingPipelineResponse);
  // UpdateTrainingPipeline amends the pipeline's status / completed_at_block (operator-auth).
  rpc UpdateTrainingPipeline(MsgUpdateTrainingPipeline) returns (MsgUpdateTrainingPipelineResponse);
  // RegisterModelCard creates a ModelCard for a trained model (owner-auth).
  rpc RegisterModelCard(MsgRegisterModelCard) returns (MsgRegisterModelCardResponse);
  // UpdateModelCard amends eval scores or metadata (owner-auth).
  rpc UpdateModelCard(MsgUpdateModelCard) returns (MsgUpdateModelCardResponse);
  // RetireModelCard flips the card's active flag and records retirement (owner-auth).
  rpc RetireModelCard(MsgRetireModelCard) returns (MsgRetireModelCardResponse);

  // ─── Route B Wave 3 ────────────────────────────────────────────────
  // AmendTokenizerSpec bumps the on-chain tokenizer contract (authority-auth).
  rpc AmendTokenizerSpec(MsgAmendTokenizerSpec) returns (MsgAmendTokenizerSpecResponse);
  // AttributeContributions declares which fact_ids a model was trained on.
  rpc AttributeContributions(MsgAttributeContributions) returns (MsgAttributeContributionsResponse);
  // AttestTraining posts a training-completion attestation (operator-auth).
  rpc AttestTraining(MsgAttestTraining) returns (MsgAttestTrainingResponse);
  // CreateAugmentationBounty opens a reward pool for variant formulations of a fact.
  rpc CreateAugmentationBounty(MsgCreateAugmentationBounty) returns (MsgCreateAugmentationBountyResponse);
  // SubmitAugmentation submits a variant formulation of a fact.
  rpc SubmitAugmentation(MsgSubmitAugmentation) returns (MsgSubmitAugmentationResponse);
  // AcceptAugmentation marks a variant accepted. Wave 4: sponsor can no longer
  // self-judge; this RPC now routes the decision through a verifier-panel
  // verdict. Sponsor may still call it to finalize a PASSING verdict on the
  // sponsor's own terms (non-veto), but cannot reject a PASSING verdict
  // without forfeiting deposit via SponsorVetoAugmentation.
  rpc AcceptAugmentation(MsgAcceptAugmentation) returns (MsgAcceptAugmentationResponse);

  // ─── Route B Wave 4: economic realignment ─────────────────────────────
  // VoteOnAugmentation records one verifier's verdict on a reformulation.
  // Panel reaches threshold → finalize → payout/archive.
  rpc VoteOnAugmentation(MsgVoteOnAugmentation) returns (MsgVoteOnAugmentationResponse);
  // SponsorVetoAugmentation forfeits deposit to research fund; prevents
  // sponsor from blocking a passing verdict silently.
  rpc SponsorVetoAugmentation(MsgSponsorVetoAugmentation) returns (MsgSponsorVetoAugmentationResponse);
  // ChallengeContribution disputes a ContributionRecord with a bond.
  rpc ChallengeContribution(MsgChallengeContribution) returns (MsgChallengeContributionResponse);
  // ResolveContributionChallenge settles an open challenge (verifier/authority).
  rpc ResolveContributionChallenge(MsgResolveContributionChallenge) returns (MsgResolveContributionChallengeResponse);
  // ClaimTrainingFundDisbursement — pipeline operator claims post-hoc reward
  // once the ModelCard has accumulated live calibration. Gated on calibration
  // floor + reproducibility proof; 50/50 immediate/vesting split.
  rpc ClaimTrainingFundDisbursement(MsgClaimTrainingFundDisbursement) returns (MsgClaimTrainingFundDisbursementResponse);

  // ─── Route B Wave 5: training data format ─────────────────────────────
  // AmendTraceSchema governance-amends the MethodologyApplicationTrace
  // serialisation contract; version auto-increments like TokenizerSpec.
  rpc AmendTraceSchema(MsgAmendTraceSchema) returns (MsgAmendTraceSchemaResponse);

  // ─── Route B Wave 7: training manifests (the atomic run bundle) ───────
  // CreateTrainingManifest materialises a manifest in DRAFT status by
  // applying the supplied CorpusSelector to current chain state, computing
  // the included-ID sets, and stamping all version pins.
  rpc CreateTrainingManifest(MsgCreateTrainingManifest) returns (MsgCreateTrainingManifestResponse);
  // FinalizeTrainingManifest freezes the Merkle root and promotes DRAFT →
  // FINALIZED. After this point the manifest is immutable.
  rpc FinalizeTrainingManifest(MsgFinalizeTrainingManifest) returns (MsgFinalizeTrainingManifestResponse);
  // BindManifestToAttestation links a FINALIZED manifest to an existing
  // TrainingAttestation so on-chain attestations name the bundle they
  // reference. Promotes the manifest to ATTESTED.
  rpc BindManifestToAttestation(MsgBindManifestToAttestation) returns (MsgBindManifestToAttestationResponse);

  // ─── Route B Wave 11: incident response pipeline ──────────────────────
  // OpenIncident records a newly-discovered bug with severity + initial
  // triage. Authority-gated.
  rpc OpenIncident(MsgOpenIncident) returns (MsgOpenIncidentResponse);
  // RecordRemediation attaches a remediation action to an incident.
  // Callable multiple times; each call is appended, never replaces.
  rpc RecordRemediation(MsgRecordRemediation) returns (MsgRecordRemediationResponse);
  // ResolveIncident marks an incident RESOLVED and stamps the post-mortem
  // URI. Subsequent CloseIncident transitions to CLOSED; until then the
  // incident remains observable as "in monitoring".
  rpc ResolveIncident(MsgResolveIncident) returns (MsgResolveIncidentResponse);
  // CloseIncident permanently archives an incident after the monitoring
  // window and post-mortem publication.
  rpc CloseIncident(MsgCloseIncident) returns (MsgCloseIncidentResponse);
}

// ─── PoT lifecycle messages ───────────────────────────────────────────────────

message MsgSubmitClaim {
  option (cosmos.msg.v1.signer) = "submitter";

  string          submitter     = 1;
  string          fact_content  = 2;
  string          domain        = 3;
  string          category      = 4;
  string          stake         = 5; // uzrn amount
  repeated string references    = 6; // fact IDs cited
  string          partnership_id = 7;
  ClaimType       claim_type    = 8; // Optional — defaults to ASSERTION if unset
  // Typed relationships to existing facts.
  // Replaces untyped `references` for new claims (references kept for backward compat).
  repeated ClaimRelation relations = 9;
  ClaimStructure structure = 10;  // Optional structured decomposition
  string canonical_form    = 11;  // Optional — auto-derived from structure if omitted
  bool   sponsored         = 12;  // Request bootstrap fund sponsorship for review fee
}

message MsgSubmitClaimResponse {
  string claim_id = 1;
}

message MsgSubmitCommitment {
  option (cosmos.msg.v1.signer) = "verifier";

  string verifier  = 1;
  string round_id  = 2;
  bytes  commit_hash = 3; // ComputeCommitmentHash(round_id, vote, confidence, salt) — see types/commitment.go
}

message MsgSubmitCommitmentResponse {}

message MsgSubmitReveal {
  option (cosmos.msg.v1.signer) = "verifier";

  string verifier   = 1;
  string round_id   = 2;
  string vote       = 3; // "accept", "reject", or "malformed"
  bytes  salt       = 4;
  uint64 confidence = 5; // BPS; bound to commitment via ComputeCommitmentHash
}

message MsgSubmitRevealResponse {}

message MsgChallengeFact {
  option (cosmos.msg.v1.signer) = "challenger";

  string          challenger   = 1;
  string          fact_id      = 2;
  string          stake        = 3; // uzrn amount
  string          reason       = 4;
  repeated string evidence_ids = 5;
}

message MsgChallengeFactResponse {
  string round_id = 1;
}

message MsgAddFact {
  option (cosmos.msg.v1.signer) = "authority";

  string          authority  = 1;
  string          content    = 2;
  string          domain     = 3;
  string          category   = 4;
  repeated string references = 5;
  uint64          confidence = 6; // initial confidence (0-1,000,000)
}

message MsgAddFactResponse {
  string fact_id = 1;
}

// ─── Negative knowledge messages ─────────────────────────────────────────────

message MsgSubmitContradiction {
  option (cosmos.msg.v1.signer) = "submitter";

  string          submitter    = 1;
  string          fact_id      = 2; // fact being contradicted
  string          counter_claim = 3;
  string          stake        = 4; // uzrn amount
  repeated string evidence_ids = 5;
  string          reason       = 6;
  string          domain       = 7;
  string          category     = 8;
}

message MsgSubmitContradictionResponse {
  string counter_fact_id = 1;
}

// ─── Knowledge preservation messages ─────────────────────────────────────────

message MsgPatronizeFact {
  option (cosmos.msg.v1.signer) = "patron";

  string patron           = 1;
  string fact_id          = 2;
  string amount           = 3; // uzrn amount
  uint64 duration_blocks  = 4;
}

message MsgPatronizeFactResponse {}

// ─── Domain management messages ──────────────────────────────────────────────

message MsgProposeDomain {
  option (cosmos.msg.v1.signer) = "proposer";

  string proposer     = 1;
  string name         = 2;
  string description  = 3;
  string stratum      = 4;
  string stake        = 5; // uzrn amount
}

message MsgProposeDomainResponse {
  string proposal_id = 1;
}

message MsgEndorseDomainProposal {
  option (cosmos.msg.v1.signer) = "endorser";

  string endorser    = 1;
  string proposal_id = 2;
}

message MsgEndorseDomainProposalResponse {}

message MsgChallengeDomainProposal {
  option (cosmos.msg.v1.signer) = "challenger";

  string challenger  = 1;
  string proposal_id = 2;
  string reason      = 3;
}

message MsgChallengeDomainProposalResponse {}

message MsgRegisterStratum {
  option (cosmos.msg.v1.signer) = "authority";

  string          authority          = 1;
  string          name               = 2;
  string          description        = 3;
  uint64          confidence_ceiling = 4; // 0-1,000,000
  repeated string parent_strata      = 5;
}

message MsgRegisterStratumResponse {}

// ─── Adversarial verification messages ───────────────────────────────────────

message MsgChallengeProvisionalFact {
  option (cosmos.msg.v1.signer) = "challenger";

  string          challenger   = 1;
  string          claim_id     = 2;
  string          fact_id      = 3;
  string          stake        = 4; // uzrn amount
  string          reason       = 5;
  repeated string evidence_ids = 6;
  string          counter_claim = 7;
}

message MsgChallengeProvisionalFactResponse {
  string challenge_id = 1;
}

// ─── Governance messages ──────────────────────────────────────────────────────

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  Params params    = 2;
}

message MsgUpdateParamsResponse {}

message MsgUpdateExtendedParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority  = 1;
  string params_json = 2; // JSON-encoded ExtendedParams blob
}

message MsgUpdateExtendedParamsResponse {}

// ─── Research fund governance messages ───────────────────────────────────────

message MsgProposeResearchFund {
  option (cosmos.msg.v1.signer) = "proposer";

  string proposer               = 1;
  string title                  = 2;
  string description            = 3;
  string amount                 = 4; // uzrn amount
  string recipient              = 5;
  uint64 voting_period_blocks   = 6;
}

message MsgProposeResearchFundResponse {
  string proposal_id = 1;
}

message MsgVoteResearchProposal {
  option (cosmos.msg.v1.signer) = "voter";

  string voter       = 1;
  string proposal_id = 2;
  bool   vote        = 3; // true = yes, false = no
}

message MsgVoteResearchProposalResponse {}

message MsgExecuteResearchProposal {
  option (cosmos.msg.v1.signer) = "authority";

  string authority   = 1;
  string proposal_id = 2;
}

message MsgExecuteResearchProposalResponse {}

// ─── Common knowledge registry governance messages ──────────────────────────

message MsgAddCommonKnowledge {
  option (cosmos.msg.v1.signer) = "authority";

  string authority   = 1;
  string domain      = 2;
  string subject     = 3;
  string description = 4;
  uint64 penalty_bps = 5;
}

message MsgAddCommonKnowledgeResponse {
  string id = 1;
}

message MsgRemoveCommonKnowledge {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  string id        = 2;  // Common knowledge entry ID
}

message MsgRemoveCommonKnowledgeResponse {}

// ─── Agent demand messages ───────────────────────────────────────────────────

message MsgReportDemand {
    option (cosmos.msg.v1.signer) = "reporter";

    string reporter = 1;  // Context server address (whitelisted)
    repeated DemandReport reports = 2;
}

message DemandReport {
    string domain     = 1;
    string subject    = 2;
    uint64 queries    = 3;  // Total queries in this batch
    uint64 fulfilled  = 4;  // How many returned results
    uint64 unfulfilled = 5;
}

message MsgReportDemandResponse {}

// ─── Query satisfaction messages ────────────────────────────────────────────

// MsgRateFact allows a querier to provide relevance feedback on a fact.
// The querier must have previously queried this fact (enforced by query receipt).
message MsgRateFact {
    option (cosmos.msg.v1.signer) = "rater";

    string rater   = 1;  // Address of the rating agent
    string fact_id = 2;  // Fact being rated
    bool   useful  = 3;  // true = satisfied, false = dissatisfied
    string memo    = 4;  // Optional: brief reason (max 256 chars)
}

message MsgRateFactResponse {}

// ─── Route B: training infrastructure messages ────────────────────────────

message MsgRegisterTrainingPipeline {
  option (cosmos.msg.v1.signer) = "operator";

  string operator               = 1;
  string id                     = 2;
  uint64 corpus_snapshot_height = 3;
  uint64 tokenizer_version      = 4;
  uint64 methodology_set_version = 5;
  string recipe_hash            = 6;
  string description            = 7;
  string corpus_filter          = 8;
}
message MsgRegisterTrainingPipelineResponse {}

message MsgUpdateTrainingPipeline {
  option (cosmos.msg.v1.signer) = "operator";

  string operator           = 1;
  string id                 = 2;
  // new_status: "declared" | "running" | "completed" | "failed" | "superseded"
  string new_status         = 3;
  uint64 completed_at_block = 4;  // set when transitioning to "completed"
}
message MsgUpdateTrainingPipelineResponse {}

message MsgRegisterModelCard {
  option (cosmos.msg.v1.signer) = "owner";

  string owner                       = 1;
  string id                          = 2;
  string name                        = 3;
  string pipeline_id                 = 4;
  string deployment_address          = 5;
  uint64 parameter_count             = 6;
  string route                       = 7;  // "openweight_fine_tune" | "from_scratch" | "distilled"
  string base_model                  = 8;
  uint64 eval_acceptance_rate_bps    = 9;
  uint64 eval_corroboration_rate_bps = 10;
  uint64 eval_sample_size            = 11;
  string specialised_method_id       = 12;
}
message MsgRegisterModelCardResponse {}

message MsgUpdateModelCard {
  option (cosmos.msg.v1.signer) = "owner";

  string owner                       = 1;
  string id                          = 2;
  uint64 eval_acceptance_rate_bps    = 3;
  uint64 eval_corroboration_rate_bps = 4;
  uint64 eval_sample_size            = 5;
  string name                        = 6;  // optional re-naming
}
message MsgUpdateModelCardResponse {}

message MsgRetireModelCard {
  option (cosmos.msg.v1.signer) = "owner";

  string owner  = 1;
  string id     = 2;
  string reason = 3;
}
message MsgRetireModelCardResponse {}

// ─── Route B Wave 3 messages ──────────────────────────────────────────────

message MsgAmendTokenizerSpec {
  option (cosmos.msg.v1.signer) = "authority";

  string authority          = 1;
  TokenizerSpec spec        = 2;  // new spec; version auto-assigned as current+1
}
message MsgAmendTokenizerSpecResponse {
  uint64 new_version = 1;
}

message MsgAttributeContributions {
  option (cosmos.msg.v1.signer) = "owner";

  string owner             = 1;
  string model_id          = 2;
  repeated string fact_ids = 3;
  uint64 total_weight      = 4;  // optional; 0 = sum of per-fact corroboration
}
message MsgAttributeContributionsResponse {
  uint32 recorded = 1;
}

message MsgAttestTraining {
  option (cosmos.msg.v1.signer) = "attester";

  string attester         = 1;  // must match the pipeline's operator
  string pipeline_id      = 2;
  uint64 flops_estimate   = 3;
  uint64 wallclock_seconds = 4;
  string eval_hash        = 5;
  string signature        = 6;
  string notes            = 7;
}
message MsgAttestTrainingResponse {}

message MsgCreateAugmentationBounty {
  option (cosmos.msg.v1.signer) = "sponsor";

  string sponsor            = 1;
  string id                 = 2;
  string target_fact_id     = 3;
  uint64 reward_per_variant = 4;
  uint32 max_variants       = 5;
  uint64 expires_at_block   = 6;
  string description        = 7;
}
message MsgCreateAugmentationBountyResponse {}

message MsgSubmitAugmentation {
  option (cosmos.msg.v1.signer) = "submitter";

  string submitter               = 1;
  string id                      = 2;
  string bounty_id               = 3;  // optional — empty for volunteer submissions
  string original_fact_id        = 4;
  string variant_content         = 5;
  string variant_reasoning_trace = 6;
}
message MsgSubmitAugmentationResponse {}

message MsgAcceptAugmentation {
  option (cosmos.msg.v1.signer) = "acceptor";

  string acceptor        = 1;
  string augmentation_id = 2;
  string note            = 3;
}
message MsgAcceptAugmentationResponse {}

// ─── Wave 4: reformulation verdicts ───────────────────────────────────────
message MsgVoteOnAugmentation {
  option (cosmos.msg.v1.signer) = "verifier";

  string verifier         = 1;
  string augmentation_id  = 2;
  AugmentationVerdict vote = 3;
  string rationale        = 4;  // short verifier note (optional)
}
message MsgVoteOnAugmentationResponse {
  bool verdict_finalized             = 1;
  AugmentationVerdict finalized_verdict = 2;
}

message MsgSponsorVetoAugmentation {
  option (cosmos.msg.v1.signer) = "sponsor";

  string sponsor         = 1;
  string augmentation_id = 2;
  string reason          = 3;
}
message MsgSponsorVetoAugmentationResponse {}

// ─── Wave 4: attribution challenges ───────────────────────────────────────
message MsgChallengeContribution {
  option (cosmos.msg.v1.signer) = "challenger";

  string challenger       = 1;
  string model_id         = 2;
  string disputed_fact_id = 3;
  string dispute_type     = 4;   // "missing" | "fraudulent"
  string evidence         = 5;
  string id               = 6;   // unique challenge id (client-chosen)
}
message MsgChallengeContributionResponse {
  string bond_escrowed = 1;
}

message MsgResolveContributionChallenge {
  option (cosmos.msg.v1.signer) = "resolver";

  string resolver        = 1;
  string challenge_id    = 2;
  bool   uphold          = 3;    // true = challenge succeeds; false = rejected
  string note            = 4;
}
message MsgResolveContributionChallengeResponse {
  string payout_to_winner = 1;   // uzrn the winner received
}

// ─── Wave 4: training fund post-hoc disbursement ──────────────────────────
message MsgClaimTrainingFundDisbursement {
  option (cosmos.msg.v1.signer) = "claimant";

  string claimant   = 1;
  string model_id   = 2;
  string id         = 3;   // unique disbursement id (client-chosen)
}
message MsgClaimTrainingFundDisbursementResponse {
  string total_amount    = 1;
  string released_amount = 2;  // paid immediately
  string vesting_amount  = 3;  // held for vesting_end_block
  uint64 vesting_end_block = 4;
}


// ─── Route B Wave 5: trace schema amendment ───────────────────────────────
message MsgAmendTraceSchema {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  TraceSchema schema = 2;  // new schema; version auto-assigned as current+1
}
message MsgAmendTraceSchemaResponse {
  uint64 new_version = 1;
}

// ─── Route B Wave 7: training manifests ──────────────────────────────────
message MsgCreateTrainingManifest {
  option (cosmos.msg.v1.signer) = "creator";

  string creator                    = 1;  // pipeline operator
  string id                         = 2;  // client-chosen manifest id
  string pipeline_id                = 3;
  CorpusSelector corpus_selector    = 4;
  string description                = 5;
  // Wave 8: optional parent manifest this run builds on. When set, the
  // child's corpus_selector is applied ONLY over IDs NOT already present
  // in the parent — the child captures the delta. Bundle assembly unions.
  string parent_manifest_id         = 6;
}
message MsgCreateTrainingManifestResponse {
  uint32 total_included             = 1;
  uint32 fact_count                 = 2;
  uint32 trace_count                = 3;
  uint32 pair_count                 = 4;
  uint32 drift_count                = 5;
  uint32 normative_count            = 6;
}

message MsgFinalizeTrainingManifest {
  option (cosmos.msg.v1.signer) = "creator";

  string creator     = 1;  // must match the manifest creator
  string manifest_id = 2;
}
message MsgFinalizeTrainingManifestResponse {
  string merkle_root = 1;  // the locked commitment
}

message MsgBindManifestToAttestation {
  option (cosmos.msg.v1.signer) = "creator";

  string creator        = 1;
  string manifest_id    = 2;
  string attestation_id = 3;  // references TrainingAttestation.pipeline_id (1:1 with pipeline)
}
message MsgBindManifestToAttestationResponse {}

// ─── Route B Wave 11: incident response ──────────────────────────────────
message MsgOpenIncident {
  option (cosmos.msg.v1.signer) = "authority";

  string authority              = 1;
  string id                     = 2;
  IncidentSeverity severity     = 3;
  string title                  = 4;
  string description            = 5;
  string reporter               = 6;
  repeated string affected_modules = 7;
  // Optional override of the SLA window (blocks). 0 → use the default
  // inferred from severity.
  uint64 sla_window_blocks      = 8;
}
message MsgOpenIncidentResponse {
  uint64 sla_target_block = 1;
}

message MsgRecordRemediation {
  option (cosmos.msg.v1.signer) = "authority";

  string authority       = 1;
  string incident_id     = 2;
  RemediationType type   = 3;
  string reference       = 4;
  string note            = 5;
}
message MsgRecordRemediationResponse {
  uint32 total_remediations = 1;
}

message MsgResolveIncident {
  option (cosmos.msg.v1.signer) = "authority";

  string authority       = 1;
  string incident_id     = 2;
  string post_mortem_uri = 3;
}
message MsgResolveIncidentResponse {}

