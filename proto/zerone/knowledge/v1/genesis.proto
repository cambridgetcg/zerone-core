syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

import "zerone/knowledge/v1/types.proto";

// Params are the governance parameters for the knowledge module.
// All BPS values use a 1,000,000 scale (1,000,000 = 100%).
message Params {
  // ─── Core verification ───────────────────────────────────────────────────
  uint64 min_verifiers            = 1;  // default: 3
  uint64 max_verifiers            = 2;  // default: 22
  uint64 commit_phase_blocks      = 3;  // default: 4
  uint64 reveal_phase_blocks      = 4;  // default: 4
  uint64 aggregation_phase_blocks = 5;  // default: 3
  uint64 claim_cooldown_blocks    = 6;  // default: 50

  // ─── Confidence scoring ──────────────────────────────────────────────────
  uint64 initial_confidence               = 7;  // default: 500,000 (50%)
  uint64 confidence_boost_per_verification = 8;  // default: 50,000  (5%)
  uint64 confidence_threshold             = 9;  // default: 770,000 (77%) acceptance
  uint64 quorum_threshold                 = 10; // default: 660,000 (66%)

  // ─── Slashing — MUST be non-zero (B22-3 audit) ──────────────────────────
  uint64 wrong_verification_slash_bps = 11; // default: 50,000  (5%)
  uint64 missed_reveal_slash_bps      = 12; // default: 100,000 (10%)
  uint64 equivocation_slash_bps       = 13; // default: 200,000 (20%)
  uint64 invalid_claim_slash_bps      = 14; // DEPRECATED (R19-6): no longer used — review fee is non-refundable

  // ─── Rewards ─────────────────────────────────────────────────────────────
  string verification_reward           = 15; // default: "3000000" (3 ZRN in uzrn)
  uint64 verification_reward_decay_bps = 16; // default: 999,000 (0.999× per epoch)

  // ─── Claim validation ────────────────────────────────────────────────────
  uint64 min_claim_text_length = 17; // default: 20
  uint64 max_claim_text_length = 18; // default: 10,000
  string min_review_fee        = 19; // default: "100000" (0.1 ZRN) — non-refundable review fee

  // ─── Adversarial verification ────────────────────────────────────────────
  bool   adversarial_verification_enabled = 20; // default: true
  uint64 provisional_threshold            = 21; // default: 500,000 (50%)
  uint64 reject_threshold                 = 22; // default: 300,000 (30%)
  uint64 challenge_duration_blocks        = 23; // default: 34,272 (1 day)
  string min_challenge_stake              = 24; // default: "11000000" (11 ZRN)
  uint64 failed_challenge_slash_bps       = 25; // default: 220,000 (22%)
  uint64 successful_challenge_reward_bps  = 26; // default: 300,000 (30%)
  uint64 max_concurrent_challenges        = 27; // default: 3

  // ─── Citation economics ──────────────────────────────────────────────────
  uint64 citation_share_bps    = 28; // default: 150,000 (15%)
  uint64 cross_domain_bonus_bps = 29; // default: 200,000 (20%)

  // ─── Extended governance params ─────────────────────────────────────────
  uint64 max_facts_per_domain        = 30; // default: 100,000
  uint64 fact_expiry_blocks          = 31; // default: 0 (no expiry)
  uint64 cross_stratum_discount_bps  = 32; // default: 0
  uint64 max_validators_per_round    = 34; // default: 22
  uint64 confidence_growth_epoch     = 38; // default: 1,111 blocks
  uint64 confidence_growth_per_epoch_bps = 39; // default: 11,000 (1.1%)
  uint64 max_survival_confidence     = 40; // default: 770,000 (77%)
  uint64 survived_challenge_confidence_cap = 41; // default: 880,000 (88%)
  uint64 max_apprentice_validators   = 42; // default: 111 (Sybil cap)

  // ─── Removed (v4→v5): dead anti-slop / FARM & citation-gaming params ──────
  // Field 33/35/36/37 (citation-gaming), 43–48 (FARM anti-gaming) and 50
  // (malformed-claim slash) were defined with confident defaults but read by
  // NO keeper logic — the chain advertised a quality gate it never enforced.
  // Removed and reserved so the numbers/names are never silently reused.
  reserved 33, 35, 36, 37, 43, 44, 45, 46, 47, 48, 50;
  reserved "novelty_bonus_bps", "max_citations_per_claim", "citation_decay_per_level", "self_citation_discount_bps", "conformity_threshold_bps", "calibration_trivial_threshold", "misbehavior_rejection_threshold", "min_domain_contributors_for_novelty", "min_participation_rate_bps", "challenge_stake_ratio_min_bps", "malformed_claim_slash_bps";

  // ─── Research fund ───────────────────────────────────────────────────────
  uint64 research_fund_share_bps = 49; // default: 130,000 (13%)

  // ─── Fitness scoring ─────────────────────────────────────────────────────
  uint64 fitness_epoch_blocks        = 51;  // Blocks per fitness epoch
  uint64 fitness_weight_query_bps    = 52;  // Weight for query rate
  uint64 fitness_weight_citation_bps = 53;  // Weight for citation rate
  uint64 fitness_weight_bridge_bps   = 54;  // Weight for bridge score
  uint64 fitness_weight_depth_bps    = 55;  // Weight for dependency depth
  uint64 fitness_weight_patron_bps   = 56;  // Weight for active patronage
  uint64 fitness_weight_unique_bps   = 57;  // Weight for uniqueness
  uint64 fitness_weight_age_bps      = 58;  // Weight for age penalty
  uint64 fitness_initial_score       = 59;  // Score assigned at birth (grace period)
  uint64 fitness_grace_epochs        = 60;  // Epochs before age penalty kicks in

  // ─── Bootstrap fund (R19-7) ────────────────────────────────────────────
  bool   bootstrap_fund_enabled         = 61; // Whether sponsored claims are accepted
  string bootstrap_fund_max_per_address = 62; // Max sponsored claims per address (lifetime)
  string bootstrap_fund_max_per_epoch   = 63; // Max sponsored claims per epoch (rate limit)
  uint64 bootstrap_fund_epoch_blocks    = 64; // Epoch length in blocks for rate limiting
  string bootstrap_fund_fee_cap         = 65; // Max fee the fund will cover per claim (uzrn)

  // ─── Metabolism ──────────────────────────────────────────────────────────
  uint64 metabolism_base_cost                = 66;  // Base energy drain per epoch
  uint64 metabolism_content_length_bps       = 67;  // Additional cost per 100 chars of content (BPS of base)
  uint64 metabolism_domain_competition_bps   = 68;  // Additional cost per 100 facts in domain (BPS of base)
  uint64 metabolism_energy_per_query         = 69;  // Energy gained per query
  uint64 metabolism_energy_per_citation      = 70;  // Energy gained per new citation
  uint64 metabolism_energy_per_patronage     = 71;  // Energy gained per patronage epoch
  uint64 metabolism_energy_challenge_survival = 72; // One-time energy for surviving challenge
  uint64 metabolism_energy_cap               = 73;  // Maximum energy a fact can hold
  uint64 metabolism_initial_energy           = 74;  // Starting energy for new facts
  uint64 metabolism_at_risk_epochs           = 75;  // Epochs at 0 energy before expiry
  uint64 metabolism_expired_to_pruned_epochs = 76;  // Epochs after expiry before pruning

  // ─── Reproduction ────────────────────────────────────────────────────
  uint64 reproduction_royalty_bps                   = 77;  // Royalty to parent per child reward epoch
  uint64 reproduction_royalty_decay_bps             = 78;  // Decay per generation (BPS of previous)
  uint64 reproduction_max_royalty_depth             = 79;  // Max generations for royalty propagation
  uint64 reproduction_parent_energy_bonus           = 80;  // Energy bonus to parent when child is created
  uint64 reproduction_child_fitness_inheritance_bps = 81;  // % of parent fitness inherited by child
  uint64 reproduction_max_children                  = 82;  // Max direct children per fact

  // ─── Novelty detection ──────────────────────────────────────────────────
  uint64 novelty_common_knowledge_penalty_bps = 83;  // Default penalty for common knowledge match
  uint64 novelty_subject_overlap_penalty_bps  = 84;  // Penalty per existing fact with same subject
  uint64 novelty_precision_bonus_bps          = 85;  // Bonus if more precise than existing
  uint64 novelty_cross_domain_bonus_bps       = 86;  // Bonus if subject spans multiple domains
  uint64 novelty_max_overlap_facts            = 87;  // Cap on overlap penalty (after N, no more penalty)

  // ─── Agent demand ────────────────────────────────────────────────
  uint64 demand_bounty_threshold         = 88;  // Unfulfilled queries per epoch to trigger bounty
  string demand_bounty_base_reward       = 89;  // Base bounty reward (uzrn)
  string demand_bounty_per_query_bonus   = 90;  // Additional reward per unfulfilled query (uzrn)
  uint64 demand_bounty_expiry_epochs     = 91;  // Epochs before unclaimed bounty expires
  uint64 demand_multiplier_cap           = 92;  // Max demand multiplier for energy (BPS)
  bool   demand_tracking_enabled         = 93;  // Enable/disable demand tracking
  repeated string authorized_demand_reporters = 94; // Addresses allowed to report demand

  // ─── Competition (niche dynamics) ──────────────────────────────────
  uint64 competition_niche_dominance_bonus_bps = 95;  // Fitness bonus for niche leader (BPS)
  uint64 competition_redundancy_threshold_bps  = 96;  // Below this ratio of leader fitness = redundant (BPS)
  uint64 competition_max_niche_size            = 97;  // Max facts per niche before forced pruning
  uint64 competition_symbiosis_bonus_bps       = 98;  // Fitness bonus per SUPPORTS link to healthy fact (BPS)

  // ─── Query satisfaction ──────────────────────────────────────────────
  uint64 fitness_weight_satisfaction_bps = 99;  // Weight of satisfaction in fitness (default: 150,000 = 15%)
  uint64 satisfaction_min_ratings        = 100; // Minimum ratings before satisfaction affects fitness (default: 3)

  // ─── Consensus diversity (R28-2) ──────────────────────────────────
  uint64 diversity_conformity_alert_threshold = 101; // BPS entropy below which a domain is "conforming" (default: 50,000 = 5%)
  uint64 diversity_conformity_alert_epochs    = 102; // Consecutive low-diversity epochs before alert (default: 3)

  // ─── Retroactive vindication (R28-1) ──────────────────────────────
  bool   vindication_refund_enabled  = 103; // Master switch for vindication escrow (default: true)
  uint64 vindication_bonus_bps       = 104; // % of majority slash pool as bonus to vindicated minority (default: 2000 = 20%)
  uint64 vindication_slash_bps       = 105; // Slash rate for majority on disproven fact (default: 500 = 5%)
  uint64 vindication_window_blocks   = 106; // How long escrowed entries are eligible (default: 100000)

  // ─── Multi-level energy thresholds (R28-4) ──────────────────────────
  uint64 metabolism_active_threshold     = 107; // Energy below which fact → AT_RISK (default: 300,000 = 30%)
  uint64 metabolism_extinction_threshold = 108; // Energy below which (for N epochs) → EXTINCT (default: 10,000 = 1%)
  uint64 max_confidence                  = 109; // Hard cap on confidence (default: 880,000 = 88%)

  // ─── Role bonuses (R28-5) ──────────────────────────────────────────────
  uint64 human_empirical_bonus_bps     = 110; // +15% confidence for human OBSERVATION claims (BPS)
  uint64 agent_computational_bonus_bps = 111; // +15% confidence for agent COMPUTATIONAL claims (BPS)
  uint64 agent_verification_bonus_bps  = 112; // +20% vote weight for agent verifiers (BPS)
  uint64 human_patronage_bonus_bps     = 113; // +10% energy boost for human patrons (BPS)
  uint64 dual_validation_bonus_bps     = 114; // +25% confidence for partnership claims (BPS)

  // ─── Domain carrying capacity (R29-1) ──────────────────────────────────
  uint64 domain_base_capacity              = 115; // Base facts per domain before pressure kicks in (default: 1000)
  uint64 domain_capacity_growth_per_citation = 116; // Capacity bonus per inbound cross-domain citation (default: 1)
  uint64 overcrowding_decay_multiplier_bps = 117; // Decay multiplier at 2× capacity (default: 1,500,000 = 150%)
  uint64 underpopulation_birth_bonus_bps   = 118; // Energy bonus for facts in sparse domains (default: 200,000 = 20%)

  // ─── Epistemic temperature (R29-2) ──────────────────────────────────
  uint64 epistemic_temperature_decay_bps        = 119; // Per-epoch decay toward neutral (default: 995,000 = 99.5%)
  uint64 epistemic_conformity_cooling_bps       = 120; // Cooling per high-conformity epoch (default: 50,000 = 5%)
  uint64 epistemic_vindication_heating_bps      = 121; // Heating per vindication event (default: 100,000 = 10%)
  uint64 epistemic_cold_confidence_cap_bps      = 122; // Max confidence in cold domains (default: 600,000 = 60%)
  uint64 epistemic_hot_confidence_growth_bps    = 123; // Confidence growth multiplier in hot domains (default: 1,500,000 = 150%)
  uint64 epistemic_temperature_window_blocks    = 124; // Lookback window for vindication counting (default: 10,000)

  // ─── Domain role elasticity (R29-3) ──────────────────────────────────
  uint64 role_elasticity_min_calls          = 125; // Min calls per role before elasticity activates (default: 10)
  uint64 role_elasticity_max_multiplier_bps = 126; // Max bonus scaling (default: 2,000,000 = 200%)
  uint64 role_elasticity_min_multiplier_bps = 127; // Min bonus scaling (default: 500,000 = 50%)
  uint64 role_elasticity_decay_epochs       = 128; // Blocks between 5% decay cycles (default: 100)

  // ─── Mentorship dividends (R31-5: Water → Wood) ──────────────────────
  uint64 mentorship_dividend_energy   = 129; // Energy added to domain on mentorship graduation (default: 50,000)
  uint64 mentorship_capacity_bonus    = 130; // Carrying capacity bonus per graduation (default: 5)

  // ─── Social verification adjustment (R31-2: Water → Fire) ──────────────
  uint64 social_saturation_threshold = 131; // Partnership density above which verification relaxes (default: 10)
  uint64 observation_window_blocks   = 132; // Lookback window for verification health metrics (default: 10000)

  // ─── Consensus integrity (T1 mitigation) ────────────────────────────────
  // Minimum distinct verifier headcount that must vote with the verdict, in
  // addition to the stake-weighted ConfidenceThreshold. Prevents a single
  // large-stake coalition from promoting claims past consensus.
  uint64 min_headcount_agreement = 133; // default: 3

  // ─── Popperian challenge stake (Wave 14c: stress-test, don't shield) ────
  // Effective MinChallengeStake = base × max(floor, 1 - target.Confidence ×
  // scaling / BPS). Scales INVERSELY with target confidence: the more the
  // community trusts a claim, the cheaper it is to probe it. Truth stands
  // firm under challenge because of its nature — the chain invites the
  // testing of high-confidence facts rather than taxing it.
  // See keeper.ChallengeStakeFloorBps (10% floor) for the spam guard.
  uint64 challenge_confidence_scaling_bps = 134; // default: 1,000,000 (full inversion)

  // ─── Schelling-point mitigation (T3) ────────────────────────────────────
  // Verifier reward is multiplied by (1 - conformity_bps × strength / BPS²)
  // so crowd-followers earn less than independent investigators.
  // Score source: ValidatorIndependenceScore in x/knowledge/keeper/diversity.go.
  uint64 independence_reward_strength_bps = 135; // default: 300,000 (max 30% reward reduction)

  // ─── Route B Wave 4: economic realignment ───────────────────────────────
  // Reformulation rounds: how many verifier votes before a verdict is final.
  uint64 reformulation_min_panel_votes = 136; // default: 3
  // Fraction of verifiers that must agree to finalize a non-pending verdict.
  uint64 reformulation_consensus_bps   = 137; // default: 666,000 (66.6%)
  // SUPERIOR verdict bonus as a multiplier of reward_per_variant.
  uint64 reformulation_superior_bonus_bps = 138; // default: 500,000 (50% bonus)
  // Percentage of remaining-bounty escrow charged as a "kept-market-open"
  // fee when the sponsor cancels or the bounty expires with unspent escrow.
  uint64 augmentation_expiry_fee_bps = 139; // default: 30,000 (3%)
  // Methodology normalization table. Keys are methodology_id strings in the
  // Methodology registry; values are multipliers in BPS applied to TVW so
  // methodologies with naturally-low corroboration don't get starved.
  // Absent keys → 1,000,000 (1.0×). Set at genesis.
  map<string, uint64> methodology_normalization_bps = 140;
  // Vindication multiplier — facts vindicated from minority status get this
  // fraction × TVW. >1.0× rewards epistemic courage.
  uint64 vindication_tvw_multiplier_bps = 141; // default: 2,500,000 (2.5×)
  // Disproval clawback — after a fact goes DISPROVEN, this fraction of the
  // recent training revenue is clawed back from the submitter into the
  // research fund.
  uint64 disproval_clawback_bps = 142; // default: 500,000 (50%)
  uint64 disproval_clawback_window_epochs = 143; // default: 30
  // Training-fund post-hoc disbursement params.
  uint64 training_fund_calibration_floor_bps = 144; // default: 500,000 (50%) — below = no disbursement
  uint64 training_fund_vesting_epochs        = 145; // default: 60
  uint64 training_fund_methodology_diversity_bonus_bps = 146; // default: 100,000 per distinct method beyond 1
  string training_fund_base_reward          = 147; // default: "1000000000" (1,000 ZRN in uzrn)
  // Contribution challenge — challenger bond size (uzrn as string).
  string contribution_challenge_bond        = 148; // default: "5000000" (5 ZRN)
  uint64 contribution_challenge_reward_multiplier_bps = 149; // default: 2,000,000 (winner takes bond × 2)
  // Sponsor-veto forfeiture: if a sponsor vetoes a passing verdict, they
  // forfeit this fraction of the variant payout to the research fund.
  uint64 sponsor_veto_forfeit_bps = 150; // default: 1,000,000 (100% — full forfeiture)

  // ─── Wave 14: internal-hack resilience ───────────────────────────────
  // Upper bound on any single module pause window. Even if authority
  // sets auto_unpause_at_block=0 (intending indefinite), the handler
  // caps it to this many blocks from pause-time. Forces compromised
  // authority's DoS to self-resolve within a governance-configured
  // window rather than persisting indefinitely.
  uint64 max_pause_duration_blocks = 151; // default: 28,800 (~40h at 5s blocks)

  // ─── Wave 15: chain-driven stress-test invitation ──────────────────────
  // Truth stands firm under challenge because of its nature — and the
  // chain no longer waits for challenges to arrive. A per-block heartbeat
  // scans for high-confidence facts that have gone idle (no challenge in
  // threshold blocks) and emits invitation events, signaling to external
  // prober agents that the substrate is actively seeking stress-tests of
  // those claims. The chain manufactures demand for its own audit.
  uint64 probe_invitation_idle_threshold_blocks = 152; // default: 34,272 (~1 day at 2.5s blocks)
  uint64 probe_invitation_min_confidence_bps    = 153; // default: 700,000 (70%) — only invite probes on facts worth testing
  uint32 probe_invitation_batch_size            = 154; // default: 10 — max invitations emitted per block (bounds BeginBlocker work)
  uint64 probe_invitation_reinvite_cooldown     = 155; // default: 100_000 blocks — don't re-invite the same fact back-to-back

  // ─── Wave 15: probe bounty pool ───────────────────────────────────────
  // A purpose-built minting stream that funds probe rewards. Moves
  // epistemic-auditing funding out of general governance (protocol
  // treasury) into a dedicated pool so the chain self-sustains its own
  // audit economy. successful-probe bonuses draw from this pool first;
  // if the pool is empty, fall back to protocol treasury.
  string probe_bounty_mint_per_block = 156; // uzrn minted per block (default "1000000" = 1 ZRN)
  string probe_bounty_max_pool_size  = 157; // cap on pool balance (default "1000000000000" = 1,000,000 ZRN)

  // ─── Wave 15b: invitation bonuses ──────────────────────────────────────
  // When a prober acts on a fact the chain has explicitly invited for
  // stress-testing, pay them a flat bonus from the probe bounty pool
  // regardless of outcome. Converts invitations from demand signals
  // into standing offers — the chain isn't just saying "please probe
  // this", it's saying "here's uzrn waiting for whoever does."
  // Paid in addition to stake refund, participation reward, and
  // success amplification.
  string invitation_bonus_amount = 158; // default "500000" = 0.5 ZRN per answered invitation

  // ─── Wave 16: guardian-veto window ────────────────────────────────────
  // The privileged-action log made authority abuse queryable; the
  // guardian-veto window makes it preventable. The set of addresses
  // listed in guardian_addresses can VETO authority-gated fact
  // injection during the time window between proposal and
  // materialization. Closes the persistent-authority-compromise gap
  // documented in Wave 14: the chain no longer relies on a single key
  // for actions that bypass the verifier panel.
  //
  // The single authority can still propose actions cheaply; legitimate
  // operations are not blocked. But any one of the configured
  // guardians can cancel a malicious or mistaken proposal during the
  // veto window. Trust shifts from "the authority key is honest" to
  // "no individual can unilaterally inject untruth."
  repeated string guardian_addresses              = 159; // veto-eligible addresses; empty = no guardian set, immediate execution
  uint64 add_fact_veto_window_blocks              = 160; // default 0 (immediate); set > 0 to enable veto window
}

// GenesisState is the genesis state of the knowledge module.
message GenesisState {
  Params                    params        = 1;
  repeated Fact             facts         = 2;
  repeated Claim            pending_claims = 3;
  repeated VerificationRound active_rounds = 4;
  repeated Domain           domains       = 5;
  string bootstrap_fund_allocation                 = 6; // Initial fund allocation (uzrn) — one-time genesis mint
  repeated CommonKnowledgeEntry common_knowledge   = 7; // Seeded common knowledge entries

  // ─── Route B Wave 8: full state round-trip ─────────────────────────────
  // Every type the Route B training infrastructure writes is exported here
  // so a chain upgrade (or genesis restart) preserves the substrate. The
  // alignment principle: the chain is survivable — past manifests,
  // attestations, calibrations, and disbursements outlive any single run.

  repeated Methodology          methodologies          = 20;
  repeated NormativeCommitment  normative_commitments  = 21;

  TokenizerSpec                 tokenizer_spec         = 30; // current
  repeated TokenizerSpec        tokenizer_spec_history = 31; // historical versions
  TraceSchema                   trace_schema           = 32; // current
  repeated TraceSchema          trace_schema_history   = 33; // historical versions

  repeated TrainingPipeline     training_pipelines     = 40;
  repeated ModelCard            model_cards            = 41;
  repeated TrainingAttestation  training_attestations  = 42;
  repeated ContributionRecord   contribution_records   = 43;
  repeated AugmentationBounty   augmentation_bounties  = 44;
  repeated Augmentation         augmentations          = 45;
  repeated ContributionChallenge contribution_challenges = 46;
  repeated TrainingFundDisbursement training_fund_disbursements = 47;
  repeated TrainingManifest     training_manifests     = 48;

  // Agent calibration (Phase 5) — also Route-B-adjacent.
  repeated AgentCalibration     agent_calibrations     = 50;

  // Training fund initial balance (uzrn, minted on InitGenesis; analogous
  // to bootstrap_fund_allocation but for the KnowledgeTrainingFund module
  // account).
  string training_fund_allocation                      = 60;
}
