message QueryStructuredCorpusRequest {
  string method_id = 1;             // optional filter
  uint64 min_corroboration = 2;
  TrainingQualityTier min_tier = 3;
  uint32 limit = 4;
  uint32 offset = 5;
  bool include_disproven = 6;       // include NEGATIVE-tier facts (disproven) as contrastive examples
}

// StructuredCorpusEntry is the canonical per-row training object. Field
// ordering here is the stable serialisation contract for producers and
// consumers.
message StructuredCorpusEntry {
  string fact_id = 1;
  string content = 2;
  string method_id = 3;
  string domain = 4;
  uint64 confidence_bps = 5;
  uint64 dependency_confidence_floor_bps = 6;
  uint32 axiom_distance = 7;
  uint64 corroboration_count = 8;
  TrainingQualityTier tier = 9;
  CurriculumTier curriculum_tier = 10;
  string reasoning_trace = 11;
  repeated FactRelation support_edges = 12;
  FactStatus status = 13;
  bool is_negative_example = 14;    // true if tier == NEGATIVE (disproven)
  string submitter = 15;
  uint64 submitter_calibration_score_bps = 16;  // denormalised for training weighting
}

// CurriculumTier is now defined in types.proto so that MethodologyApplicationTrace
// (Wave 5) can reference it alongside TrainingQualityTier.

message QueryStructuredCorpusResponse {
  repeated StructuredCorpusEntry entries = 1;
  uint32 total = 2;
  uint64 snapshot_block_height = 3;
  uint64 tokenizer_version = 4;
  uint64 canonical_serialisation_version = 5;
}

// DisputationCorpus: (fact, challenge, outcome) tuples as argumentation training data.
message QueryDisputationCorpusRequest {
  uint32 limit = 1;
  uint32 offset = 2;
  // Filter: if true, only include disputations whose challenge was
  // accepted (the fact was disproven). Default false — include both
  // survivals (the argument failed) and disprovals (the argument succeeded).
  bool only_successful_challenges = 3;
}

message DisputationCorpusEntry {
  string challenged_fact_id = 1;
  string challenge_claim_id = 2;
  string argument_text      = 3;  // challenger's argument
  string rebuttal_text      = 4;  // defender's rebuttal (if any)
  string challenge_method_id = 5;
  // Outcome: "survived" (challenge rejected, fact corroborated) |
  //          "disproven" (challenge accepted, fact disproven) |
  //          "pending" (round not yet complete)
  string outcome            = 6;
  uint64 resolved_at_block  = 7;
  // The original fact's content — denormalised so training pipelines don't
  // need a second round-trip.
  string fact_content       = 8;
  string fact_method_id     = 9;
  string challenger_address = 10;
  uint64 corroboration_after = 11;  // fact's corroboration count after the dispute
}

message QueryDisputationCorpusResponse {
  repeated DisputationCorpusEntry entries = 1;
  uint32 total = 2;
  uint64 snapshot_block_height = 3;
}

