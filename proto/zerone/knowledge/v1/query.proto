// ─── Proof tree (ToK Wave 3) ───────────────────────────────────────────────

message QueryProofTreeRequest {
  string fact_id  = 1;
  uint32 max_depth = 2;       // 0 = default 5; caller-configurable
  bool include_axioms = 3;    // Default true; set false to terminate at non-axiom leaves
}

// ProofTreeNode is the recursive return shape for ProofTree. Each node names
// the fact plus the typed edge by which it supports its parent in the tree.
message ProofTreeNode {
  Fact fact = 1;
  // Edge from parent_in_tree → this fact. Empty for the root.
  RelationType edge_relation        = 2;
  InferenceType edge_inference      = 3;
  uint64 edge_inference_strength_bps = 4;
  // Children of this node in the proof tree = facts this one depends on.
  repeated ProofTreeNode supports   = 5;
  uint32 depth                      = 6;   // Distance from root (0 = root)
  bool is_axiom                     = 7;   // axiom_distance == 0
  bool truncated                    = 8;   // true if max_depth reached before leaves
}

message QueryProofTreeResponse {
  ProofTreeNode root = 1;
  uint32 total_nodes = 2;
  uint32 max_depth_reached = 3;
  uint64 minimum_confidence_in_tree = 4; // Weakest link in support chain
}

message QueryDescendantTreeRequest {
  string fact_id  = 1;
  uint32 max_depth = 2; // 0 = default 5
}

// DescendantNode is a fact that transitively derives from the query fact.
// The edge_* fields name the INCOMING edge from descendant → the fact above
// it in this tree (i.e. the descendant's own declaration of dependence).
message DescendantNode {
  Fact fact = 1;
  RelationType edge_relation        = 2;
  InferenceType edge_inference      = 3;
  uint64 edge_inference_strength_bps = 4;
  repeated DescendantNode descendants = 5;
  uint32 depth                      = 6;
  bool truncated                    = 7;
}

message QueryDescendantTreeResponse {
  Fact root = 1;
  repeated DescendantNode descendants = 2;
  uint32 total_nodes = 3;
  uint32 max_depth_reached = 4;
}

// ─── Trust profile (ToK Wave 7) ─────────────────────────────────────────────

message QueryTrustProfileRequest {
  string fact_id = 1;
}

// TrustProfile aggregates all ToK provenance signals for a fact.
message QueryTrustProfileResponse {
  Fact fact = 1;

  // Direct signals (what the fact carries today).
  uint64 own_confidence_bps          = 2;  // Fact.Confidence
  uint64 dependency_confidence_floor = 3;  // Fact.DependencyConfidenceFloor (0 = no floor)
  uint32 axiom_distance              = 4;  // Fact.AxiomDistance

  // Derived signals.
  uint32 direct_supporters           = 5;  // Facts this one directly cites (support-bearing)
  uint32 direct_descendants          = 6;  // Facts that directly cite this
  uint64 minimum_confidence_in_ancestry = 7; // Weakest link in support chain
  FactStatus status                  = 8;  // Convenience echo

  // Grounded score — a single 0-1,000,000 BPS metric that combines the three
  // pillars. Formula (documented on the RPC):
  //   grounded = own_confidence × axiom_weight × floor_weight / BPS²
  //   axiom_weight = BPS × BPS / (BPS + axiom_distance × AXIOM_DISTANCE_DECAY_BPS)
  //   floor_weight = min(floor/own_confidence, 1.0) if floor > 0 else 1.0
  // Score is capped at own_confidence — a fact can never be MORE trustworthy
  // than its own verification claimed.
  uint64 grounded_score_bps          = 9;

  // Methodology under which the fact was adjudicated (Phase 1).
  string method_id                   = 10;

  // Popperian corroboration count: failed falsification attempts survived
  // (Phase 2). This is the Popperian antipode to "how confidently verified"
  // — instead, "how many tests has this withstood?" A high number is
  // epistemically meaningful in a way high own_confidence is not.
  uint64 corroboration_count         = 11;
  uint64 last_corroborated_block     = 12;
}

