  ManifestStatus status     = 3;  // UNSPECIFIED = all
  uint32 limit              = 4;
  uint32 offset             = 5;
}
message QueryTrainingManifestsResponse {
  repeated TrainingManifest manifests = 1;
  uint32 total                        = 2;
  uint64 snapshot_block_height        = 3;
}

message QueryTrainingManifestBundleRequest {
  string id = 1;
}
// BundledArtifact carries the entire downloadable payload for a manifest.
// Trainers receive this single response and can verify it against the
// manifest's Merkle root without further RPC calls.
message QueryTrainingManifestBundleResponse {
  TrainingManifest manifest                          = 1;
  repeated MethodologyApplicationTrace traces        = 2;
  repeated ContrastivePair contrastive_pairs         = 3;
  repeated DriftCorpusEntry drift_entries            = 4;
  repeated NormativeCorpusEntry normative_entries    = 5;
  // Re-derived root for client-side verification.
  string derived_merkle_root                         = 6;
  // true iff derived_merkle_root == manifest.merkle_root.
  bool merkle_root_valid                             = 7;
}

message QueryRouteBCapabilitiesRequest {}
message QueryRouteBCapabilitiesResponse {
  RouteBCapabilities capabilities = 1;
}

// ─── Route B Wave 11: incident response queries ──────────────────────────

message QueryIncidentRequest {
  string id = 1;
}
message QueryIncidentResponse {
  IncidentRecord incident = 1;
  bool found = 2;
}

message QueryIncidentsRequest {
  IncidentSeverity severity = 1;   // UNSPECIFIED = all
  IncidentStatus status     = 2;   // UNSPECIFIED = all
  uint32 limit              = 3;
  uint32 offset             = 4;
}
message QueryIncidentsResponse {
  repeated IncidentRecord incidents = 1;
  uint32 total                      = 2;
  uint64 snapshot_block_height      = 3;
}

message QueryOpenIncidentsRequest {
  IncidentSeverity severity = 1;  // UNSPECIFIED = all
}
message QueryOpenIncidentsResponse {
  repeated IncidentRecord incidents = 1;
  uint64 snapshot_block_height      = 2;
}

// ─── Route B Wave 12: resilience queries ─────────────────────────────────

message QueryPausedModulesRequest {}
message QueryPausedModulesResponse {
  repeated ModulePause paused = 1;
  uint64 snapshot_block_height = 2;
}

// ─── Wave 13: SLA dashboard ──────────────────────────────────────────────

message QuerySlaBreachedIncidentsRequest {}
message QuerySlaBreachedIncidentsResponse {
  repeated IncidentRecord incidents = 1;
  uint64 snapshot_block_height      = 2;
  uint64 current_block_height       = 3;
}

// ─── Wave 14: privileged-action audit log ────────────────────────────────

message QueryPrivilegedActionsRequest {
  PrivilegedActionType type = 1;  // UNSPECIFIED = all
  uint32 limit              = 2;
  uint32 offset             = 3;
  // If non-zero, return only actions invoked at or after this block.
  uint64 since_block        = 4;
}
message QueryPrivilegedActionsResponse {
  repeated PrivilegedAction actions = 1;
  uint32 total                      = 2;
  uint64 snapshot_block_height      = 3;
}
