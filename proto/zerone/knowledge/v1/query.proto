// StructuredCorpus: pipeline-ready training rows.
message QueryStructuredCorpusRequest {
  string method_id = 1;             // optional filter
  uint64 min_corroboration = 2;
  TrainingQualityTier min_tier = 3;
  uint32 limit = 4;
  uint32 offset = 5;
  bool include_disproven = 6;       // include NEGATIVE-tier facts (disproven) as contrastive examples
}

// StructuredCorpusEntry is the canonical per-row training object. Field
// ordering here is the stable serialisation contract for producers and
// consumers.
message StructuredCorpusEntry {
  string fact_id = 1;
  string content = 2;
  string method_id = 3;
  string domain = 4;
  uint64 confidence_bps = 5;
  uint64 dependency_confidence_floor_bps = 6;
  uint32 axiom_distance = 7;
  uint64 corroboration_count = 8;
  TrainingQualityTier tier = 9;
  CurriculumTier curriculum_tier = 10;
  string reasoning_trace = 11;
  repeated FactRelation support_edges = 12;
  FactStatus status = 13;
  bool is_negative_example = 14;    // true if tier == NEGATIVE (disproven)
  string submitter = 15;
  uint64 submitter_calibration_score_bps = 16;  // denormalised for training weighting
}

// CurriculumTier orders training examples by difficulty and foundational depth.
enum CurriculumTier {
  CURRICULUM_TIER_UNSPECIFIED = 0;
  CURRICULUM_TIER_FOUNDATION  = 1;  // axiom_distance ≤ 1, high corroboration, simple methods
  CURRICULUM_TIER_INTERMEDIATE = 2;
  CURRICULUM_TIER_ADVANCED    = 3;  // deep derivation chains
  CURRICULUM_TIER_SPECIALISED = 4;  // niche methodologies (phenomenological, ecological, practice)
}

message QueryStructuredCorpusResponse {
  repeated StructuredCorpusEntry entries = 1;
  uint32 total = 2;
  uint64 snapshot_block_height = 3;
  uint64 tokenizer_version = 4;
  uint64 canonical_serialisation_version = 5;
}

