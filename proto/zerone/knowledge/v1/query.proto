syntax = "proto3";
package zerone.knowledge.v1;

option go_package = "github.com/zerone-chain/zerone/x/knowledge/types";

import "cosmos/base/query/v1beta1/pagination.proto";
import "google/api/annotations.proto";
import "zerone/knowledge/v1/types.proto";
import "zerone/knowledge/v1/genesis.proto";

// Query defines the gRPC query service for the knowledge module.
service Query {
  // Params queries module parameters.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/params";
  }

  // Fact queries a single fact by ID.
  rpc Fact(QueryFactRequest) returns (QueryFactResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts/{id}";
  }

  // Facts queries facts with optional domain, status, and category filters.
  rpc Facts(QueryFactsRequest) returns (QueryFactsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts";
  }

  // FactsByDomain queries all facts in a domain.
  rpc FactsByDomain(QueryFactsByDomainRequest) returns (QueryFactsByDomainResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts/domain/{domain}";
  }

  // FactsBySubmitter queries all facts submitted by an address.
  rpc FactsBySubmitter(QueryFactsBySubmitterRequest) returns (QueryFactsBySubmitterResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts/submitter/{submitter}";
  }

  // Claim queries a single claim by ID.
  rpc Claim(QueryClaimRequest) returns (QueryClaimResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/claims/{id}";
  }

  // PendingClaims queries all pending claims.
  rpc PendingClaims(QueryPendingClaimsRequest) returns (QueryPendingClaimsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/claims/pending";
  }

  // VerificationRound queries a verification round by ID.
  rpc VerificationRound(QueryVerificationRoundRequest) returns (QueryVerificationRoundResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/rounds/{id}";
  }

  // Domain queries a domain by name.
  rpc Domain(QueryDomainRequest) returns (QueryDomainResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/domains/{name}";
  }

  // Domains queries all domains with optional pagination.
  rpc Domains(QueryDomainsRequest) returns (QueryDomainsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/domains";
  }

  // FactConfidence queries the current confidence score of a fact.
  rpc FactConfidence(QueryFactConfidenceRequest) returns (QueryFactConfidenceResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts/{id}/confidence";
  }

  // FactCitationCount queries the citation count of a fact.
  rpc FactCitationCount(QueryFactCitationCountRequest) returns (QueryFactCitationCountResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts/{id}/citations";
  }

  // FactRelations queries typed relations for a fact (knowledge graph edges).
  rpc FactRelations(QueryFactRelationsRequest) returns (QueryFactRelationsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts/{fact_id}/relations";
  }

  // FactsBySubject queries facts by structured subject within a domain.
  rpc FactsBySubject(QueryFactsBySubjectRequest) returns (QueryFactsBySubjectResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts_by_subject/{domain}/{subject}";
  }

  // FactsByTag queries facts by a searchable tag.
  rpc FactsByTag(QueryFactsByTagRequest) returns (QueryFactsByTagResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts_by_tag/{tag}";
  }

  // FactByCanonical queries a fact by its canonical form hash.
  rpc FactByCanonical(QueryFactByCanonicalRequest) returns (QueryFactByCanonicalResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fact_by_canonical/{canonical_hash}";
  }

  // FactsByFitness queries facts sorted by fitness score.
  rpc FactsByFitness(QueryFactsByFitnessRequest) returns (QueryFactsByFitnessResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts_by_fitness";
  }

  // BootstrapFundStatus queries the current state of the knowledge bootstrap fund.
  rpc BootstrapFundStatus(QueryBootstrapFundStatusRequest) returns (QueryBootstrapFundStatusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/bootstrap_fund";
  }

  // FactsAtRisk queries facts whose energy has reached zero (at-risk of expiry).
  rpc FactsAtRisk(QueryFactsAtRiskRequest) returns (QueryFactsAtRiskResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/facts_at_risk";
  }

  // FactLineage traces a fact's ancestry up to the root.
  rpc FactLineage(QueryFactLineageRequest) returns (QueryFactLineageResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fact/{fact_id}/lineage";
  }

  // FactProgeny returns a fact's descendant tree.
  rpc FactProgeny(QueryFactProgenyRequest) returns (QueryFactProgenyResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fact/{fact_id}/progeny";
  }

  // ProofTree walks the supporting-evidence ancestry of a fact, returning the
  // full derivation graph up to max_depth. Follows SUPPORTS / REQUIRES / REFINES
  // / CITES edges outward from the fact; excludes CONTRADICTS. Each returned
  // node carries its inference type and strength so auditors can verify
  // the derivation chain (ToK Wave 3).
  rpc ProofTree(QueryProofTreeRequest) returns (QueryProofTreeResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fact/{fact_id}/proof_tree";
  }

  // DescendantTree is the dual of ProofTree: traverses INCOMING support edges
  // to return all facts that transitively derive from this one. Useful before
  // retracting a fact ("what depends on me?") and for the falsification
  // cascade mechanism (ToK Wave 4).
  rpc DescendantTree(QueryDescendantTreeRequest) returns (QueryDescendantTreeResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fact/{fact_id}/descendant_tree";
  }

  // TrustProfile consolidates a fact's full epistemic provenance into a
  // single response: own confidence, inherited floor, axiom distance,
  // descendant count, and a computed grounded_score that weighs all three.
  // The one-stop query for auditors (ToK Wave 7).
  rpc TrustProfile(QueryTrustProfileRequest) returns (QueryTrustProfileResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/fact/{fact_id}/trust_profile";
  }

  // Methodologies lists every registered methodology (Phase 1: methodology
  // over statement). The seven bootstrap methodologies are seeded at genesis;
  // governance can add/amend more through dedicated proposals.
  rpc Methodologies(QueryMethodologiesRequest) returns (QueryMethodologiesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/methodologies";
  }

  // Methodology returns a single methodology by id.
  rpc Methodology(QueryMethodologyRequest) returns (QueryMethodologyResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/methodology/{id}";
  }

  // NormativeCommitments lists every registered commitment (Phase 6:
  // is-ought wall). Commitments are values the chain holds — schema-distinct
  // from facts.
  rpc NormativeCommitments(QueryNormativeCommitmentsRequest) returns (QueryNormativeCommitmentsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/commitments";
  }

  // NormativeCommitment returns a single commitment by id.
  rpc NormativeCommitment(QueryNormativeCommitmentRequest) returns (QueryNormativeCommitmentResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/commitment/{id}";
  }

  // ─── Training pipeline exports (Phase 9) ─────────────────────────────
  // Every query below is deterministic and paginated; responses include
  // the snapshot block_height so training runs can pin to a specific state.
  //
  // MethodCorpus: method-stamped accepted facts filtered by corroboration
  // threshold. Primary positive-exemplar dataset for SFT fine-tuning.
  rpc MethodCorpus(QueryMethodCorpusRequest) returns (QueryMethodCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/method_corpus";
  }

  // DisprovenCorpus: facts that went DISPROVEN, with disproof reasoning.
  // The negative-example dataset. Most underused epistemic asset on-chain.
  rpc DisprovenCorpus(QueryDisprovenCorpusRequest) returns (QueryDisprovenCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/disproven_corpus";
  }

  // VindicationCorpus: minority voters who turned out correct. Rarest and
  // most valuable dataset — records of correct dissent.
  rpc VindicationCorpus(QueryVindicationCorpusRequest) returns (QueryVindicationCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/vindication_corpus";
  }

  // TrainingQuality: returns the computed training-quality tier for a fact.
  rpc TrainingQuality(QueryTrainingQualityRequest) returns (QueryTrainingQualityResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/quality/{fact_id}";
  }

  // ─── Feedback loop (Phase 5) ───────────────────────────────────────
  // AgentCalibration: returns the per-submitter track record that the
  // feedback loop writes after every round outcome, corroboration, and
  // disproval. The mechanism by which a ZERONE-trained model is measured
  // against the same adjudication it was trained on.
  rpc AgentCalibration(QueryAgentCalibrationRequest) returns (QueryAgentCalibrationResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/agent/{address}/calibration";
  }

  // AgentLeaderboard: rank submitters by calibration score. Optional
  // methodology filter so you can get "top agents in M-EMPIRICAL."
  rpc AgentLeaderboard(QueryAgentLeaderboardRequest) returns (QueryAgentLeaderboardResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/agent/leaderboard";
  }

  // ─── Route B: training infrastructure ─────────────────────────────
  // TokenizerSpec returns the current on-chain tokenizer contract.
  rpc TokenizerSpec(QueryTokenizerSpecRequest) returns (QueryTokenizerSpecResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/tokenizer_spec";
  }
  // TokenizerSpecAtVersion returns a historical tokenizer spec by version.
  rpc TokenizerSpecAtVersion(QueryTokenizerSpecAtVersionRequest) returns (QueryTokenizerSpecAtVersionResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/tokenizer_spec/{version}";
  }
  // TrainingPipelines lists all registered training pipelines.
  rpc TrainingPipelines(QueryTrainingPipelinesRequest) returns (QueryTrainingPipelinesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/pipelines";
  }
  // TrainingPipeline returns a single pipeline by id.
  rpc TrainingPipeline(QueryTrainingPipelineRequest) returns (QueryTrainingPipelineResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/pipeline/{id}";
  }
  // ModelCards lists all model cards, optionally filtered.
  rpc ModelCards(QueryModelCardsRequest) returns (QueryModelCardsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/model_cards";
  }
  // ModelCard returns a single model card by id.
  rpc ModelCard(QueryModelCardRequest) returns (QueryModelCardResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/model_card/{id}";
  }
  // ModelCardByDeployment returns the model card deployed at a given agent
  // address — correlates an on-chain calibration record with the underlying model.
  rpc ModelCardByDeployment(QueryModelCardByDeploymentRequest) returns (QueryModelCardByDeploymentResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/model_card/deployment/{address}";
  }
  // StructuredCorpus returns canonical, deterministic training-row entries
  // ready for pipeline consumption. Every row carries its tokenizer-version
  // contract, curriculum tier, method id, and support chain.
  rpc StructuredCorpus(QueryStructuredCorpusRequest) returns (QueryStructuredCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/structured_corpus";
  }

  // DisputationCorpus returns completed challenge rounds as argumentation
  // training data: (original fact, challenge claim + argument_text, outcome).
  // Route B — this is the training-data dimension no other corpus produces,
  // because natural-language argument + its outcome is rare in web crawl
  // and priceless for training models to reason dialectically.
  rpc DisputationCorpus(QueryDisputationCorpusRequest) returns (QueryDisputationCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/disputation_corpus";
  }

  // ─── Route B Wave 3 queries ────────────────────────────────────────
  // TrainingAttestation returns the training-completion attestation for a pipeline.
  rpc TrainingAttestation(QueryTrainingAttestationRequest) returns (QueryTrainingAttestationResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/attestation/{pipeline_id}";
  }
  // ModelContributions returns the fact_ids attributed to a model.
  rpc ModelContributions(QueryModelContributionsRequest) returns (QueryModelContributionsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/contributions/model/{model_id}";
  }
  // FactContributors returns the models that used a given fact in training.
  rpc FactContributors(QueryFactContributorsRequest) returns (QueryFactContributorsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/contributions/fact/{fact_id}";
  }
  // ModelLineage walks the predecessor chain from a given model back to roots.
  rpc ModelLineage(QueryModelLineageRequest) returns (QueryModelLineageResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/lineage/{model_id}";
  }
  // AugmentationBounty returns a single bounty by id.
  rpc AugmentationBounty(QueryAugmentationBountyRequest) returns (QueryAugmentationBountyResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/augmentation_bounty/{id}";
  }
  // AugmentationBounties lists bounties with optional filters.
  rpc AugmentationBounties(QueryAugmentationBountiesRequest) returns (QueryAugmentationBountiesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/augmentation_bounties";
  }
  // AugmentationsByFact returns all augmentations of a given fact.
  rpc AugmentationsByFact(QueryAugmentationsByFactRequest) returns (QueryAugmentationsByFactResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/augmentations/fact/{fact_id}";
  }

  // ─── Route B Wave 4: economic realignment ────────────────────────────
  // TrainingValueWeight computes the Popper-weighted TVW for a fact at
  // current state. Used by clients to preview contribution revenue share.
  rpc TrainingValueWeight(QueryTrainingValueWeightRequest) returns (QueryTrainingValueWeightResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/tvw/{fact_id}";
  }
  // ContributionChallenge returns a single challenge by id.
  rpc ContributionChallenge(QueryContributionChallengeRequest) returns (QueryContributionChallengeResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/challenge/{id}";
  }
  // OpenContributionChallenges lists unresolved challenges.
  rpc OpenContributionChallenges(QueryOpenContributionChallengesRequest) returns (QueryOpenContributionChallengesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/challenges/open";
  }
  // TrainingFundDisbursement returns a single disbursement by id.
  rpc TrainingFundDisbursement(QueryTrainingFundDisbursementRequest) returns (QueryTrainingFundDisbursementResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/disbursement/{id}";
  }
  // TrainingFundBalance returns the current training fund module account balance.
  rpc TrainingFundBalance(QueryTrainingFundBalanceRequest) returns (QueryTrainingFundBalanceResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/fund_balance";
  }
  // NormativeCorpus returns the NormativeCommitment training export; these
  // rows explicitly carry an is_normative=true flag and DO NOT generate
  // contribution revenue (is-ought wall in money).
  rpc NormativeCorpus(QueryNormativeCorpusRequest) returns (QueryNormativeCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/normative_corpus";
  }
  // DriftCorpus returns failed (DRIFT-verdict) reformulations as negative
  // training signal for meaning-preservation learning.
  rpc DriftCorpus(QueryDriftCorpusRequest) returns (QueryDriftCorpusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/drift_corpus";
  }

  // ─── Route B Wave 5: unified training format ─────────────────────────
  // MethodologyApplicationTrace returns the unified training row for a fact.
  rpc MethodologyApplicationTrace(QueryMethodologyApplicationTraceRequest) returns (QueryMethodologyApplicationTraceResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/trace/{fact_id}";
  }
  // MethodologyApplicationTraces streams traces with the same filters as
  // StructuredCorpus.
  rpc MethodologyApplicationTraces(QueryMethodologyApplicationTracesRequest) returns (QueryMethodologyApplicationTracesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/traces";
  }
  // ContrastivePairs returns (positive, negative, verdict) training tuples.
  rpc ContrastivePairs(QueryContrastivePairsRequest) returns (QueryContrastivePairsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/contrastive_pairs";
  }
  // TraceSchema returns the current canonical trace serialisation contract.
  rpc TraceSchema(QueryTraceSchemaRequest) returns (QueryTraceSchemaResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/trace_schema";
  }
  // TraceSchemaAtVersion returns a historical trace schema by version.
  rpc TraceSchemaAtVersion(QueryTraceSchemaAtVersionRequest) returns (QueryTraceSchemaAtVersionResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/trace_schema/{version}";
  }

  // ─── Route B Wave 7: manifests + capabilities ────────────────────────
  // TrainingManifest returns a single manifest by id.
  rpc TrainingManifest(QueryTrainingManifestRequest) returns (QueryTrainingManifestResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/manifest/{id}";
  }
  // TrainingManifests lists manifests with optional filters.
  rpc TrainingManifests(QueryTrainingManifestsRequest) returns (QueryTrainingManifestsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/manifests";
  }
  // TrainingManifestBundle returns the manifest plus the referenced
  // training artefacts (traces + pairs + drifts + normative commitments)
  // in a single payload — the downloadable training-run bundle.
  rpc TrainingManifestBundle(QueryTrainingManifestBundleRequest) returns (QueryTrainingManifestBundleResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/manifest/{id}/bundle";
  }
  // RouteBCapabilities returns the chain's self-description of the Route B
  // training surface — versions, counts, seed status, financial pins,
  // available corpora. The first query a trainer runs.
  rpc RouteBCapabilities(QueryRouteBCapabilitiesRequest) returns (QueryRouteBCapabilitiesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/training/capabilities";
  }

  // ─── Route B Wave 11: incident response queries ──────────────────────
  // Incident returns a single incident record by id.
  rpc Incident(QueryIncidentRequest) returns (QueryIncidentResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/incidents/{id}";
  }
  // Incidents lists incidents with optional filters (severity, status).
  rpc Incidents(QueryIncidentsRequest) returns (QueryIncidentsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/incidents";
  }
  // OpenIncidents lists only OPEN + MITIGATING incidents — the operator's
  // "live dashboard" query.
  rpc OpenIncidents(QueryOpenIncidentsRequest) returns (QueryOpenIncidentsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/incidents/open";
  }

  // ─── Route B Wave 12: circuit breakers ───────────────────────────────
  // PausedModules returns every module currently in paused state. The
  // operator dashboard query; any handler can self-check via keeper's
  // IsModulePaused helper.
  rpc PausedModules(QueryPausedModulesRequest) returns (QueryPausedModulesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/resilience/paused_modules";
  }

  // ─── Wave 13: SLA dashboard ──────────────────────────────────────────
  // SlaBreachedIncidents returns every incident whose sla_target_block
  // has passed and whose status is still OPEN or MITIGATING. The
  // operator's paging-worthy query — wire it to alerting so the response
  // team is notified when a tier-appropriate recovery window is missed.
  rpc SlaBreachedIncidents(QuerySlaBreachedIncidentsRequest) returns (QuerySlaBreachedIncidentsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/incidents/sla_breached";
  }

  // PrivilegedActions — the audit log of every authority-gated call.
  // The chain-wide "what has authority done recently?" query.
  rpc PrivilegedActions(QueryPrivilegedActionsRequest) returns (QueryPrivilegedActionsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/resilience/privileged_actions";
  }

  // ─── Novelty detection ─────────────────────────────────────────────────

  // CommonKnowledge queries the common knowledge registry.
  rpc CommonKnowledge(QueryCommonKnowledgeRequest) returns (QueryCommonKnowledgeResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/common_knowledge";
  }

  // CheckNovelty previews the novelty score a claim would receive before submission.
  rpc CheckNovelty(QueryCheckNoveltyRequest) returns (QueryCheckNoveltyResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/check_novelty";
  }

  // ─── Agent demand queries ──────────────────────────────────────────

  // ActiveBounties queries active (unclaimed) knowledge bounties.
  rpc ActiveBounties(QueryActiveBountiesRequest) returns (QueryActiveBountiesResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/bounties";
  }

  // DemandSignals queries demand signal data for a domain.
  rpc DemandSignals(QueryDemandSignalsRequest) returns (QueryDemandSignalsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/demand";
  }

  // TopDemandGaps queries the top unfulfilled demand gaps.
  rpc TopDemandGaps(QueryTopDemandGapsRequest) returns (QueryTopDemandGapsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/demand_gaps";
  }

  // ─── Niche competition queries ─────────────────────────────────────

  // NicheInfo queries members and metadata for a specific niche.
  rpc NicheInfo(QueryNicheInfoRequest) returns (QueryNicheInfoResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/niche/{niche_key}";
  }

  // NichesByDomain queries all niches within a domain.
  rpc NichesByDomain(QueryNichesByDomainRequest) returns (QueryNichesByDomainResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/niches/{domain}";
  }

  // ─── Consensus diversity queries ─────────────────────────────────────

  // DomainDiversity queries consensus diversity for a domain (current epoch).
  rpc DomainDiversity(QueryDomainDiversityRequest) returns (QueryDomainDiversityResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/diversity/domain/{domain}";
  }

  // DomainDiversityHistory queries historical diversity for a domain.
  rpc DomainDiversityHistory(QueryDomainDiversityHistoryRequest) returns (QueryDomainDiversityHistoryResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/diversity/domain/{domain}/history";
  }

  // ValidatorIndependence queries a validator's independence score.
  rpc ValidatorIndependence(QueryValidatorIndependenceRequest) returns (QueryValidatorIndependenceResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/diversity/validator/{validator}";
  }

  // ConformityAlerts queries domains with active conformity alerts.
  rpc ConformityAlerts(QueryConformityAlertsRequest) returns (QueryConformityAlertsResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/diversity/conformity_alerts";
  }
  rpc MetabolismStatus(QueryMetabolismStatusRequest) returns (QueryMetabolismStatusResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/metabolism/status";
  }

  // DomainCapacity queries carrying capacity and pressure for a domain.
  rpc DomainCapacity(QueryDomainCapacityRequest) returns (QueryDomainCapacityResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/domains/{domain}/capacity";
  }

  // EpistemicTemperature queries a domain's epistemic temperature state (R29-2).
  rpc EpistemicTemperature(QueryEpistemicTemperatureRequest) returns (QueryEpistemicTemperatureResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/epistemic_temperature/{domain}";
  }

  // RoleElasticity queries domain role elasticity and track record (R29-3).
  rpc RoleElasticity(QueryRoleElasticityRequest) returns (QueryRoleElasticityResponse) {
    option (google.api.http).get = "/zerone/knowledge/v1/role_elasticity/{domain}";
  }
}

// ─── Request / Response messages ─────────────────────────────────────────────

message QueryParamsRequest {}

message QueryParamsResponse {
  Params params = 1;
}

message QueryFactRequest {
  string id         = 1;
  bool track_query  = 2;  // Increment query counter (agents set this)
  string querier    = 3;  // Address of the querier (required if track_query=true, for receipt)
}

message QueryFactResponse {
  Fact fact = 1;
}

message QueryFactsRequest {
  string   domain     = 1;
  string   status     = 2;
  string   category   = 3;
  cosmos.base.query.v1beta1.PageRequest pagination = 4;
  ClaimType claim_type = 5; // Optional filter by claim type
}

message QueryFactsResponse {
  repeated Fact facts = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryFactsByDomainRequest {
  string domain = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryFactsByDomainResponse {
  repeated Fact facts = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryFactsBySubmitterRequest {
  string submitter = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryFactsBySubmitterResponse {
  repeated Fact facts = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryClaimRequest {
  string id = 1;
}

message QueryClaimResponse {
  Claim claim = 1;
}

message QueryPendingClaimsRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryPendingClaimsResponse {
  repeated Claim claims = 1;
