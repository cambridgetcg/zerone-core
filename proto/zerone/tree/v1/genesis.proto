syntax = "proto3";
package zerone.tree.v1;
option go_package = "github.com/zerone-chain/zerone/x/tree/types";

import "zerone/tree/v1/types.proto";

message GenesisState {
  Params params = 1;
  repeated ProductProject projects = 2;
  repeated ProjectTask tasks = 3;
  repeated ServiceLeaf services = 4;
  repeated OpportunitySeed seeds = 5;
}

message Params {
  string min_budget = 1;
  uint32 max_tasks_per_project = 2;
  uint32 max_contributors = 3;
  uint32 max_applications = 4;
  uint64 task_deadline_min_blocks = 5;
  uint64 task_deadline_max_blocks = 6;
  uint32 max_rejections = 7;
  uint64 seed_expiry_blocks = 8;
  uint32 min_contributors_to_start = 9;
  uint32 contributors_bp = 10;
  uint32 protocol_treasury_bp = 11;
  uint32 research_fund_bp = 12;
  uint32 burn_bp = 13;
  uint32 evidence_tax_bp = 14;
}
