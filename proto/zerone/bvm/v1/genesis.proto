syntax = "proto3";
package zerone.bvm.v1;
option go_package = "github.com/zerone-chain/zerone/x/bvm/types";

import "zerone/bvm/v1/types.proto";

message GenesisState {
  Params params = 1;
  repeated DeployedContract contracts = 2;
  repeated ContractCode codes = 3;
  repeated ContractSchedule schedules = 4;
  repeated ContractStateEntry state = 5;
}

message Params {
  uint64 max_bytecode_size         = 1;
  uint64 max_gas_per_call          = 2;
  uint64 max_gas_per_block         = 3;
  uint64 max_contracts_per_creator = 4;
  uint64 max_state_entries         = 5;
  string deploy_cost               = 6;
  uint64 max_schedule_gas          = 7;
  uint64 schedule_horizon_blocks   = 8;
  uint32 current_bvm_version       = 9;
  uint64 max_schedules_per_contract = 10;
}
