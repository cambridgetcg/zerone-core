syntax = "proto3";
package zerone.qualification.v1;
option go_package = "github.com/zerone-chain/zerone/x/qualification/types";

import "zerone/qualification/v1/types.proto";

message GenesisState {
  Params params = 1;
  repeated DomainQualification qualifications = 2;
  repeated QualificationEndorsement endorsements = 3;
  uint64 next_endorsement_id = 4;
}

message Params {
  // Stake pathway
  string min_stake_amount = 1;          // uzrn minimum for stake pathway
  uint64 stake_lock_period = 2;         // blocks to lock stake

  // Track record pathway
  uint64 min_verifications = 3;         // minimum verifications for track record
  uint64 min_accuracy_bps = 4;          // minimum accuracy (1M scale)
  uint64 min_reputation_score = 5;      // minimum domain reputation (from CaptureDefense)

  // Qualification settings
  uint64 qualification_period = 6;      // blocks before qualification expires
  uint64 probation_period = 7;          // blocks for probationary period
  uint64 renewal_window = 8;            // blocks before expiry where renewal allowed
  uint32 max_endorsements = 9;          // max endorsements per qualification

  // Cross-reference
  uint64 cross_ref_min_weight = 10;     // minimum weight in source domain
  uint64 cross_ref_weight_discount_bps = 11; // discount applied to inherited weight (1M scale)

  // Inheritance
  uint64 inheritance_weight_discount_bps = 12; // discount for stratum inheritance (1M scale)

  // Endorsement diversity guard (L3). Maximum allowed fraction of shared
  // domain qualifications between endorser and endorsee, measured as
  // shared / min(|endorser_domains|, |endorsee_domains|). Prevents rings
  // where a small group of heavily-overlapped validators repeatedly endorses
  // each other. "0" disables the guard.
  uint64 endorsement_max_overlap_bps = 13;    // default: 600,000 (60%)

  // ─── Wave 16: accuracy-based decay ────────────────────────────────────
  // Skill is current, not historical. Once a qualification accumulates
  // enough samples (decay_min_samples), the BeginBlocker checks accuracy
  // every decay_check_interval_blocks and transitions state when it
  // crosses thresholds. ACTIVE → PROBATIONARY when accuracy slips below
  // decay_probation_bps; PROBATIONARY → SUSPENDED when below
  // decay_suspension_bps; PROBATIONARY → ACTIVE when accuracy recovers
  // above decay_recovery_bps. Without these thresholds qualification is
  // a one-time grant, not an ongoing competency assessment.
  uint64 decay_check_interval_blocks = 14; // default: 10,000 — how often the decay scan runs
  uint64 decay_min_samples           = 15; // default: 20 — minimum verifications before decay applies
  uint64 decay_probation_bps         = 16; // default: 600,000 (60%) — ACTIVE → PROBATIONARY
  uint64 decay_suspension_bps        = 17; // default: 400,000 (40%) — PROBATIONARY → SUSPENDED
  uint64 decay_recovery_bps          = 18; // default: 750,000 (75%) — PROBATIONARY → ACTIVE
}
