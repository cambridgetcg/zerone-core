syntax = "proto3";
package zerone.discovery.v1;
option go_package = "github.com/zerone-chain/zerone/x/discovery/types";

import "zerone/discovery/v1/types.proto";

message Params {
  string min_registration_stake     = 1;
  uint32 max_capabilities_per_agent = 2;
  uint64 profile_expiry_blocks      = 3;
}

message GenesisState {
  Params params                   = 1;
  repeated AgentProfile profiles  = 2;
}
