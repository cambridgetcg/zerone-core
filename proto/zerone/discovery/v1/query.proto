syntax = "proto3";
package zerone.discovery.v1;
option go_package = "github.com/zerone-chain/zerone/x/discovery/types";

import "google/api/annotations.proto";
import "zerone/discovery/v1/types.proto";
import "zerone/discovery/v1/genesis.proto";

service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/discovery/v1/params";
  }
  rpc Profile(QueryProfileRequest) returns (QueryProfileResponse) {
    option (google.api.http).get = "/zerone/discovery/v1/profiles/{address}";
  }
  rpc Search(QuerySearchRequest) returns (QuerySearchResponse) {
    option (google.api.http).get = "/zerone/discovery/v1/search";
  }
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}

message QueryProfileRequest {
  string address = 1;
}
message QueryProfileResponse {
  AgentProfile profile = 1;
}

message QuerySearchRequest {
  string domain = 1;
  string capability_type = 2;
  uint64 min_reputation = 3;
}
message QuerySearchResponse {
  repeated AgentProfile profiles = 1;
}
