syntax = "proto3";
package zerone.partnerships.v1;
option go_package = "github.com/zerone-chain/zerone/x/partnerships/types";

message ExitState {
  string initiated_by = 1;
  uint64 initiated_at = 2;
  uint64 cooldown_end = 3;
}

message Partnership {
  string id              = 1;
  string human_addr      = 2;
  string agent_addr      = 3;
  string status          = 4;
  uint32 tier            = 5;
  uint32 lock_tier       = 6;
  uint64 lock_expires_at = 7;
  uint64 split_human_bps = 8;
  uint64 split_agent_bps = 9;
  string common_pot_balance = 10;
  string total_earned    = 11;
  uint64 cooperation_score = 12;
  uint64 formed_at_block = 13;
  ExitState exit_state   = 14;
}

message DeliberationState {
  string amount_tier         = 1;
  uint64 floor_ends_at       = 2;
  uint64 window_ends_at      = 3;
  string rationale           = 4;
  string counter_proposal_of = 5;
  uint32 chain_depth         = 6;
}

message ConsensusOperation {
  string id              = 1;
  string partnership_id  = 2;
  string op_type         = 3;
  string proposed_by     = 4;
  string amount          = 5;
  string status          = 6;
  DeliberationState deliberation = 7;
  uint64 created_at      = 8;
}

message SafetyFreeze {
  string partnership_id           = 1;
  string frozen_by                = 2;
  uint64 frozen_at                = 3;
  uint64 expires_at               = 4;
  uint32 freeze_count_this_epoch  = 5;
}

message CoercionSignal {
  string signal_id      = 1;
  string partnership_id = 2;
  string raised_by      = 3;
  uint64 raised_at      = 4;
  uint64 expires_at     = 5;
  bool   resolved       = 6;
}

message RejectionCooldown {
  string partnership_id    = 1;
  uint32 rejection_count   = 2;
  uint64 cooldown_ends_at  = 3;
}

message SeedPartnership {
  string id                  = 1;
  string human_addr          = 2;
  string agent_addr          = 3;
  uint64 created_at          = 4;
  uint64 expires_at          = 5;
  string human_contribution  = 6;
  string agent_contribution  = 7;
  string status              = 8;
  string common_pot_balance  = 9;
  string common_pot_cap      = 10;
}

message PoolEntry {
  string address        = 1;
  repeated string domains = 2;
  string preferred_role = 3;
  string stake_min      = 4;
  string stake_max      = 5;
  uint64 registered_at  = 6;
  string deposit        = 7;
  uint64 expires_at     = 8;
  string status         = 9;
  string matched_with   = 10;
}

message MentorshipConfig {
  string sponsor_addr          = 1;
  string mentee_addr           = 2;
  string partnership_id        = 3;
  string sponsor_contribution  = 4;
  string mentee_contribution   = 5;
  uint64 sponsor_split_bps     = 6;
  uint64 mentee_split_bps      = 7;
  uint64 graduation_block      = 8;
  bool   graduated             = 9;
  uint64 sponsor_verifications = 10;
}
