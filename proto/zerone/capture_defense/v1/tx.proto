syntax = "proto3";
package zerone.capture_defense.v1;

option go_package = "github.com/zerone-chain/zerone/x/capture_defense/types";

import "cosmos/msg/v1/msg.proto";

// Msg defines the capture_defense module transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc RecordVerification(MsgRecordVerification) returns (MsgRecordVerificationResponse);
  rpc AnalyzeDomain(MsgAnalyzeDomain) returns (MsgAnalyzeDomainResponse);
}

message MsgRecordVerification {
  option (cosmos.msg.v1.signer) = "authority";
  string authority   = 1;
  string domain      = 2;
  string round_id    = 3;
  repeated string validators    = 4;
  repeated bool   verdicts      = 5;
  repeated uint64 submit_blocks = 6;
}

message MsgRecordVerificationResponse {}

message MsgAnalyzeDomain {
  option (cosmos.msg.v1.signer) = "sender";
  string sender = 1;
  string domain = 2;
}

message MsgAnalyzeDomainResponse {
  uint64 risk_score = 1;
  bool   flagged    = 2;
}
