syntax = "proto3";
package zerone.compute_pool.v1;
option go_package = "github.com/zerone-chain/zerone/x/compute_pool/types";

import "zerone/compute_pool/v1/types.proto";

message Params {
  uint64 compute_pool_share_bps         = 1;
  uint64 base_cu_per_verification       = 2;
  string min_provider_stake             = 3;
  uint64 min_uptime_bps                 = 4;
  uint64 heartbeat_interval_blocks      = 5;
  string max_price_per_cu               = 6;
  uint64 provider_unbonding_blocks      = 7;
  uint64 price_change_delay_blocks      = 8;
  uint64 max_latency_ms                 = 9;
  uint64 sla_window_blocks              = 10;
  uint64 target_utilization_low_bps     = 11;
  uint64 target_utilization_high_bps    = 12;
}

message GenesisState {
  Params params                       = 1;
  repeated ComputeProvider providers  = 2;
  repeated ComputeCredit credits      = 3;
}
