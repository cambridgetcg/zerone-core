syntax = "proto3";
package zerone.compute_pool.v1;
option go_package = "github.com/zerone-chain/zerone/x/compute_pool/types";

import "zerone/compute_pool/v1/genesis.proto";

service Msg {
  rpc RegisterProvider(MsgRegisterProvider) returns (MsgRegisterProviderResponse);
  rpc UnregisterProvider(MsgUnregisterProvider) returns (MsgUnregisterProviderResponse);
  rpc Heartbeat(MsgHeartbeat) returns (MsgHeartbeatResponse);
  rpc UpdatePrice(MsgUpdatePrice) returns (MsgUpdatePriceResponse);
  rpc RedeemCredits(MsgRedeemCredits) returns (MsgRedeemCreditsResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgRegisterProvider {
  string sender       = 1;
  string service_type = 2;
  string endpoint     = 3;
  string price_per_cu = 4;
  string stake        = 5;
}
message MsgRegisterProviderResponse {}

message MsgUnregisterProvider {
  string sender = 1;
}
message MsgUnregisterProviderResponse {}

message MsgHeartbeat {
  string sender = 1;
}
message MsgHeartbeatResponse {}

message MsgUpdatePrice {
  string sender       = 1;
  string new_price    = 2;
}
message MsgUpdatePriceResponse {}

message MsgRedeemCredits {
  string sender = 1;
  uint64 amount = 2;
}
message MsgRedeemCreditsResponse {
  string redeemed_uzrn = 1;
}

message MsgUpdateParams {
  string authority = 1;
  Params params    = 2;
}
message MsgUpdateParamsResponse {}
