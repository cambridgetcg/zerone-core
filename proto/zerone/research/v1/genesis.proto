syntax = "proto3";
package zerone.research.v1;

option go_package = "github.com/zerone-chain/zerone/x/research/types";

import "zerone/research/v1/state.proto";

// GenesisState defines the research module's genesis state.
message GenesisState {
  Params              params           = 1;
  repeated Research   researches       = 2;
  repeated Bounty     bounties         = 3;
  repeated PeerReview peer_reviews     = 4;
  TreasuryBalance     treasury_balance = 5;
}

// Params defines the research module parameters.
message Params {
  string min_research_stake          = 1; // minimum stake for research submission (bigint as string)
  string min_challenge_stake         = 2; // minimum stake for challenge (bigint as string)
  uint64 review_period_blocks        = 3; // blocks for review period
  uint32 min_reviewer_count          = 4; // minimum reviewers required
  uint32 acceptance_score_threshold  = 5; // score threshold for acceptance (0-100)
  uint64 rejection_slash_bps         = 6; // slash rate on rejection (basis points)
  string max_bounty_reward           = 7; // maximum bounty reward (bigint as string)
  uint64 bounty_min_deadline_blocks  = 8; // minimum bounty deadline in blocks
  uint64 bounty_fulfillment_period_blocks = 9; // blocks after claim before auto-fulfillment
}
