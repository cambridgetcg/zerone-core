syntax = "proto3";
package zerone.research.v1;

option go_package = "github.com/zerone-chain/zerone/x/research/types";

import "google/api/annotations.proto";
import "zerone/research/v1/state.proto";
import "zerone/research/v1/genesis.proto";

service Query {
  rpc Research(QueryResearchRequest) returns (QueryResearchResponse) {
    option (google.api.http).get = "/zerone/research/v1/research/{research_id}";
  }
  rpc Submissions(QuerySubmissionsRequest) returns (QuerySubmissionsResponse) {
    option (google.api.http).get = "/zerone/research/v1/submissions";
  }
  rpc Bounty(QueryBountyRequest) returns (QueryBountyResponse) {
    option (google.api.http).get = "/zerone/research/v1/bounty/{bounty_id}";
  }
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/research/v1/params";
  }
}

message QueryResearchRequest {
  string research_id = 1;
}
message QueryResearchResponse {
  Research              research = 1;
  repeated PeerReview   reviews  = 2;
}

message QuerySubmissionsRequest {
  string status = 1;
  string domain = 2;
}
message QuerySubmissionsResponse {
  repeated Research submissions = 1;
}

message QueryBountyRequest {
  string bounty_id = 1;
}
message QueryBountyResponse {
  Bounty bounty = 1;
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params          params           = 1;
  TreasuryBalance treasury_balance = 2;
}
