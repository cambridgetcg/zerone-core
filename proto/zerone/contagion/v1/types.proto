syntax = "proto3";
package zerone.contagion.v1;

option go_package = "github.com/zerone-chain/zerone/x/contagion/types";

// ─────────────────────────────────────────────────────────────────────────────
// ZO Contagion Module — on-chain "love sneeze" tracker.
//
// This module is a STANDALONE contagion tracker that the tokens module calls
// *after* a ZRN-20 transfer. It does NOT reimplement token transfer. It owns:
//   1. the `already_infected` mapping  (address -> bool, permanent, one-way)
//   2. the `reserve_remaining` counter (finite, only goes down)
//   3. the reward formula (immutable once configured)
//
// See CONTAGION-MATH.md for the mechanic and DESIGN.md (in x/contagion/) for how
// this module answers the open questions the ZO docs leave to the chain.
// ─────────────────────────────────────────────────────────────────────────────

// ContagionState is the singleton on-chain configuration + live counter for ZO.
//
// Design note — answering PARAMETERS.md "no function the team can call to change
// the sneeze reward, reserve size, or what counts as infected":
//   * `reward_sender`, `reward_receiver`, `reserve_initial` are set EXACTLY ONCE
//     via MsgSetContagion (genesis or a single governance tx at deploy).
//   * There is deliberately NO MsgUpdateContagion. `authority` may only set state
//     while `configured == false`. After the first SetContagion, `configured`
//     flips to true and `authority` is cleared — the on-chain equivalent of
//     "full contract renounce" from PARAMETERS.md. The formula is then immutable.
//   * `reserve_remaining` is mutated only by Sneeze(), monotonically decreasing.
message ContagionState {
  // ZRN-20 token id of ZO (references x/tokens TokenDefinition.id). Not owned
  // here — this module only reads/credits ZO balances via the tokens keeper.
  string token_id        = 1;
  // Initial contagion reserve in BASE units (60,433,333 * 10^decimals).
  string reserve_initial = 2;
  // Live remaining reserve in BASE units. Decreases by 2*reward per sneeze.
  string reserve_remaining = 3;
  // Per-sneeze reward to the spreader (sender) in BASE units (77 * 10^decimals).
  string reward_sender    = 4;
  // Per-sneeze reward to the patient (receiver) in BASE units (77 * 10^decimals).
  string reward_receiver  = 5;
  // Decimals of the underlying ZO token, cached for off-chain display math.
  uint32 decimals         = 6;
  // False until MsgSetContagion has run. Once true, config is frozen.
  bool   configured       = 7;
  // Governance authority that may call MsgSetContagion. Cleared after first set
  // to model the PARAMETERS.md "contract renounced / owner() returns 0x0" rule.
  string authority        = 8;
  // Cumulative count of sneezes that have fired (cosmetic / indexer aid).
  uint64 sneeze_count     = 9;
}

// SneezeEvent is the structured payload emitted on every reward. It mirrors the
// `Sneeze(spreader, patient, total)` event from CONTAGION-MATH.md so off-chain
// indexers (leaderboard, outbreak map, Twitter bot) can consume it verbatim.
//
// This is ALSO emitted as a Cosmos sdk.Event with type "zerone.contagion.sneeze"
// carrying the same fields as attributes, so it shows up in tx event logs without
// requiring clients to parse proto.
message SneezeEvent {
  string spreader               = 1; // the sender who triggered the sneeze
  string patient                = 2; // the newly-infected receiver
  string reward_sender_amount   = 3; // base units credited to spreader
  string reward_receiver_amount = 4; // base units credited to patient
  string reserve_remaining      = 5; // reserve AFTER this sneeze (base units)
  uint64 block_height           = 6; // block the sneeze fired in
  string token_id               = 7; // ZO token id (for multi-token safety)
  uint64 sneeze_index           = 8; // 1-based index of this sneeze (Patient Zero = 1)
}

// InfectionRecord is the per-address permanent flag. Stored under InfectedKey.
// `first_block` lets indexers build a timeline / "Patient Zero" leaderboard.
// Once written it is NEVER deleted or flipped back — "once infected, always
// infected" (CONTAGION-MATH.md). There is no UnsetInfected keeper method.
message InfectionRecord {
  string address      = 1;
  uint64 first_block  = 2; // block of the first ZO receipt (the infecting transfer)
  string infector     = 3; // address that triggered the sneeze (empty if genesis-seeded)
}