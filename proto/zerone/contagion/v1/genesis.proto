syntax = "proto3";
package zerone.contagion.v1;

option go_package = "github.com/zerone-chain/zerone/x/contagion/types";

import "zerone/contagion/v1/types.proto";

// GenesisState defines the contagion module's genesis state.
//
// At a ZO mainnet genesis the reserve is pre-funded to the contagion module
// account (via the bank module's genesis) and `state` is set with
// configured=true, authority="" (already renounced). `infected_addresses` can
// seed the infection set (e.g. team wallet, airdrop recipients) so they never
// re-trigger a sneeze on their first post-genesis transfer.
message GenesisState {
  // Singleton contagion state. If nil, the module starts unconfigured and must
  // be initialised via MsgSetContagion before any sneeze can fire.
  ContagionState state = 1;
  // Addresses to mark infected at genesis (one-way; never cleared).
  repeated InfectionRecord infected_addresses = 2;
}

// Params is reserved for future module-level knobs. Currently empty so the
// configuration lives entirely in ContagionState (which is deliberately not a
// Params message, to keep it outside the mutable-governance surface).
message Params {}