syntax = "proto3";
package zerone.contagion.v1;

option go_package = "github.com/zerone-chain/zerone/x/contagion/types";

import "google/api/annotations.proto";
import "zerone/contagion/v1/types.proto";
import "zerone/contagion/v1/genesis.proto";

// Query defines the gRPC query service for the contagion module.
service Query {
  // ContagionState returns the singleton on-chain contagion configuration +
  // live reserve counter. Lets anyone verify the reserve size and that the
  // formula is frozen (configured == true, authority == "").
  rpc ContagionState(QueryContagionStateRequest) returns (QueryContagionStateResponse) {
    option (google.api.http).get = "/zerone/contagion/v1/state";
  }

  // IsInfected reports whether an address has ever received ZO (the permanent
  // one-way flag from CONTAGION-MATH.md), plus the block of first infection.
  rpc IsInfected(QueryIsInfectedRequest) returns (QueryIsInfectedResponse) {
    option (google.api.http).get = "/zerone/contagion/v1/infected/{address}";
  }
}

message QueryContagionStateRequest {}

message QueryContagionStateResponse {
  ContagionState state = 1;
}

message QueryIsInfectedRequest {
  string address = 1;
}

message QueryIsInfectedResponse {
  bool   infected    = 1; // true once the address has ever received ZO
  uint64 first_block = 2; // block of first infection (0 if never infected)
  string infector    = 3; // address that triggered the sneeze ("" if genesis-seeded)
}