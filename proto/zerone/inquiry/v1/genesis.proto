syntax = "proto3";
package zerone.inquiry.v1;
option go_package = "github.com/zerone-chain/zerone/x/inquiry/types";

import "zerone/inquiry/v1/types.proto";

message GenesisState {
  Params params = 1;
  repeated Inquiry inquiries = 2;
  repeated Answer answers = 3;
  uint64 next_inquiry_seq = 4;
  uint64 next_answer_id = 5;
}

message Params {
  // Minimum bounty (uzrn) required when submitting an inquiry. Below
  // this, the inquiry is rejected — prevents zero-bounty spam.
  // Default: 1 ZRN.
  string min_bounty = 1;

  // Maximum length of question text. Default: 4096.
  uint32 max_question_bytes = 2;

  // Maximum length of context text. Default: 8192.
  uint32 max_context_bytes = 3;

  // Default expiry window in blocks. If asker doesn't specify an
  // expiry, this is added to the submission block. Default: 100,000
  // blocks (~3 days at 2.5s blocks). Configurable per-inquiry up
  // to max_expiry_blocks.
  uint64 default_expiry_blocks = 4;

  // Maximum allowed expiry window in blocks. Prevents bounties from
  // being locked indefinitely. Default: 1,000,000 (~30 days).
  uint64 max_expiry_blocks = 5;

  // Maximum number of answers that can be linked to a single
  // inquiry. Bounds the BeginBlocker's resolution-check work and
  // prevents griefing by spamming worthless answers. Default: 32.
  uint32 max_answers_per_inquiry = 6;

  // Per-block cap on the number of inquiries the auto-resolver
  // BeginBlocker scans. Bounds work; older inquiries are still
  // resolvable manually via MsgResolveInquiry. Default: 100.
  uint32 begin_blocker_scan_limit = 7;

  // Whether new inquiry submissions are accepted. Governance can
  // pause without affecting open inquiries. Default: true.
  bool submissions_enabled = 8;

  // ── Commitment 18: chain-manufactured exploration demand ──────────
  //
  // These params govern the BeginBlocker path that surveys the chain's
  // frontier (where the corpus is sparse) and SPONSORS open inquiries
  // there at chain expense. They are the dual of the probe-invitation
  // params in x/knowledge: commitment 5 funds stress-testing what is
  // known; commitment 18 funds exploration of what is not.
  //
  // Setting frontier_invitation_cadence_blocks to 0 disables the
  // path entirely without affecting the rest of x/inquiry — governance
  // can pause exploration sponsorship while keeping user-asked
  // inquiries running.

  // Cadence in blocks. The frontier-sponsorship scan runs once every
  // this-many blocks (specifically: when block_height %
  // cadence == 0). Default: 600 blocks (~25 min at 2.5s blocks). 0
  // disables.
  uint64 frontier_invitation_cadence_blocks = 9;

  // Maximum number of system-sponsored inquiries the BeginBlocker
  // creates per cadence-tick, taken from the top of the frontier in
  // sparsity order. Bounds per-block work AND the chain's per-tick
  // exploration spend. Default: 3.
  uint32 frontier_invitation_top_k = 10;

  // Minimum sparsity_score_bps a domain must reach before it qualifies
  // for chain sponsorship. Filters out domains the chain has already
  // mapped. Default: 700_000 (top tercile of the 0..1M score).
  uint64 frontier_invitation_sparsity_threshold_bps = 11;

  // Per-inquiry chain-sponsored bounty in uzrn (string-encoded big
  // integer, same shape as min_bounty). Minted from the
  // inquiry-frontier-bounty-pool when the system inquiry is created.
  // Default: 5 ZRN ("5000000") — five times min_bounty so frontier
  // questions attract attention without distorting the wider bounty
  // market.
  string frontier_invitation_bounty = 12;

  // Default expiry window (in blocks) for system-sponsored inquiries.
  // Distinct from default_expiry_blocks so chain-asked questions can
  // sit longer than user-asked ones — the corpus does not need to
  // give up on a sparse domain after 3 days. Default: 600_000 blocks
  // (~17 days). Bounded by max_expiry_blocks.
  uint64 frontier_invitation_expiry_blocks = 13;
}
