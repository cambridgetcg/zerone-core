syntax = "proto3";
package zerone.inquiry.v1;
option go_package = "github.com/zerone-chain/zerone/x/inquiry/types";

// Inquiry is a public, bountied open question. The chain's mechanism
// for paying agents to fill UNMAPPED territory — territory the corpus
// does not yet contain a fact about. Different from probe-bounty
// (commitment 5), which stress-tests EXISTING facts. This is the
// dual: pay for facts that don't yet exist.
//
// See docs/TRUTH_SEEKING.md commitment 16.
message Inquiry {
  // Chain-assigned monotonic id. Format: "inq-<n>".
  string id = 1;

  // Bech32 address of the asker. The asker escrows the bounty.
  string asker = 2;

  // The question text. Free-form but bounded by params.max_question_bytes.
  string question = 3;

  // Domain the inquiry sits in. Must match an existing ontology
  // domain. Used by frontier queries to map sparse territory.
  string domain = 4;

  // Optional context, hints, or constraints on what counts as an
  // answer. Bounded by params.max_context_bytes.
  string context = 5;

  // uzrn bounty escrowed in the inquiry-bounty-pool module account.
  // Paid to the first answerer whose linked claim resolves to an
  // accepted fact; returned to asker on expiry or cancellation.
  string bounty = 6;

  // Block when the inquiry was submitted.
  uint64 submitted_at_block = 7;

  // Block at which the inquiry expires. Past this point, if no
  // answer has been accepted, the bounty is returned to the asker.
  uint64 expires_at_block = 8;

  // Lifecycle state.
  InquiryStatus status = 9;

  // The fact_id of the accepted answer that won the bounty. Set
  // when status flips to RESOLVED. Empty otherwise.
  string winning_fact_id = 10;

  // Bech32 of the winning answerer.
  string winner = 11;

  // Block the inquiry resolved. 0 while still OPEN/ANSWERED.
  uint64 resolved_at_block = 12;

  // True iff this inquiry was created by the chain itself rather than
  // by a user-asker. System-initiated inquiries are funded by mint
  // from the inquiry-frontier-bounty-pool, not by escrow from a user
  // account; their bounty is returned to that pool on expiry rather
  // than refunded to the asker; and they cannot be cancelled (the
  // chain does not withdraw its own asks).
  //
  // See docs/TRUTH_SEEKING.md commitment 18: the chain manufactures
  // exploration demand. Where commitment 5 has the chain paying to
  // stress-test what it already thinks it knows, this field marks
  // the dual: the chain paying to fill what it does not yet know.
  bool system_initiated = 13;

  // For system_initiated inquiries: a stable, machine-readable label
  // identifying which chain process sponsored the inquiry. Format:
  // "<source>:<details>", e.g. "frontier_sparsity:philosophy". Empty
  // for user-asked inquiries.
  string system_initiation_reason = 14;
}

enum InquiryStatus {
  INQUIRY_STATUS_UNSPECIFIED = 0;
  // No answers submitted yet.
  INQUIRY_STATUS_OPEN = 1;
  // At least one answer has been linked; verification in flight.
  INQUIRY_STATUS_ANSWERED = 2;
  // An answer's verification produced an accepted fact; bounty paid.
  INQUIRY_STATUS_RESOLVED = 3;
  // Expired with no accepted answer; bounty returned to asker.
  INQUIRY_STATUS_EXPIRED = 4;
  // Asker cancelled before any answer was submitted; bounty
  // returned to asker.
  INQUIRY_STATUS_CANCELLED = 5;
}

// Answer links a knowledge Claim to an Inquiry. When the linked
// claim's verification accepts (becomes a fact), the inquiry resolves
// and pays the bounty to the answerer.
message Answer {
  uint64 id = 1;
  string inquiry_id = 2;
  string answerer = 3;     // bech32, must equal claim.submitter
  string claim_id = 4;     // x/knowledge claim id
  uint64 submitted_at_block = 5;
  AnswerStatus status = 6;
  // Set when this answer's claim becomes the winning fact for the
  // inquiry. Empty otherwise.
  string fact_id = 7;
}

enum AnswerStatus {
  ANSWER_STATUS_UNSPECIFIED = 0;
  // Linked, claim still in verification.
  ANSWER_STATUS_PENDING = 1;
  // Claim accepted, this answer won the bounty.
  ANSWER_STATUS_WON = 2;
  // Claim accepted but a different answer won first; this fact
  // still entered the corpus.
  ANSWER_STATUS_LATE = 3;
  // Linked claim was rejected or never resolved.
  ANSWER_STATUS_REJECTED = 4;
}
