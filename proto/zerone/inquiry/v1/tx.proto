syntax = "proto3";
package zerone.inquiry.v1;
option go_package = "github.com/zerone-chain/zerone/x/inquiry/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/inquiry/v1/types.proto";
import "zerone/inquiry/v1/genesis.proto";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc SubmitInquiry(MsgSubmitInquiry) returns (MsgSubmitInquiryResponse);
  rpc SubmitAnswer(MsgSubmitAnswer) returns (MsgSubmitAnswerResponse);
  rpc ResolveInquiry(MsgResolveInquiry) returns (MsgResolveInquiryResponse);
  rpc CancelInquiry(MsgCancelInquiry) returns (MsgCancelInquiryResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgSubmitInquiry {
  option (cosmos.msg.v1.signer) = "asker";
  string asker = 1;
  string question = 2;
  string domain = 3;
  string context = 4;
  string bounty = 5;          // uzrn
  uint64 expiry_blocks = 6;   // 0 = use params.default_expiry_blocks
}
message MsgSubmitInquiryResponse {
  string inquiry_id = 1;
  uint64 expires_at_block = 2;
}

message MsgSubmitAnswer {
  option (cosmos.msg.v1.signer) = "answerer";
  string answerer = 1;
  string inquiry_id = 2;
  string claim_id = 3;        // existing knowledge claim id
}
message MsgSubmitAnswerResponse {
  uint64 answer_id = 1;
}

// MsgResolveInquiry is the manual resolver. The BeginBlocker also
// auto-resolves; this exists so anyone can poke a stale inquiry
// without waiting for the next block scan.
message MsgResolveInquiry {
  option (cosmos.msg.v1.signer) = "caller";
  string caller = 1;
  string inquiry_id = 2;
}
message MsgResolveInquiryResponse {
  InquiryStatus status = 1;
  string winning_fact_id = 2;
}

// MsgCancelInquiry returns the bounty if no answer has been linked
// yet. Once any answer is in flight, the asker cannot cancel — the
// answerer's verification work has already started.
message MsgCancelInquiry {
  option (cosmos.msg.v1.signer) = "asker";
  string asker = 1;
  string inquiry_id = 2;
}
message MsgCancelInquiryResponse {}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  Params params = 2;
}
message MsgUpdateParamsResponse {}
