syntax = "proto3";
package zerone.evidence_mgmt.v1;
option go_package = "github.com/zerone-chain/zerone/x/evidence_mgmt/types";

message Evidence {
  string id = 1;
  string submitter = 2;                        // bech32
  EvidenceType evidence_type = 3;
  string content_hash = 4;                     // SHA256 of evidence content
  string metadata = 5;                         // JSON metadata
  repeated ChainOfCustodyEntry chain_of_custody = 6;
  EvidenceStatus status = 7;
  uint64 created_at_block = 8;
  uint64 updated_at_block = 9;
}

message ChainOfCustodyEntry {
  string custodian = 1;                        // bech32
  string action = 2;                           // "submit", "transfer", "verify", "challenge"
  uint64 timestamp = 3;                        // block height
  string notes = 4;
}

message VerificationResult {
  string id = 1;
  string evidence_id = 2;
  string verifier = 3;                         // bech32
  bool outcome = 4;                            // true = verified, false = rejected
  uint32 confidence = 5;                       // 0-1000000 (1M scale)
  string method = 6;                           // verification method description
}

message Params {
  uint32 min_verifier_tier = 1;                // default: 2
  uint32 verification_quorum = 2;              // default: 3
  string challenge_bond = 3;                   // default: "500000" uzrn
  uint64 challenge_window_blocks = 4;          // default: 50000
}

enum EvidenceType {
  EVIDENCE_TYPE_UNSPECIFIED = 0;
  EVIDENCE_TYPE_DOCUMENT = 1;
  EVIDENCE_TYPE_ATTESTATION = 2;
  EVIDENCE_TYPE_MEASUREMENT = 3;
  EVIDENCE_TYPE_COMPUTATION = 4;
}

enum EvidenceStatus {
  EVIDENCE_STATUS_UNSPECIFIED = 0;
  EVIDENCE_STATUS_SUBMITTED = 1;
  EVIDENCE_STATUS_VERIFIED = 2;
  EVIDENCE_STATUS_CHALLENGED = 3;
  EVIDENCE_STATUS_REJECTED = 4;
}
