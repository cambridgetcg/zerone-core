syntax = "proto3";
package zerone.evidence_mgmt.v1;
option go_package = "github.com/zerone-chain/zerone/x/evidence_mgmt/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/evidence_mgmt/v1/state.proto";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc SubmitEvidence(MsgSubmitEvidence) returns (MsgSubmitEvidenceResponse);
  rpc TransferCustody(MsgTransferCustody) returns (MsgTransferCustodyResponse);
  rpc VerifyEvidence(MsgVerifyEvidence) returns (MsgVerifyEvidenceResponse);
  rpc ChallengeEvidence(MsgChallengeEvidence) returns (MsgChallengeEvidenceResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgSubmitEvidence {
  option (cosmos.msg.v1.signer) = "submitter";
  string submitter = 1;
  EvidenceType evidence_type = 2;
  string content_hash = 3;
  string metadata = 4;
}
message MsgSubmitEvidenceResponse { string evidence_id = 1; }

message MsgTransferCustody {
  option (cosmos.msg.v1.signer) = "current_custodian";
  string current_custodian = 1;
  string evidence_id = 2;
  string new_custodian = 3;
  string notes = 4;
}
message MsgTransferCustodyResponse {}

message MsgVerifyEvidence {
  option (cosmos.msg.v1.signer) = "verifier";
  string verifier = 1;
  string evidence_id = 2;
  bool outcome = 3;
  uint32 confidence = 4;
  string method = 5;
}
message MsgVerifyEvidenceResponse {}

message MsgChallengeEvidence {
  option (cosmos.msg.v1.signer) = "challenger";
  string challenger = 1;
  string evidence_id = 2;
  string reason = 3;
  string bond = 4;
}
message MsgChallengeEvidenceResponse { string dispute_id = 1; }

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  Params params = 2;
}
message MsgUpdateParamsResponse {}
