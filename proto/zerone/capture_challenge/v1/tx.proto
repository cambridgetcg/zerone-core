syntax = "proto3";
package zerone.capture_challenge.v1;

option go_package = "github.com/zerone-chain/zerone/x/capture_challenge/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/capture_challenge/v1/types.proto";

// Msg defines the capture_challenge module transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc SubmitChallenge(MsgSubmitChallenge) returns (MsgSubmitChallengeResponse);
  rpc AddEvidence(MsgAddEvidence) returns (MsgAddEvidenceResponse);
  rpc ResolveChallenge(MsgResolveChallenge) returns (MsgResolveChallengeResponse);
  rpc FundBountyPool(MsgFundBountyPool) returns (MsgFundBountyPoolResponse);
}

message MsgSubmitChallenge {
  option (cosmos.msg.v1.signer) = "challenger";
  string challenger              = 1;
  string domain                  = 2;
  repeated string accused_validators = 3;
  string stake                   = 4; // uzrn
  string reason                  = 5;
}

message MsgSubmitChallengeResponse {
  string challenge_id = 1;
}

message MsgAddEvidence {
  option (cosmos.msg.v1.signer) = "challenger";
  string challenger   = 1;
  string challenge_id = 2;
  string description  = 3;
  string data_hash    = 4;
}

message MsgAddEvidenceResponse {}

message MsgResolveChallenge {
  option (cosmos.msg.v1.signer) = "authority";
  string           authority     = 1;
  string           challenge_id  = 2;
  ChallengeOutcome outcome       = 3;
  string           reason        = 4;
}

message MsgResolveChallengeResponse {}

message MsgFundBountyPool {
  option (cosmos.msg.v1.signer) = "sender";
  string sender = 1;
  string domain = 2;
  string amount = 3; // uzrn
}

message MsgFundBountyPoolResponse {}
