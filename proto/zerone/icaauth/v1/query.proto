syntax = "proto3";
package zerone.icaauth.v1;

option go_package = "github.com/zerone-chain/zerone/x/icaauth/types";

import "google/api/annotations.proto";
import "zerone/icaauth/v1/types.proto";
import "zerone/icaauth/v1/genesis.proto";

// Query defines the icaauth module Query service.
service Query {
  rpc Account(QueryAccountRequest) returns (QueryAccountResponse) {
    option (google.api.http).get = "/zerone/icaauth/v1/accounts/{owner}/{connection_id}";
  }
  rpc Accounts(QueryAccountsRequest) returns (QueryAccountsResponse) {
    option (google.api.http).get = "/zerone/icaauth/v1/accounts/{owner}";
  }
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/icaauth/v1/params";
  }
}

message QueryAccountRequest {
  string owner         = 1;
  string connection_id = 2;
}
message QueryAccountResponse {
  RemoteAccount account = 1;
}

message QueryAccountsRequest {
  string owner = 1;
}
message QueryAccountsResponse {
  repeated RemoteAccount accounts = 1;
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}
