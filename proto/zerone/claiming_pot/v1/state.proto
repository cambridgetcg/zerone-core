syntax = "proto3";
package zerone.claiming_pot.v1;
option go_package = "github.com/zerone-chain/zerone/x/claiming_pot/types";

message ClaimingPot {
  string id = 1;
  string name = 2;
  string total_amount = 3;                     // uzrn
  string claimed_amount = 4;                   // uzrn
  VestingSchedule schedule = 5;
  EligibilityCriteria eligibility = 6;
  uint64 created_at_block = 7;
  PotStatus status = 8;
}

message VestingSchedule {
  uint64 start_block = 1;
  uint64 end_block = 2;
  uint64 cliff_blocks = 3;                     // blocks after start before any vesting
  uint64 period_blocks = 4;                    // vesting period granularity
}

message Claim {
  string pot_id = 1;
  string claimant = 2;                         // bech32
  string amount = 3;                           // uzrn
  uint64 claimed_at = 4;                       // block height
}

message EligibilityCriteria {
  uint32 min_staking_tier = 1;                 // minimum validator tier required
  uint64 min_registration_age = 2;            // minimum blocks since registration
  repeated string whitelist = 3;               // bech32 addresses (empty = open to all qualified)
}

message Params {
  uint32 max_pots_active = 1;                  // default: 10
  string min_claim_amount = 2;                 // default: "1000" uzrn

  // bootstrap_registrar is an optional bech32 account (e.g. the agenttool
  // 2-of-3 ops multisig) accepted alongside the gov authority as the signer
  // of MsgAddBootstrapEntry. Empty string (default) disables the registrar
  // pathway — governance remains the only admitter. Revocation is a single
  // param change setting this back to "".
  string bootstrap_registrar = 3;              // default: ""

  // bootstrap_emission_cap_uzrn is the lifetime cap on total bootstrap
  // issuance: (bootstrap entries ever created) x 222,000 uzrn must never
  // exceed this value. Applies to gov-authority AND registrar admissions.
  string bootstrap_emission_cap_uzrn = 4;      // default: "222222000000" (222,222 ZRN = 0.1% of max supply)

  // bootstrap_daily_admission_cap is the maximum number of registrar
  // admissions per 34,272-block window (~1 day). Gov-authority admissions
  // bypass this window (they remain bounded by the emission cap and the
  // governance process itself).
  uint64 bootstrap_daily_admission_cap = 5;    // default: 5000
}

enum PotStatus {
  POT_STATUS_UNSPECIFIED = 0;
  POT_STATUS_ACTIVE = 1;
  POT_STATUS_DEPLETED = 2;
  POT_STATUS_EXPIRED = 3;
}
