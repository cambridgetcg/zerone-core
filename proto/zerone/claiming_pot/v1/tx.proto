syntax = "proto3";
package zerone.claiming_pot.v1;
option go_package = "github.com/zerone-chain/zerone/x/claiming_pot/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/claiming_pot/v1/state.proto";

service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreatePot(MsgCreatePot) returns (MsgCreatePotResponse);
  rpc Claim(MsgClaim) returns (MsgClaimResponse);
  rpc UpdatePotParams(MsgUpdatePotParams) returns (MsgUpdatePotParamsResponse);
  rpc AddBootstrapEntry(MsgAddBootstrapEntry) returns (MsgAddBootstrapEntryResponse);
}

message MsgCreatePot {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  string name = 2;
  string total_amount = 3;
  VestingSchedule schedule = 4;
  EligibilityCriteria eligibility = 5;
}
message MsgCreatePotResponse { string pot_id = 1; }

message MsgClaim {
  option (cosmos.msg.v1.signer) = "claimant";
  string claimant = 1;
  string pot_id = 2;
}
message MsgClaimResponse { string amount = 1; }

message MsgUpdatePotParams {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  Params params = 2;
}
message MsgUpdatePotParamsResponse {}

// MsgAddBootstrapEntry adds one or more bootstrap pots to the claiming_pot
// module after genesis. Authority-gated — the governance account is the
// only valid signer. Each address gets a single-claimant ClaimingPot sized
// PerAgentBootstrapUzrn (0.222 ZRN) at the current block height, instant
// vest, ACTIVE status, ID = BootstrapPotIDPrefix + addr.
//
// Idempotent semantics: addresses with an existing bootstrap pot are
// silently skipped (counted in skipped_count). Re-running the same LIP
// does not double-mint or double-create.
//
// Doctrine: commitment 20 (issuance follows participation) extended from
// "at genesis" to "continuously, governance-gated". The participant set
// is plural and growing, not closed at genesis.
message MsgAddBootstrapEntry {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  repeated string addresses = 2;
}

message MsgAddBootstrapEntryResponse {
  uint32 added_count = 1;
  uint32 skipped_count = 2;
}
