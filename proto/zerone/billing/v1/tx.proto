syntax = "proto3";
package zerone.billing.v1;

option go_package = "github.com/zerone-chain/zerone/x/billing/types";

import "cosmos/msg/v1/msg.proto";

import "zerone/billing/v1/types.proto";
import "zerone/billing/v1/genesis.proto";

// Msg defines the billing module transaction service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc RegisterProvider(MsgRegisterProvider) returns (MsgRegisterProviderResponse);
  rpc DeregisterProvider(MsgDeregisterProvider) returns (MsgDeregisterProviderResponse);
  rpc QueryFact(MsgQueryFact) returns (MsgQueryFactResponse);
  rpc BatchQueryFacts(MsgBatchQueryFacts) returns (MsgBatchQueryFactsResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
}

message MsgRegisterProvider {
  option (cosmos.msg.v1.signer) = "sender";

  string sender            = 1;
  string name              = 2;
  repeated string domains  = 3;
  string stake             = 4;  // uzrn bigint string
}
message MsgRegisterProviderResponse {}

message MsgDeregisterProvider {
  option (cosmos.msg.v1.signer) = "sender";

  string sender = 1;
}
message MsgDeregisterProviderResponse {}

message MsgQueryFact {
  option (cosmos.msg.v1.signer) = "sender";

  string sender   = 1;
  string provider = 2;
  string fact_id  = 3;
}
message MsgQueryFactResponse {
  QueryQuote quote = 1;
}

message MsgBatchQueryFacts {
  option (cosmos.msg.v1.signer) = "sender";

  string sender            = 1;
  string provider          = 2;
  repeated string fact_ids = 3;
}
message MsgBatchQueryFactsResponse {
  repeated QueryQuote quotes = 1;
  string total_price         = 2;  // uzrn bigint string
}

message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";

  string authority = 1;
  Params params    = 2;
}
message MsgUpdateParamsResponse {}
