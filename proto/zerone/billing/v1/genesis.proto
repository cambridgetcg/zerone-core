syntax = "proto3";
package zerone.billing.v1;

option go_package = "github.com/zerone-chain/zerone/x/billing/types";

import "zerone/billing/v1/types.proto";
import "zerone/common/v1/common.proto";

// Params defines the billing module parameters.
message Params {
  string base_query_price        = 1;  // base cost per fact in uzrn (bigint string)
  uint64 confidence_weight_bps   = 2;  // confidence premium/discount in 1M bps
  uint64 novelty_weight_bps      = 3;  // novelty discount scale (informational)
  uint64 freshness_weight_bps    = 4;  // freshness premium in 1M bps
  zerone.common.v1.RevenueSplit revenue_split = 5;  // governance-adjustable split
  DynamicPricingConfig dynamic_pricing = 6;         // 3-tier oracle config
  string min_provider_stake      = 7;  // minimum stake to register as provider (uzrn bigint string)
  uint64 confidence_threshold    = 8;  // below this = surcharge (1M bps scale)
  uint64 freshness_window_blocks = 9;  // blocks within which facts are "fresh"
  uint64 quote_validity_blocks   = 10; // blocks a quote remains valid
}

// GenesisState defines the billing module genesis state.
message GenesisState {
  Params params                  = 1;
  repeated Provider providers    = 2;
}
