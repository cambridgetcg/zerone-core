syntax = "proto3";
package zerone.billing.v1;

option go_package = "github.com/zerone-chain/zerone/x/billing/types";

// Provider represents a registered knowledge API provider.
message Provider {
  string address           = 1;
  string name              = 2;
  bool   active            = 3;  // status: true = active, false = inactive
  uint64 registered_at     = 4;  // block height at registration
  string total_revenue     = 5;  // cumulative uzrn earned (bigint string)
  uint64 total_queries     = 6;  // cumulative queries served
  repeated string domains  = 7;  // knowledge domains served
  string stake_amount      = 8;  // staked uzrn (bigint string)
}

// QueryQuote is the price quote returned for a single fact query.
message QueryQuote {
  string fact_id                    = 1;
  string base_price                 = 2;  // uzrn bigint string
  uint64 confidence_multiplier_bps  = 3;  // 1M scale
  uint64 novelty_multiplier_bps     = 4;  // 1M scale
  uint64 freshness_multiplier_bps   = 5;  // 1M scale
  string effective_price            = 6;  // final uzrn bigint string
}

// DynamicPricingConfig stores parameters for the 3-tier ZRN/USD oracle.
message DynamicPricingConfig {
  bool   enabled              = 1;
  string target_query_cost_usd = 2;  // 6-dec USD ("10000" = $0.01)
  string manual_zrn_price_usd = 3;   // gov override ("0" = disabled)
  uint64 twap_window_blocks   = 4;
  uint64 staleness_blocks     = 5;
  string min_cost_per_fact    = 6;   // floor uzrn
  string max_cost_per_fact    = 7;   // ceiling uzrn
}

// FactPriceBreakdown shows per-fact pricing components.
message FactPriceBreakdown {
  string fact_id             = 1;
  string base_cost           = 2;  // uzrn bigint string
  string confidence_premium  = 3;  // signed bigint string
  string novelty_bonus       = 4;  // signed bigint string (negative = discount)
  string freshness_discount  = 5;  // signed bigint string (negative = premium)
  string total_price         = 6;  // uzrn bigint string
}

// PaymentDistribution shows how a payment is split.
message PaymentDistribution {
  string total_payment                       = 1;
  string provider_share                      = 2;
  string research_share                      = 3;
  repeated KnowledgePoolEntry knowledge_pool = 4;
  string protocol_burn                       = 5;
  string protocol_treasury                   = 6;
}

// KnowledgePoolEntry is a weighted citation reward for a fact submitter.
message KnowledgePoolEntry {
  string fact_id   = 1;
  string submitter = 2;
  string amount    = 3;  // uzrn bigint string
  string weight    = 4;  // bigint string
}
