syntax = "proto3";
package zerone.billing.v1;

option go_package = "github.com/zerone-chain/zerone/x/billing/types";

import "google/api/annotations.proto";
import "zerone/billing/v1/types.proto";
import "zerone/billing/v1/genesis.proto";

// Query defines the billing module query service.
service Query {
  rpc Provider(QueryProviderRequest) returns (QueryProviderResponse) {
    option (google.api.http).get = "/zerone/billing/v1/providers/{address}";
  }
  rpc Providers(QueryProvidersRequest) returns (QueryProvidersResponse) {
    option (google.api.http).get = "/zerone/billing/v1/providers";
  }
  rpc Quote(QueryQuoteRequest) returns (QueryQuoteResponse) {
    option (google.api.http).get = "/zerone/billing/v1/quotes/{fact_id}";
  }
  rpc BatchQuote(QueryBatchQuoteRequest) returns (QueryBatchQuoteResponse) {
    option (google.api.http).get = "/zerone/billing/v1/quotes/batch";
  }
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/zerone/billing/v1/params";
  }
  rpc ZRNPriceUSD(QueryZRNPriceUSDRequest) returns (QueryZRNPriceUSDResponse) {
    option (google.api.http).get = "/zerone/billing/v1/price";
  }
}

message QueryProviderRequest {
  string address = 1;
}
message QueryProviderResponse {
  Provider provider = 1;
}

message QueryProvidersRequest {}
message QueryProvidersResponse {
  repeated Provider providers = 1;
}

message QueryQuoteRequest {
  string fact_id = 1;
}
message QueryQuoteResponse {
  QueryQuote quote = 1;
}

message QueryBatchQuoteRequest {
  repeated string fact_ids = 1;
}
message QueryBatchQuoteResponse {
  repeated QueryQuote quotes = 1;
  string total_price         = 2;
}

message QueryParamsRequest {}
message QueryParamsResponse {
  Params params = 1;
}

message QueryZRNPriceUSDRequest {}
message QueryZRNPriceUSDResponse {
  string price_usd = 1;  // 6-decimal USD string
  string source    = 2;  // "manual", "twap", or "unavailable"
}
