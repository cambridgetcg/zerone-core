syntax = "proto3";
package zerone.alignment.v1;

option go_package = "github.com/zerone-chain/zerone/x/alignment/types";

// AlignmentState tracks the module's operational state.
message AlignmentState {
  bool enabled = 1;
  uint64 last_observation_height = 2;
  uint64 observation_count = 3;
  // Whether degraded-frequency mode is active (2x observation rate).
  bool degraded_frequency_active = 4;
  // Previous health category for transition detection.
  string previous_category = 5;
}

// AlignmentObservation records sensor readings at a given height.
message AlignmentObservation {
  uint64 height = 1;
  int64 timestamp = 2;
  // Dimension scores in BPS (0–1,000,000 = 0–100%).
  uint64 knowledge_quality = 3;
  uint64 economic_stability = 4;
  uint64 governance_participation = 5;
  uint64 network_security = 6;
  uint64 staking_ratio = 7;
}

// DimensionScores holds weighted and composite scores for a height.
message DimensionScores {
  uint64 height = 1;
  // Raw dimension scores (BPS).
  uint64 knowledge_quality = 2;
  uint64 economic_stability = 3;
  uint64 governance_participation = 4;
  uint64 network_security = 5;
  uint64 staking_ratio = 6;
  // Weighted composite score (BPS).
  uint64 composite = 7;
}

// CorrectionRecord logs a correction generated by alignment analysis.
message CorrectionRecord {
  uint64 height = 1;
  string dimension = 2;
  string parameter = 3;
  string direction = 4;
  uint64 magnitude = 5;
  bool applied = 6;
  int64 timestamp = 7;
}

// AlignmentHealthIndex is the composite health metric for a given height.
message AlignmentHealthIndex {
  uint64 height = 1;
  uint64 composite_score = 2;
  string category = 3;
  DimensionScores dimensional_scores = 4;
  uint32 corrections_generated = 5;
}
