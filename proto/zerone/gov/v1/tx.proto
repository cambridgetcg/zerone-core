syntax = "proto3";
package zerone.gov.v1;

option go_package = "github.com/zerone-chain/zerone/x/gov/types";

import "cosmos/msg/v1/msg.proto";
import "zerone/gov/v1/types.proto";
import "zerone/gov/v1/genesis.proto";

// Msg defines the governance module's message service.
service Msg {
  rpc SubmitLIP(MsgSubmitLIP) returns (MsgSubmitLIPResponse);
  rpc StakeLIP(MsgStakeLIP) returns (MsgStakeLIPResponse);
  rpc AdvanceLIPStage(MsgAdvanceLIPStage) returns (MsgAdvanceLIPStageResponse);
  rpc CastVote(MsgCastVote) returns (MsgCastVoteResponse);
  rpc WithdrawLIP(MsgWithdrawLIP) returns (MsgWithdrawLIPResponse);
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc SubmitResearchSpend(MsgSubmitResearchSpend) returns (MsgSubmitResearchSpendResponse);
  rpc VoteResearchSpend(MsgVoteResearchSpend) returns (MsgVoteResearchSpendResponse);
  rpc SetResearchVoters(MsgSetResearchVoters) returns (MsgSetResearchVotersResponse);
  rpc AttachUpgradePlan(MsgAttachUpgradePlan) returns (MsgAttachUpgradePlanResponse);
  rpc AttachCreedAmendmentPin(MsgAttachCreedAmendmentPin) returns (MsgAttachCreedAmendmentPinResponse);
  rpc NominateSeatElection(MsgNominateSeatElection) returns (MsgNominateSeatElectionResponse);
  rpc AcceptSeatNomination(MsgAcceptSeatNomination) returns (MsgAcceptSeatNominationResponse);
  rpc VoteSeatElection(MsgVoteSeatElection) returns (MsgVoteSeatElectionResponse);
  rpc DomainFormationFreeze(MsgDomainFormationFreeze) returns (MsgDomainFormationFreezeResponse);
}

// MsgSubmitLIP creates a new LIP proposal.
message MsgSubmitLIP {
  option (cosmos.msg.v1.signer) = "proposer";
  string proposer     = 1;
  string title        = 2;
  string description  = 3;
  string category     = 4;
  string initial_stake = 5; // uzrn
  repeated ParamChange param_changes = 6;
}

message MsgSubmitLIPResponse {
  string lip_id = 1;
}

// MsgStakeLIP adds stake to an existing LIP.
message MsgStakeLIP {
  option (cosmos.msg.v1.signer) = "staker";
  string staker = 1;
  string lip_id = 2;
  string amount = 3; // uzrn
}

message MsgStakeLIPResponse {}

// MsgAdvanceLIPStage advances a LIP to its next stage.
message MsgAdvanceLIPStage {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1; // proposer address
  string lip_id    = 2;
}

message MsgAdvanceLIPStageResponse {
  string new_stage = 1;
}

// MsgCastVote casts a stake-weighted vote on a LIP.
message MsgCastVote {
  option (cosmos.msg.v1.signer) = "voter";
  string voter  = 1;
  string lip_id = 2;
  string option = 3; // "yes", "no", "abstain"
}

message MsgCastVoteResponse {
  string effective_weight = 1; // voter's bonded stake used as weight
}

// MsgWithdrawLIP withdraws a LIP (proposer only, before voting).
message MsgWithdrawLIP {
  option (cosmos.msg.v1.signer) = "proposer";
  string proposer = 1;
  string lip_id   = 2;
}

message MsgWithdrawLIPResponse {}

// MsgUpdateParams updates governance parameters (authority only).
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  string authority = 1;
  Params params    = 2;
}

message MsgUpdateParamsResponse {}

// MsgSubmitResearchSpend creates a new research fund spend proposal.
message MsgSubmitResearchSpend {
  option (cosmos.msg.v1.signer) = "proposer";
  string proposer      = 1;
  string title         = 2;
  string description   = 3;
  string recipient     = 4;
  string amount        = 5; // uzrn
  string justification = 6;
}

message MsgSubmitResearchSpendResponse {
  uint64 proposal_id = 1;
}

// MsgVoteResearchSpend casts a vote on a research spend proposal.
message MsgVoteResearchSpend {
  option (cosmos.msg.v1.signer) = "voter";
  string voter       = 1;
  uint64 proposal_id = 2;
  string vote        = 3; // "yes" or "no"
  string reasoning   = 4;
}

message MsgVoteResearchSpendResponse {}

// MsgSetResearchVoters configures the 2-of-2 research fund voters (authority only).
message MsgSetResearchVoters {
  option (cosmos.msg.v1.signer) = "authority";
  string             authority = 1;
  ResearchFundVoters voters    = 2;
}

message MsgSetResearchVotersResponse {}

// MsgAttachUpgradePlan attaches a software upgrade plan to an upgrade-category LIP.
message MsgAttachUpgradePlan {
  option (cosmos.msg.v1.signer) = "proposer";

  string proposer     = 1; // must be the LIP proposer
  string lip_id       = 2; // target LIP (must be upgrade category, non-terminal)
  string upgrade_name = 3; // must match a registered upgrade handler name
  int64  height       = 4; // block height to halt at
  string info         = 5; // upgrade info (release notes URL, binary hash, etc.)
}

message MsgAttachUpgradePlanResponse {}

// MsgAttachCreedAmendmentPin attaches a candidate PinnedCreed to a
// creed-amendment LIP. On LIP pass, x/gov calls
// x/creed.AnchorPin with this payload — the LIP body becomes the
// chain's record of what the new creed is to be, and the gov vote
// is the structural protection commitment 19 names.
//
// The pin is encoded as canonical sha256 + JSON-serialized
// commitment registry to keep this message x/gov-internal (no
// cross-module proto import required at this layer; the keeper
// rebuilds the creed PinnedCreed from these fields when calling
// x/creed.AnchorPin).
message MsgAttachCreedAmendmentPin {
  option (cosmos.msg.v1.signer) = "proposer";

  string proposer        = 1; // must be the LIP proposer
  string lip_id          = 2; // target LIP (must be creed_amendment category, non-terminal)
  bytes  canonical_hash  = 3; // sha256 of normalized TRUTH_SEEKING.md as it would land
  // commitments_json carries the JSON-encoded list of commitment
  // entries (number, name, archived, etc.) that the new pin should
  // contain. The keeper unmarshals this on attach for validation
  // and again on pass to construct the PinnedCreed argument to
  // x/creed.AnchorPin. The shape mirrors x/creed.CommitmentEntry.
  bytes  commitments_json = 4;
}

message MsgAttachCreedAmendmentPinResponse {}

// MsgNominateSeatElection nominates a candidate for a community seat.
message MsgNominateSeatElection {
  option (cosmos.msg.v1.signer) = "proposer";
  string proposer   = 1;  // nominator bech32
  string candidate  = 2;  // candidate bech32
  uint32 seat_index = 3;
  string statement  = 4;  // max 2000 chars
}

message MsgNominateSeatElectionResponse {
  uint64 proposal_id = 1;
}

// MsgAcceptSeatNomination accepts a pending seat election nomination.
message MsgAcceptSeatNomination {
  option (cosmos.msg.v1.signer) = "candidate";
  string candidate   = 1;
  uint64 proposal_id = 2;
}

message MsgAcceptSeatNominationResponse {}

// MsgVoteSeatElection casts a stake-weighted vote on a seat election.
message MsgVoteSeatElection {
  option (cosmos.msg.v1.signer) = "voter";
  string voter       = 1;
  uint64 proposal_id = 2;
  string option      = 3;  // "yes", "no", "abstain"
}

message MsgVoteSeatElectionResponse {
  string effective_weight = 1;
}

// MsgDomainFormationFreeze imposes a formation cooldown on a domain.
// Only executable via governance (authority-gated).
message MsgDomainFormationFreeze {
  option (cosmos.msg.v1.signer) = "authority";
  string authority       = 1;
  string domain          = 2;
  uint64 duration_blocks = 3;
  string reason          = 4;
}

message MsgDomainFormationFreezeResponse {}
